sional. Y cómo sostener todo esto en el tiempo... incluso cuando lidera personas y siente que su ejemplo cuenta el doble. Treinta minutos. Tres módulos. Y al final... una semana para probar.", "body": ["Si está en este curso es probable que conozca el problema. La sensación de que el trabajo ocupa más espacio del que debería. Los correos del fin de semana. La culpa cuando descansa. La pregunta incómoda de '¿estoy trabajando demasiado o me estoy quejando sin razón?'", "Este curso no le promete tranquilidad permanente. Le promete claridad: criterios para decidir qué aceptar y qué no, sin sentir que es poco profesional. Si tiene gente a cargo, también trabaja lo específico de su rol como líder: cómo evitar que su ritmo se transmita al equipo.", "Lo que viene es práctico y aplicable esta semana. La idea es que al cerrar el curso tenga una revisión semanal sostenible que pueda implementar el próximo lunes."]}]}, {"id": "m1", "title": "Módulo 1: Por qué cuesta tanto", "screens": [{"id": "p4", "type": "module_intro_full", "moduleTitle": "Módulo 1: Por qué cuesta tanto", "moduleLabel": "MÓDULO 1", "title": "El problema no es la voluntad", "image": "assets/images/img_04.jpg", "audio": "assets/audio/audio_02.mp3", "audio_script": "Bienvenido al primer módulo. Hay una idea común que conviene desactivar de entrada. Que el equilibrio vida-trabajo es un tema de fuerza de voluntad. Que si uno quisiera realmente... lo lograría. No es así. Hay sistemas, expectativas, y hábitos colectivos que empujan en una dirección. Entender estos mecanismos no es excusa. Es el primer paso para actuar con criterio. Veamos qué pasa realmente y por qué cuesta tanto.", "statement": "El exceso de trabajo no es señal de compromiso. Es señal de un sistema que no distingue entre estar ocupado y trabajar bien.", "citation": "Principio operativo del módulo", "paragraphs": ["La trampa más común del trabajo profesional moderno es confundir dos cosas distintas: estar ocupado (responder rápido, estar siempre disponible, mostrar movimiento constante) y estar trabajando bien (producir resultados, hacer las cosas con calidad, tomar decisiones lúcidas).", "Cuando estas dos cosas se confunden, todo el mundo trabaja más horas pero los resultados no mejoran proporcionalmente. La gente se cansa, la calidad cae, y nadie se atreve a parar porque parar parece poco profesional."], "nextSteps": "Lo que va a encontrar en este módulo", "learnItems": ["El dato que cambia la conversación: jornadas extendidas y productividad real.", "Estar ocupado vs estar trabajando bien: cinco contrastes.", "Cinco mitos del equilibrio que conviene desactivar.", "Los costos invisibles del exceso (lo que no se ve, pero se paga)."]}, {"id": "p5", "type": "stat_callout", "moduleTitle": "Módulo 1: Por qué cuesta tanto", "title": "El dato que importa", "image": null, "intro": "Antes de hablar de qué hacer, conviene mirar qué dicen los datos sobre exceso de trabajo y productividad. Los resultados sorprenden a casi todos.", "stats": [{"number": "55", "unit": "horas/semana", "label": "Punto de inflexión", "context": "A partir de las 55 horas semanales, las horas adicionales no producen más output. Lo que se gana en tiempo se pierde en errores y fatiga acumulada."}, {"number": "23", "unit": "minutos", "label": "Costo de cada interrupción", "context": "Tiempo promedio que tarda el cerebro en recuperar concentración profunda después de una interrupción. En una jornada con 8 interrupciones, son más de 3 horas perdidas."}, {"number": "40%", "unit": "menos calidad", "label": "Multitarea sostenida", "context": "La multitarea constante (responder mensajes mientras se hace otra cosa) reduce la calidad de ambas tareas, comparado con hacer una sola con atención plena."}], "closing": "<strong>La conclusión es clara:</strong> trabajar más horas y estar más disponible no producen mejores resultados. Producen lo contrario. La sensación de estar haciendo mucho se paga con calidad real."}, {"id": "p6", "type": "comparison_cards", "moduleTitle": "Módulo 1: Por qué cuesta tanto", "title": "Estar ocupado ≠ estar trabajando bien", "image": null, "intro": "Las dos cosas se sienten parecido por dentro, pero producen resultados muy distintos. Estos cinco contrastes ayudan a notar dónde estamos.", "leftTitle": "Estar OCUPADO", "leftSubtitle": "Activo pero disperso", "rightTitle": "Estar TRABAJANDO BIEN", "rightSubtitle": "Enfocado y productivo", "comparisons": [{"left": "Responder mensajes apenas llegan, sin diferenciar urgencia.", "right": "Decidir cuándo revisar mensajes según prioridades reales."}, {"left": "Decir 'sí' a casi todo lo que pide el equipo o el cliente.", "right": "Decir 'sí' a lo que realmente puede comprometer con calidad."}, {"left": "Trabajar hasta tarde para sentir que se hizo el esfuerzo.", "right": "Cerrar el día cuando se logró lo prioritario, no por la hora."}, {"left": "Estar siempre disponible para 'cualquier cosa que surja'.", "right": "Definir franjas de disponibilidad y respetar bloques de concentración."}, {"left": "Hacer muchas cosas a la vez para 'avanzar más rápido'.", "right": "Hacer una cosa a la vez con atención plena."}]}, {"id": "p7", "type": "flip_cards", "moduleTitle": "Módulo 1: Por qué cuesta tanto", "title": "Cinco mitos del equilibrio que conviene desactivar", "image": null, "intro": "Haga clic en cada tarjeta para ver el mito y la realidad. Estos mitos circulan en muchos ambientes corporativos y mantienen a las personas atrapadas en la trampa del exceso.", "cards": [{"front": "Mito 1", "frontText": "Si me dedico más horas, voy a producir más.", "back": "Realidad", "backText": "Después de 55 horas semanales, las horas adicionales no producen más. Producen más errores y fatiga acumulada que cuesta días corregir."}, {"front": "Mito 2", "frontText": "Si pongo límites, voy a verme poco comprometido.", "back": "Realidad", "backText": "Los profesionales que sostienen límites claros suelen ser percibidos como más confiables. Lo que se promete, se cumple. Lo que no se puede, no se acepta."}, {"front": "Mito 3", "frontText": "Si no respondo enseguida, voy a perder oportunidades.", "back": "Realidad", "backText": "Pocas cosas son tan urgentes como parecen en el momento. Una respuesta en 4 horas suele ser suficiente para casi todo, y mucho mejor que una respuesta apurada y de mala calidad."}, {"front": "Mito 4", "frontText": "Si descanso, voy a desconectarme de lo que pasa.", "base": "false", "back": "Realidad", "backText": "Volver descansado mejora el juicio sobre lo que importa y lo que no. Quien no descansa pierde la perspectiva que permite priorizar bien."}, {"front": "Mito 5", "frontText": "El equilibrio es para gente sin ambición.", "back": "Realidad", "backText": "Las carreras largas y exitosas son las de personas que aprendieron a sostener un ritmo. Las que se queman temprano rara vez llegan al lugar al que querían llegar."}]}, {"id": "p8", "type": "statement_paragraphs", "moduleTitle": "Módulo 1: Por qué cuesta tanto", "title": "Los costos invisibles del exceso", "image": null, "statement": "Lo más caro del exceso de trabajo no es lo que se ve. Es lo que se pierde sin notarlo: claridad, relaciones, salud, criterio.", "paragraphs": ["Cuando alguien trabaja más horas de las que su sistema puede sostener, los costos no aparecen el primer mes. Aparecen lentamente, distribuidos en pequeñas pérdidas que cuesta atribuir a la causa. Por eso es tan difícil parar a tiempo: el dolor llega con retraso."], "intro": "Cuatro costos invisibles del exceso laboral", "items": ["<strong>Pérdida de criterio.</strong> Trabajar exhausto reduce la capacidad de distinguir lo importante de lo urgente. Se confunde movimiento con avance, y se gasta energía en lo menos relevante.", "<strong>Erosión de relaciones.</strong> Las personas cercanas notan el cambio antes que uno mismo. Conversaciones más cortas, menos paciencia, presencia física sin presencia mental. Esto se recupera, pero no automáticamente.", "<strong>Desgaste de la salud.</strong> Sueño que no repara, tensión muscular sostenida, irritabilidad, alteraciones digestivas. El cuerpo manda señales antes que la mente, pero se aprenden a ignorar.", "<strong>Pérdida del sentido del trabajo.</strong> Cuando todo se vuelve emergencia, deja de importar qué se está haciendo. La persona trabaja pero ya no sabe para qué. Es uno de los primeros signos del agotamiento profesional."]}, {"id": "p9", "type": "knowledge_check", "moduleTitle": "Módulo 1: Por qué cuesta tanto", "title": "Verifique lo aprendido", "image": null, "questions": [{"type": "single", "stem": "Carolina dice 'sí' a todo lo que le piden, responde mensajes en menos de 10 minutos en cualquier horario, y trabaja hasta tarde casi todas las noches. ¿Qué describe mejor su situación?", "options": ["Carolina está trabajando bien: alta disponibilidad y compromiso.", "Carolina está ocupada, no necesariamente trabajando bien. Lo que parece compromiso puede estar erosionando criterio, calidad y sostenibilidad.", "Carolina debería trabajar todavía más horas para asegurar resultados.", "Carolina no tiene problema mientras le alcance la energía."], "correctAnswer": 1, "correct": 1, "feedback": {"correct": "Correcto. Estar siempre ocupado, decir sí a todo, y responder en minutos son señales de estar muy ocupada, no de trabajar bien. La calidad del juicio se erosiona y los costos invisibles se acumulan sin que se note.", "incorrect": "Revise el contraste central del módulo: estar ocupado y trabajar bien se sienten parecido pero producen resultados distintos. Lo de Carolina es el patrón clásico de ocupación que disfraza problemas de fondo."}}, {"type": "single", "stem": "¿Cuál de estas afirmaciones sobre las jornadas extendidas es FALSA?", "options": ["Después de aproximadamente 55 horas semanales, las horas adicionales no producen más output proporcional.", "Trabajar más horas siempre produce más resultados, sin importar cuántas sean.", "El multitasking sostenido reduce la calidad de ambas tareas comparado con hacer una a la vez.", "Una interrupción frecuente puede costar 23 minutos en recuperar concentración profunda."], "correctAnswer": 1, "correct": 1, "feedback": {"correct": "Correcto. La idea de que 'más horas = más output' es justamente el mito que el dato desmiente. Las otras tres afirmaciones son verdaderas.", "incorrect": "Revise: la opción FALSA es la que dice que más horas siempre producen más, sin importar cuántas. Los datos del módulo muestran lo contrario."}}]}, {"id": "p10", "type": "module_outro", "moduleTitle": "Módulo 1: Por qué cuesta tanto", "title": "Lo que cierra este módulo", "image": null, "items": ["<strong>El exceso no es voluntad: es sistema.</strong> Hay expectativas, hábitos colectivos y dinámicas que empujan a trabajar más de lo razonable. Entender esto no es excusa, es el primer paso para actuar con criterio.", "<strong>Estar ocupado y trabajar bien son cosas distintas.</strong> La trampa más común es confundirlas. Más horas, más respuestas rápidas y más disponibilidad no son señales automáticas de mejor trabajo.", "<strong>Los costos del exceso son invisibles al principio.</strong> Erosionan criterio, relaciones, salud y sentido. Llegan con retraso, por eso cuesta parar a tiempo."]}]}, {"id": "m2", "title": "Módulo 2: Límites en la práctica", "screens": [{"id": "p11", "type": "module_intro_full", "moduleTitle": "Módulo 2: Límites en la práctica", "moduleLabel": "MÓDULO 2", "title": "Decir no sin sentirse poco profesional", "image": "assets/images/img_05.jpg", "audio": "assets/audio/audio_03.mp3", "audio_script": "Bienvenida al segundo módulo. Entender el problema es necesario. Pero no es suficiente. Lo que sigue es la parte difícil. Cómo se ponen los límites... en concreto. Sin sentirse poco profesional. Sin romper relaciones de confianza. Y sin sentir culpa los domingos a la noche. Vamos a ver tres cosas. Decir sí con criterio. Conversaciones difíciles con jefes y clientes. Y desconexión real... que no es solo apagar la pantalla.", "statement": "Los límites no se ponen una vez. Se sostienen muchas veces, en pequeños momentos del día, hasta que se vuelven costumbre.", "citation": "Principio operativo del módulo", "paragraphs": ["Poner límites en el trabajo no es una conversación grande con el jefe. Es una serie de pequeñas decisiones que se repiten todos los días: si responder ahora o más tarde, si aceptar este pedido o renegociar el plazo, si trabajar el sábado o no, si tomar el almuerzo en el escritorio o lejos de la pantalla.", "Cada una de estas decisiones parece menor. Pero sumadas durante semanas, definen si el trabajo ocupa el espacio que debería o el que se le permite ocupar."], "nextSteps": "Lo que va a encontrar en este módulo", "learnItems": ["La diferencia entre decir sí siempre y decir sí con criterio.", "Una jornada con límites: seis momentos críticos de decisión.", "Caso real: Sofía y la solicitud del viernes a las 7 de la noche.", "Cómo conducir una conversación de límites con un jefe.", "Desconexión real: por qué apagar la pantalla no es suficiente."]}, {"id": "p12", "type": "comparison_cards", "moduleTitle": "Módulo 2: Límites en la práctica", "title": "Decir 'sí' siempre vs decir 'sí' con criterio", "image": null, "intro": "Decir 'no' no es lo opuesto al compromiso. Es parte del compromiso bien entendido. Estos cuatro contrastes muestran la diferencia.", "leftTitle": "Decir 'sí' SIEMPRE", "leftSubtitle": "Compromiso sin filtros", "rightTitle": "Decir 'sí' CON CRITERIO", "rightSubtitle": "Compromiso sostenible", "comparisons": [{"left": "'Sí, lo hago.' (sin pensar qué desplaza)", "right": "'Lo puedo hacer esta semana, pero significa mover X. ¿Cómo lo priorizamos?'"}, {"left": "'Lo tengo el lunes.' (sin verificar si es realista)", "right": "'Para tener calidad necesito hasta el miércoles. ¿Funciona?'"}, {"left": "'No hay problema.' (sin medir el costo personal)", "right": "'Si lo hago este fin de semana, voy a tener menos energía la semana que viene. Veamos opciones.'"}, {"left": "'Yo me ocupo de todo.' (asumir más de lo que corresponde)", "right": "'Esto puede manejarlo el equipo. Yo entro si hay algo crítico.'"}]}, {"id": "p13", "type": "timeline", "moduleTitle": "Módulo 2: Límites en la práctica", "title": "Una jornada con límites: seis momentos críticos", "image": null, "intro": "El equilibrio se decide en momentos puntuales del día, no en grandes declaraciones. Este recorrido muestra seis decisiones cotidianas donde el criterio importa.", "events": [{"time": "8:00 AM", "title": "Inicio de jornada: la primera hora protegida", "description": "<strong>Decisión:</strong> ¿abrir el correo apenas llegar, o dedicar la primera hora a la tarea más importante? Quien empieza por el correo entra en modo reactivo y suele quedar ahí todo el día.<br><br><strong>Práctica:</strong> reservar de 8:00 a 9:00 (o la primera hora real) para trabajo profundo, sin chat ni correo."}, {"time": "10:30 AM", "title": "Reunión que se sale del tiempo", "description": "<strong>Decisión:</strong> la reunión iba a durar 30 minutos y ya pasaron 45. ¿Quedarse hasta cualquier hora o cerrar el bloque?<br><br><strong>Práctica:</strong> a los 5 minutos del cierre previsto, decir respetuosamente 'tengo que cerrar en 5 minutos, ¿cómo seguimos?'"}, {"time": "12:30 PM", "title": "Almuerzo: en el escritorio o lejos de la pantalla", "description": "<strong>Decisión:</strong> almorzar mientras se responde correos o tomar 30 minutos lejos del escritorio.<br><br><strong>Práctica:</strong> al menos tres veces por semana, almuerzo lejos de la pantalla. No es lujo: es recuperación cognitiva."}, {"time": "3:00 PM", "title": "Solicitud nueva que cambia el plan del día", "description": "<strong>Decisión:</strong> aparece una solicitud no prevista. ¿Aceptarla automáticamente o evaluar primero?<br><br><strong>Práctica:</strong> antes de decir 'sí', preguntar '¿esto desplaza algo prioritario? ¿qué plazo realista?' Decir sí con criterio, no por reflejo."}, {"time": "6:00 PM", "title": "Cierre de jornada: qué entra y qué no para mañana", "description": "<strong>Decisión:</strong> cerrar a una hora razonable o 'solo media hora más'.<br><br><strong>Práctica:</strong> 5 minutos antes de cerrar, hacer una lista de las 3 prioridades del día siguiente. Eso permite cerrar la mente, no solo la computadora."}, {"time": "9:00 PM", "title": "Mensaje del jefe o cliente fuera de hora", "description": "<strong>Decisión:</strong> llega un mensaje a las 9 de la noche. ¿Responder ahora o mañana?<br><br><strong>Práctica:</strong> si no es una emergencia real (las hay, pocas), responder al día siguiente. Una vez que se responde a las 9pm, se establece la expectativa de que eso pasará siempre."}]}, {"id": "p14", "type": "case_study", "moduleTitle": "Módulo 2: Límites en la práctica", "title": "Caso: Sofía y la solicitud del viernes a las 7 de la noche", "image": "assets/images/img_06.jpg", "audio": "assets/audio/audio_04.mp3", "audio_script": "Sofía es analista de proyectos. Treinta y cuatro años. Lleva dos años en su empresa. Un viernes a las siete de la noche... después de una semana intensa... acaba de cerrar la computadora. Su jefe le manda un mensaje. Necesito una revisión rápida del informe. No es urgente urgente... pero me ayudaría tenerlo el lunes a las nueve. Sofía se quedó pensando dos cosas. Una... no quería verse como poco comprometida. Dos... no quería trabajar el fin de semana otra vez. Lo que hizo fue distinto a lo que solía hacer. Respondió enseguida. Pero no diciendo sí. Y tampoco diciendo no. Lo voy a ver el lunes a primera hora... y te confirmo si puedo tenerlo para las once. Punto.", "subtitle": "Decir no sin decir no: ofrecer una alternativa concreta", "body": "Lo que hizo Sofía aplicó tres principios al mismo tiempo:<br><br><strong>Primero, respondió rápido.</strong> No para hacer el trabajo, sino para no dejar al jefe esperando. La respuesta rápida transmite profesionalismo aunque la decisión sea no avanzar el fin de semana.<br><br><strong>Segundo, no dijo 'no' directamente.</strong> Ofreció una alternativa concreta y comprometida. 'Lo veo el lunes a primera hora.' Esto deja claro qué va a pasar, sin abrir negociación innecesaria.<br><br><strong>Tercero, agregó una condición realista.</strong> 'Te confirmo si puedo tenerlo para las once.' No prometió un horario sin haber visto el trabajo. Eso es honestidad técnica, no falta de compromiso.<br><br><strong>El resultado:</strong> el jefe respondió 'perfecto, gracias'. La conversación duró 90 segundos. Sofía pasó el fin de semana sin trabajar y entregó el informe el lunes a las 11:30. Nadie notó nada, porque no había nada que notar: lo prometido se cumplió.<br><br><strong>En síntesis:</strong> el secreto no estaba en decir 'no'. Estaba en ofrecer una alternativa concreta y comprometida en lugar de aceptar automáticamente. Decir sí con criterio es decir cuándo y bajo qué condiciones."}, {"id": "p15", "type": "accordion", "moduleTitle": "Módulo 2: Límites en la práctica", "title": "Conversación de límites con el jefe: cuatro principios", "image": null, "intro": "Conversar con un jefe sobre carga, plazos o disponibilidad genera incomodidad. Estos cuatro principios ayudan a tener esa conversación de forma profesional, sin pedir disculpas innecesarias.", "items": [{"title": "1. Llevar datos, no quejas", "content": "<strong>Qué hacer:</strong> entrar a la conversación con información concreta. 'Esta semana tuve X reuniones y Y entregables. La carga ha estado por encima de lo que puedo sostener con calidad.'<br><br><strong>Qué evitar:</strong> generalidades emocionales. 'Estoy agotado, ya no doy más.' Aunque sea verdadero, no da al jefe información para actuar y se interpreta como un problema personal, no como un problema operativo."}, {"title": "2. Proponer alternativas, no solo quejas", "content": "<strong>Qué hacer:</strong> llegar con dos o tres opciones concretas. 'Veo tres caminos: priorizamos A y postergamos B, redistribuimos B al equipo, o reducimos el alcance de A.' El jefe toma una decisión, no un problema.<br><br><strong>Qué evitar:</strong> dejar la pelota del lado del jefe. 'Estoy sobrecargada, no sé qué hacer.' Aunque sea cierto, lo posiciona como su problema, no como una conversación profesional sobre prioridades."}, {"title": "3. Hablar del impacto, no del esfuerzo", "content": "<strong>Qué hacer:</strong> centrar la conversación en lo que se va a producir mejor o peor, no en cuánto se está esforzando. 'Si sostengo este ritmo, la calidad de X va a caer en las próximas dos semanas.'<br><br><strong>Qué evitar:</strong> contar las horas que se trabajan. 'Estuve hasta las 11 de la noche cada día.' Aunque sea verdad, comunica que se trabaja mucho, no que se trabaja bien. Y muchos jefes lo interpretan como compromiso, no como problema."}, {"title": "4. Cerrar con un acuerdo concreto", "content": "<strong>Qué hacer:</strong> no salir de la conversación sin un acuerdo explícito. 'Entonces, hasta el viernes priorizo A y B queda para la semana próxima. ¿Confirmado?' Cerrar con confirmación verbal evita malentendidos.<br><br><strong>Qué evitar:</strong> conversaciones que terminan en 'sí, hablamos esto pronto'. Eso es no haber hablado nada. La conversación sin acuerdo concreto es solo desahogo."}]}, {"id": "p16", "type": "decision_scenario", "moduleTitle": "Módulo 2: Límites en la práctica", "title": "¿Cómo responde usted al mensaje del jefe?", "image": "assets/images/img_07.jpg", "instructions": "<strong>Instrucciones:</strong> lea el caso, evalúe las cuatro opciones, y elija la más adecuada. No hay opciones obvias: cada una tiene consecuencias.", "intro_text": "<strong>El caso.</strong> Es viernes 7:00 PM. Acaba de cerrar la computadora después de una semana intensa. Su teléfono vibra. Es un mensaje de su jefe.", "question_text": "¿Cómo responde usted?", "dialogue": [{"character": "Su jefe", "role": "vía mensaje", "text": "Hola, perdón por la hora. ¿Podrías revisar el documento del cliente antes del lunes 9am? No es urgente urgente, pero me ayuda llegar con eso ya visto a la reunión del lunes. Gracias.", "audio": null, "audio_script": null}], "options": [{"id": "A", "label": "Responder enseguida 'sí, lo hago' y abrir la computadora", "subtitle": "Aceptar de inmediato y empezar a trabajar el sábado o domingo.", "correct": false, "result": "Establece la expectativa equivocada", "outcome": "Esta respuesta resuelve el problema del jefe, pero crea uno mayor a mediano plazo. Cada vez que se responde a un mensaje fuera de hora aceptando inmediatamente, se refuerza la idea de que está siempre disponible. El próximo viernes a las 7 va a llegar otro mensaje, y el siguiente también. Los límites no se construyen con una sola decisión: se erosionan o se sostienen en cada interacción."}, {"id": "B", "label": "Ignorar el mensaje hasta el lunes 9am", "subtitle": "No responder y ver el documento ese lunes a primera hora.", "correct": false, "result": "Resuelve, pero abre una grieta de confianza", "outcome": "Ignorar un mensaje sin responder genera incertidumbre del otro lado. El jefe puede preguntarse si lo vio, si lo va a hacer, si está enojado. Esa incertidumbre rara vez juega a favor. Sostener límites no es desaparecer: es comunicar con claridad qué va a pasar y cuándo."}, {"id": "C", "label": "Responder ahora: 'Lo veo el lunes a primera hora y te confirmo si lo tengo para las 11am'", "subtitle": "Respuesta rápida con compromiso concreto pero sostenible.", "correct": true, "result": "La forma profesional de sostener un límite", "outcome": "Esta opción aplica tres principios al mismo tiempo: <strong>respuesta rápida</strong> (no deja al jefe en duda), <strong>alternativa concreta</strong> (lunes a primera hora) y <strong>compromiso honesto</strong> (las 11am, no antes). Pasan dos cosas valiosas: el jefe tiene certidumbre y usted tiene fin de semana. La conversación dura 90 segundos. Nadie se siente ofendido porque no hay nada ofensivo: se está comportando como profesional, que es lo que el jefe espera."}, {"id": "D", "label": "Hacer el trabajo el domingo a la noche para que esté listo", "subtitle": "Aceptar implícitamente y ocupar el domingo en la noche.", "correct": false, "result": "Soluciona corto plazo, alimenta el patrón", "outcome": "Trabajar el domingo a la noche para que esté listo el lunes parece eficiente, pero refuerza la trampa más cara. Establece que su tiempo personal está siempre disponible si hace falta. Y los domingos a la noche se acumulan: tres meses así, y el agotamiento ya está instalado sin que se sepa cuándo empezó. El precio se paga con retraso."}], "convergent_title": "Los límites se construyen con respuestas, no con silencios", "convergent_text": "Hay una intuición común que sabotea la opción correcta: pensar que poner límites es <strong>no responder</strong>, o <strong>decir no de forma cortante</strong>. No es así. La forma más profesional de sostener un límite es responder rápido, con una alternativa concreta y un compromiso honesto. Es lo opuesto al silencio y lo opuesto a la negación. Es decir <em>cuándo</em> y <em>bajo qué condiciones</em>. Esa es la conversación que el jefe espera tener, aunque a veces le cueste pedirla. Y es la que deja al profesional sosteniendo su tiempo sin pagar el costo emocional de la culpa o de la confrontación.", "convergent_audio": "assets/audio/audio_05.mp3", "convergent_audio_script": "Hay una intuición común que sabotea la opción correcta. Pensar que poner límites... es no responder. O decir no de forma cortante. No es así. La forma más profesional de sostener un límite es responder rápido. Con una alternativa concreta. Y un compromiso honesto. Es lo opuesto al silencio. Y lo opuesto a la negación. Es decir cuándo. Y bajo qué condiciones. Esa es la conversación que el jefe espera tener... aunque a veces le cueste pedirla."}, {"id": "p17", "type": "statement_paragraphs", "moduleTitle": "Módulo 2: Límites en la práctica", "title": "Desconexión real: por qué apagar la pantalla no es suficiente", "image": null, "statement": "Desconectarse del trabajo no es solo dejar de mirar la computadora. Es dejar de estar mentalmente disponible. Y eso requiere prácticas concretas.", "paragraphs": ["La trampa moderna es que se puede 'estar de descanso' físicamente pero mentalmente seguir trabajando. Pensar en pendientes mientras se almuerza con la familia, revisar mensajes 'solo un momento' los sábados, anticipar la semana entrante el domingo a la noche. Eso no es descanso: es trabajo invisible que no se cuenta como horas, pero sí desgasta."], "intro": "Cuatro prácticas para desconectarse de verdad", "items": ["<strong>Ritual de cierre del día.</strong> Antes de salir del trabajo (o cerrar la computadora si es remoto), tomar 5 minutos para escribir las 3 prioridades del día siguiente. Esto libera la mente: ya está guardado, no hay que cargarlo.", "<strong>Notificaciones del celular fuera de hora.</strong> Apagar notificaciones de correo y chat del trabajo desde la hora de cierre. No es radical: es lo razonable. Si hay una emergencia real, la gente sabe llamar.", "<strong>Espacio físico separado.</strong> Si es presencial: no llevar laptop a casa salvo necesidad real. Si es remoto: usar un espacio definido para trabajar y otro para descansar. La mente asocia espacios con modos.", "<strong>Conversaciones no laborales.</strong> Asegurar al menos una conversación no laboral por día. Con familia, amigos, vecinos. La identidad profesional necesita compañía de otras identidades para no devorarlo todo."]}, {"id": "p18", "type": "stat_callout", "moduleTitle": "Módulo 2: Límites en la práctica", "title": "El costo cognitivo de la conexión permanente", "image": null, "intro": "Estar conectado 'por si acaso' tiene un precio que pocas veces se calcula. Estos datos lo muestran.", "stats": [{"number": "4×", "unit": "más errores", "label": "Atención dividida", "context": "Las personas que revisan correo o chat constantemente cometen hasta cuatro veces más errores en tareas que requieren concentración profunda, comparado con personas que separan bloques."}, {"number": "31%", "unit": "del día", "label": "Tiempo perdido por interrupciones", "context": "Estudios de empresas de tecnología muestran que entre interrupciones y recuperación de concentración, casi un tercio de la jornada se pierde sin producir nada de valor."}, {"number": "8", "unit": "horas reales", "label": "Lo que rinde una jornada bien enfocada", "context": "Una jornada de 8 horas con bloques protegidos suele producir más que una jornada de 11 horas dispersa. La diferencia no está en el tiempo: está en la calidad de la atención."}], "closing": "<strong>La conclusión es práctica:</strong> proteger bloques de atención no es un capricho. Es la única forma de que las horas que se trabajan produzcan lo que se espera."}, {"id": "p19", "type": "knowledge_check", "moduleTitle": "Módulo 2: Límites en la práctica", "title": "Verifique lo aprendido", "image": null, "questions": [{"type": "single", "stem": "Pedro recibe un mensaje del jefe el sábado a la mañana pidiendo una revisión rápida para el lunes. ¿Cuál es la respuesta que mejor combina profesionalismo Y sostenimiento del límite?", "options": ["Ignorar el mensaje hasta el lunes a las 9.", "Responder 'sí, lo hago' y trabajar el sábado para tenerlo listo.", "Responder 'lo veo el lunes a primera hora y te confirmo el horario'.", "Hacer el trabajo el domingo a la noche."], "correctAnswer": 2, "correct": 2, "feedback": {"correct": "Correcto. Respuesta rápida + alternativa concreta + compromiso honesto. Eso combina mantener la confianza profesional con sostener el tiempo personal.", "incorrect": "Recuerde el principio: poner límites no es no responder ni aceptar todo. Es responder rápido con una alternativa concreta y comprometida."}}, {"type": "multiple", "stem": "¿Cuáles de estos son principios para tener una conversación de límites con el jefe? (Marque todas las correctas.)", "options": ["Llevar datos concretos, no quejas emocionales generales.", "Proponer alternativas en lugar de solo plantear el problema.", "Centrar la conversación en el impacto, no en cuántas horas se trabajan.", "Cerrar la conversación sin un acuerdo concreto para no presionar al jefe."], "correctAnswer": [0, 1, 2], "correct": [0, 1, 2], "feedback": {"correct": "Correcto. La opción 4 es la trampa: una conversación sin acuerdo concreto es solo desahogo. Hay que cerrar con un compromiso explícito.", "incorrect": "Revise: cerrar sin acuerdo concreto no es respetuoso, es ineficaz. La conversación profesional requiere salir con un compromiso explícito de ambas partes."}}, {"type": "single", "stem": "¿Qué describe mejor la 'desconexión real' que vimos en el módulo?", "options": ["Apagar la computadora a la hora de cierre.", "Dejar de estar mentalmente disponible (no solo físicamente), con prácticas concretas: ritual de cierre, notificaciones apagadas, espacio físico separado, conversaciones no laborales.", "Apagar el teléfono los fines de semana sin avisar a nadie.", "Tomar vacaciones largas una vez al año."], "correctAnswer": 1, "correct": 1, "feedback": {"correct": "Correcto. Desconexión real es lograr que la mente deje de estar en modo trabajo, no solo que el cuerpo deje de estar frente a la pantalla. Requiere prácticas concretas, no solo intenciones.", "incorrect": "Revise: apagar la computadora no es suficiente si la mente sigue pensando en pendientes. La desconexión real es mental, y requiere prácticas específicas, no solo intenciones."}}]}, {"id": "p20", "type": "module_outro", "moduleTitle": "Módulo 2: Límites en la práctica", "title": "Lo que cierra este módulo", "image": null, "items": ["<strong>Decir sí con criterio no es lo opuesto al compromiso.</strong> Es la forma profesional del compromiso. Ofrecer una alternativa concreta es mejor que aceptar automáticamente o decir 'no' cortante.", "<strong>Las conversaciones difíciles funcionan mejor con cuatro principios:</strong> datos en lugar de quejas, alternativas en lugar de problemas, impacto en lugar de horas, y acuerdo concreto al cerrar.", "<strong>Desconexión real es mental, no solo física.</strong> Cuatro prácticas: ritual de cierre, notificaciones apagadas, espacio físico separado, conversaciones no laborales."]}]}, {"id": "m3", "title": "Módulo 3: Sostenerlo en el tiempo", "screens": [{"id": "p21", "type": "module_intro_full", "moduleTitle": "Módulo 3: Sostenerlo en el tiempo", "moduleLabel": "MÓDULO 3", "title": "Sostener el equilibrio (especialmente si lidera personas)", "image": "assets/images/img_08.jpg", "audio": "assets/audio/audio_06.mp3", "audio_script": "Bienvenido al tercer módulo. Los límites no son una decisión... son un hábito. Y los hábitos se erosionan. Este módulo trabaja dos cosas. Cómo notar cuando el equilibrio empieza a desgastarse. Y cómo recuperarlo... antes de tocar fondo. Si lidera personas... hay una capa adicional. Su ejemplo cuenta el doble. Lo que el equipo le ve hacer... es más fuerte que lo que les dice. Vamos a ver eso también. Y al final del módulo... tendrá una revisión semanal para empezar este lunes.", "statement": "El equilibrio no se logra una vez. Se sostiene en cada semana. Y si lidera personas, su ritmo se vuelve el ritmo del equipo, lo quiera o no.", "citation": "Principio operativo del módulo", "paragraphs": ["El error más común al hablar de equilibrio es pensar que es un objetivo a alcanzar. No lo es. Es una práctica a sostener, semana tras semana, contra fuerzas que empujan en dirección contraria. La gente que parece tenerlo no es la que tomó una buena decisión hace tres años. Es la que hace pequeños ajustes cada semana.", "Si lidera personas, agregue una capa más: lo que usted hace se convierte en la norma del equipo. Mandar mensajes a las 11 de la noche les enseña que también se espera de ellos. Trabajar los sábados les comunica que es lo esperable. Su ejemplo está hablando todo el tiempo, lo planee o no."], "nextSteps": "Lo que va a encontrar en este módulo", "learnItems": ["Si lidera, su ejemplo cuenta el doble: efectos concretos en el equipo.", "Caso real: Marcos, líder que aprendió a no enviar mensajes a las 11pm.", "Señales de erosión: seis momentos de la semana donde notar el desgaste.", "Una revisión semanal sostenible: siete chequeos del lunes.", "Cómo recuperar el equilibrio cuando se ha erosionado."]}, {"id": "p22", "type": "statement_paragraphs", "moduleTitle": "Módulo 3: Sostenerlo en el tiempo", "title": "Si lidera personas, su ejemplo cuenta el doble", "image": null, "statement": "Lo que un líder hace, no lo que dice, es lo que se vuelve la norma del equipo. Mandar mensajes a las 11pm enseña al equipo que también se espera eso de ellos.", "paragraphs": ["Hay una asimetría que muchos líderes no calculan. Lo que para usted es 'algo que hago porque me salgo de los horarios' para el equipo es 'la expectativa de cómo hay que trabajar'. Las personas que dependen jerárquicamente de alguien leen sus acciones como indicadores de lo que se espera. Y rara vez se atreven a hacer distinto.", "Esto no significa que un líder no pueda trabajar fuera de hora cuando lo necesita. Significa que las acciones tienen consecuencias en el equipo, y conviene gestionarlas."], "intro": "Cuatro prácticas concretas si lidera personas", "items": ["<strong>Programar el envío.</strong> Si necesita trabajar el sábado o redactar un correo a las 11pm, no lo envíe en ese momento. Programe el envío para el lunes a las 9am. Su trabajo se hace cuando puede; el equipo recibe en horario.", "<strong>Decir explícitamente 'no espero respuesta ahora'.</strong> Si por alguna razón manda algo fuera de hora, escriba al inicio: 'No requiere respuesta hasta el lunes.' Esa frase reduce la presión real.", "<strong>Respetar el descanso del equipo en voz alta.</strong> En reuniones, decir abiertamente: 'No quiero que esto se trabaje el fin de semana.' Lo explícito tiene peso. Lo implícito se ignora.", "<strong>Modelar el cierre.</strong> Salir a una hora razonable, tomar almuerzo lejos del escritorio, irse de vacaciones sin estar conectado. Eso le da al equipo permiso real, no solo permiso teórico."]}, {"id": "p23", "type": "case_study", "moduleTitle": "Módulo 3: Sostenerlo en el tiempo", "title": "Caso: Marcos, líder que aprendió a no enviar mensajes a las 11pm", "image": "assets/images/img_09.jpg", "audio": "assets/audio/audio_07.mp3", "audio_script": "Marcos es gerente de producto. Cuarenta y dos años. Doce personas a cargo. Trabajaba mucho. Le gustaba su trabajo. Y solía mandar mensajes a su equipo... a las once de la noche. A veces los sábados también. Para él... era cuando podía pensar en calma. Para el equipo... era una señal. Si el jefe trabaja a esas horas... uno también debería. Una de sus colaboradoras le dijo algo... en una conversación uno a uno. Marcos... cuando me mandás mensajes a las once... yo siento que tengo que estar disponible también. Aunque me digas que no es urgente. Marcos no se ofendió. Hizo dos cambios concretos al día siguiente. Programó todos los envíos de la mañana siguiente. Y empezó las reuniones diciendo... no quiero que esto se trabaje el fin de semana. Tres meses después... el equipo le dijo... se siente distinto trabajar acá.", "subtitle": "El ejemplo del líder es lo que más enseña sobre cultura de trabajo", "body": "Lo que Marcos descubrió es lo que casi todos los líderes no notan: <strong>el equipo lee las acciones, no las palabras.</strong> Que Marcos dijera 'no se preocupen, contesten cuando puedan' no cambiaba la dinámica. Lo que la cambió fueron sus acciones.<br><br><strong>Cambio 1: programar el envío.</strong> Marcos siguió trabajando algunas noches cuando lo necesitaba. Pero los correos salían programados para las 9am del siguiente día hábil. Su trabajo se hacía cuando podía; el equipo recibía en horario.<br><br><strong>Cambio 2: pedirlo explícitamente.</strong> Al abrir las reuniones de planificación, Marcos decía con claridad: 'No quiero que este proyecto se trabaje los fines de semana.' Cuando es explícito, las personas lo creen. Cuando es implícito, asumen lo contrario.<br><br><strong>Lo que aprendió Marcos:</strong> sostener el equilibrio para sí mismo es importante. Pero como líder, hay una responsabilidad adicional: gestionar las señales que se envían al equipo. Esas señales viajan más rápido y se interpretan con más peso de lo que se cree.<br><br><strong>En síntesis:</strong> el equilibrio del líder no es solo personal. Es político: define el ritmo de un equipo entero. Y cuando se descuida ese ritmo, el costo lo pagan las personas que dependen de él."}, {"id": "p24", "type": "timeline", "moduleTitle": "Módulo 3: Sostenerlo en el tiempo", "title": "Señales de erosión: seis momentos de la semana donde notarlo", "image": null, "intro": "El equilibrio rara vez se rompe de un día para otro. Se erosiona gradualmente. Estos seis momentos de la semana son cuando las señales aparecen más claramente.", "events": [{"time": "Lunes 8 AM", "title": "Cómo empieza la semana", "description": "<strong>Señal de erosión:</strong> entrar al lunes ya cansado. Sentir que el fin de semana no descansó nada.<br><br><strong>Lo que indica:</strong> probablemente trabajó el fin de semana (aunque sea revisando mensajes). La señal no es el cansancio puntual, sino que se repita varios lunes seguidos."}, {"time": "Martes 4 PM", "title": "La sensación a media semana", "description": "<strong>Señal de erosión:</strong> sensación de que ya está esperando el fin de semana, con la semana recién empezada.<br><br><strong>Lo que indica:</strong> el trabajo dejó de aportar interés y se volvió solo tarea a atravesar. Esto pasa cuando llevamos demasiado tiempo en modo supervivencia."}, {"time": "Miércoles 9 PM", "title": "La hora de cierre real", "description": "<strong>Señal de erosión:</strong> seguir trabajando o pensando en trabajo a las 9pm sin necesidad real.<br><br><strong>Lo que indica:</strong> el horario laboral perdió límite. Cuando 'una hora más' se vuelve costumbre tres o cuatro veces por semana, ya no es excepción: es el nuevo ritmo."}, {"time": "Jueves 11 AM", "title": "La calidad del trabajo en tareas profundas", "description": "<strong>Señal de erosión:</strong> cuesta concentrarse en tareas que antes hacía sin problema. Necesita más café, más pausas no planificadas, releer lo mismo varias veces.<br><br><strong>Lo que indica:</strong> la fatiga cognitiva se acumuló. El cerebro ya no rinde al nivel habitual, aunque las horas trabajadas sean similares."}, {"time": "Viernes 6 PM", "title": "Cómo se cierra la semana", "description": "<strong>Señal de erosión:</strong> sentir alivio extremo al terminar la semana, no satisfacción. Más ganas de desconectar de todo que de hacer algo con el tiempo libre.<br><br><strong>Lo que indica:</strong> la semana fue de aguante, no de trabajo sostenible. Tres semanas seguidas así son señal clara de que algo cambió y no para mejor."}, {"time": "Domingo 8 PM", "title": "La ansiedad anticipatoria", "description": "<strong>Señal de erosión:</strong> ansiedad creciente el domingo a la noche pensando en la semana que viene. Dificultad para dormir el domingo.<br><br><strong>Lo que indica:</strong> el trabajo se metió en su tiempo personal. Si el domingo a la noche genera angustia, no es porque sea domingo: es porque algo del trabajo está pendiente, sin resolver, o cargado emocionalmente."}]}, {"id": "p25", "type": "interactive_checklist", "moduleTitle": "Módulo 3: Sostenerlo en el tiempo", "title": "Mi revisión semanal sostenible: siete chequeos del lunes", "image": null, "intro": "Esta es la herramienta práctica del curso. Cada lunes (idealmente al inicio del día, antes de abrir el correo), marque cuáles cumple esta semana. Si más de tres están sin marcar varias semanas seguidas, es señal de actuar.", "items": [{"label": "Tengo identificadas las 3 prioridades de la semana", "detail": "No 10. Tres. Lo demás es contexto o se subordina a estas tres. Sin esto, todo parece urgente."}, {"label": "Tengo al menos una hora bloqueada por día para trabajo profundo", "detail": "Sin reuniones, sin chat, sin correo. Una hora real protegida. Si no la tiene, la primera tarea de la semana es reservarla en su calendario."}, {"label": "Tengo definida una hora de cierre realista para esta semana", "detail": "Una hora concreta, no 'cuando termine'. Si la jornada es 8-6, entonces 6 es 6. Si hay excepciones, son excepciones, no costumbre."}, {"label": "Tengo planificada al menos una desconexión real esta semana", "detail": "Almuerzo lejos de la pantalla, caminata sin celular, conversación no laboral. Algo concreto, no 'voy a tratar de descansar'."}, {"label": "No me comprometí a más de lo que puedo hacer con calidad", "detail": "Si miro mi semana y ya sé que voy a tener que trabajar el fin de semana, es señal de que asumí demasiado. Renegociar ahora cuesta menos que entregar mal después."}, {"label": "Si lidero personas, mis acciones esta semana respetan el descanso del equipo", "detail": "Mensajes programados, expectativas explícitas, no enviar fuera de hora salvo emergencia real. Solo si tiene personas a cargo."}, {"label": "Sé qué voy a hacer este fin de semana que NO sea trabajo", "detail": "Al menos una cosa concreta planificada que no sea trabajo. No tiene que ser grande. Tiene que ser explícita."}], "closing": "<strong>Si marca 5-7:</strong> está sosteniendo el equilibrio. Mantenga la práctica.<br><strong>Si marca 3-4:</strong> hay erosión que vale la pena revisar antes de que crezca.<br><strong>Si marca menos de 3:</strong> ya hay problema instalado. Conviene actuar esta misma semana, no la próxima."}, {"id": "p26", "type": "statement_paragraphs", "moduleTitle": "Módulo 3: Sostenerlo en el tiempo", "title": "Cómo recuperar el equilibrio cuando se ha erosionado", "image": null, "statement": "Recuperar el equilibrio no es tomar vacaciones largas. Es hacer cambios concretos en cómo se trabaja la próxima semana.", "paragraphs": ["Cuando alguien se da cuenta de que su equilibrio se erosionó, suele pensar en soluciones grandes: cambiar de trabajo, irse dos semanas de vacaciones, hablar con un coach. Esas soluciones pueden ayudar, pero rara vez son lo primero. Lo primero es práctico y modesto: ajustar la semana que sigue."], "intro": "Cuatro pasos para recuperar el equilibrio sin grandes gestos", "items": ["<strong>Hacer un diagnóstico honesto.</strong> ¿Qué de la semana pasada hubiera sido evitable con mejor planificación o conversaciones distintas? Sin culpa, solo con curiosidad práctica.", "<strong>Elegir UN cambio para implementar esta semana.</strong> No tres. Uno. Por ejemplo: la primera hora del día protegida sin correo. Si no se sostiene un cambio chico, no se va a sostener uno grande.", "<strong>Tener una conversación pendiente.</strong> Casi siempre hay una conversación que se viene postergando (con jefe, cliente, equipo) que está alimentando el desequilibrio. Tenerla esta semana, no la que viene.", "<strong>Volver a medir en 14 días.</strong> Después de dos semanas con el cambio aplicado, revisar la revisión semanal del lunes. Si mejoró, sostener. Si no, probar otro cambio."]}, {"id": "p27", "type": "knowledge_check", "moduleTitle": "Módulo 3: Sostenerlo en el tiempo", "title": "Verifique lo aprendido", "image": null, "questions": [{"type": "single", "stem": "Carolina lidera un equipo de 8 personas. A veces trabaja los domingos a la noche para 'adelantar la semana' y manda correos en ese horario. Le dice al equipo 'no se preocupen, contesten cuando puedan'. ¿Cuál es el problema principal?", "options": ["No hay problema, porque les dijo que no contestaran enseguida.", "El equipo lee sus acciones, no sus palabras. Mandar correos los domingos comunica que el ritmo esperado incluye el domingo, aunque verbalmente diga otra cosa.", "Trabajar los domingos es siempre incorrecto.", "Debería despedir a quienes le respondan los domingos."], "correctAnswer": 1, "correct": 1, "feedback": {"correct": "Correcto. Las palabras del líder pesan poco frente a sus acciones. Si necesita trabajar el domingo, puede programar el envío para el lunes. Esa es la solución concreta.", "incorrect": "Recuerde el principio del módulo: el equipo lee acciones, no palabras. Trabajar uno mismo no es el problema; emitir señales que se interpreten como expectativas del equipo, sí lo es."}}, {"type": "single", "stem": "Según el módulo, cuando alguien nota que su equilibrio se ha erosionado, ¿cuál es la primera acción más útil?", "options": ["Tomar dos semanas de vacaciones inmediatamente.", "Cambiar de trabajo si es posible.", "Hacer un diagnóstico honesto de la semana pasada y elegir UN cambio concreto para implementar la semana siguiente.", "Hablar con un coach o psicólogo de inmediato."], "correctAnswer": 2, "correct": 2, "feedback": {"correct": "Correcto. La recuperación empieza con cambios concretos y modestos en la semana siguiente, no con soluciones grandes. Si no se sostiene un cambio chico, no se sostiene uno grande.", "incorrect": "Revise: las soluciones grandes (vacaciones largas, cambio de trabajo, coaching) pueden ayudar después. Pero lo primero, y lo más útil, es un diagnóstico honesto y UN cambio concreto en la semana que sigue."}}]}, {"id": "p28", "type": "module_outro", "moduleTitle": "Módulo 3: Sostenerlo en el tiempo", "title": "Lo que cierra este módulo", "image": null, "items": ["<strong>Si lidera personas, su ejemplo cuenta el doble.</strong> Lo que el equipo le ve hacer es más fuerte que lo que les dice. Programar envíos, ser explícito sobre expectativas, y modelar el cierre son prácticas concretas que cambian la cultura del equipo.", "<strong>El equilibrio se erosiona gradualmente.</strong> Hay seis momentos de la semana donde notarlo: lunes 8am, martes 4pm, miércoles 9pm, jueves 11am, viernes 6pm, domingo 8pm. Una mala señal puntual no es problema; varias semanas seguidas sí.", "<strong>La recuperación empieza con cambios concretos y modestos.</strong> Diagnóstico honesto, UN cambio para la semana siguiente, una conversación pendiente, y volver a medir en 14 días. Si no se sostiene un cambio chico, no se va a sostener uno grande."]}]}, {"id": "m4", "title": "Cierre y evaluación", "screens": [{"id": "p29", "type": "quiz", "moduleTitle": "Cierre y evaluación", "title": "Evaluación final del curso", "image": null, "intro": "Diez preguntas sobre lo trabajado en los tres módulos. Para aprobar necesita 80% o más (8 de 10).", "passingScore": 80, "questions": [{"type": "single", "stem": "Marcos lleva tres meses respondiendo cada mensaje del jefe en menos de 5 minutos, incluso fuera de hora, y trabajando hasta las 11pm casi todas las noches. ¿Cómo describiría su situación?", "options": ["Está trabajando bien: alta disponibilidad y compromiso visible.", "Está ocupado, no necesariamente trabajando bien. El patrón sugiere costos invisibles acumulándose.", "Debería trabajar todavía más horas para asegurar resultados.", "Es la única manera de ser un buen profesional hoy."], "correctAnswer": 1, "correct": 1}, {"type": "single", "stem": "Su cliente le pide algo el viernes a las 7pm con plazo el lunes 9am. ¿Cuál es la respuesta más profesional Y sostenible?", "options": ["Ignorar hasta el lunes 9am.", "Responder 'sí, lo hago' y trabajar el fin de semana.", "Responder rápido con una alternativa concreta: 'Lo veo el lunes a primera hora y te confirmo el horario.'", "Apagar el celular hasta el lunes sin avisar."], "correctAnswer": 2, "correct": 2}, {"type": "single", "stem": "Según los datos del módulo 1, ¿qué pasa con la productividad después de aproximadamente 55 horas semanales?", "options": ["Sigue aumentando proporcionalmente con cada hora adicional.", "Las horas adicionales no producen más output; se pierde en errores y fatiga lo que se gana en tiempo.", "Aumenta drásticamente si la persona está motivada.", "Depende solo del tipo de trabajo."], "correctAnswer": 1, "correct": 1}, {"type": "single", "stem": "En una conversación de límites con el jefe, ¿cuál es la mejor forma de plantear el tema?", "options": ["'Estoy agotada, ya no puedo más, necesito que algo cambie.'", "'Llevo tres semanas sin descansar bien, esto es injusto.'", "'Esta semana tuve X reuniones y Y entregables. Si sostengo este ritmo, la calidad de A va a caer. Veo tres opciones para reorganizar: priorizar B, postergar C, o reducir el alcance de A.'", "Esperar a que el jefe se dé cuenta solo."], "correctAnswer": 2, "correct": 2}, {"type": "single", "stem": "¿Qué define mejor la 'desconexión real' fuera del horario laboral?", "options": ["Apagar la computadora a las 6pm.", "Lograr que la mente deje de estar en modo trabajo, con prácticas concretas: ritual de cierre, notificaciones apagadas, espacio físico separado, conversaciones no laborales.", "Tomar dos semanas de vacaciones una vez al año.", "Trabajar más rápido para terminar antes."], "correctAnswer": 1, "correct": 1}, {"type": "single", "stem": "Si lidera personas y necesita redactar un correo el domingo a las 11pm, ¿qué conviene hacer?", "options": ["Enviarlo inmediatamente para que esté listo.", "Programar el envío para el lunes a las 9am, así su trabajo se hace cuando puede pero el equipo recibe en horario.", "Esperar hasta el lunes y reescribirlo desde cero.", "Pedirle a otro miembro del equipo que lo envíe."], "correctAnswer": 1, "correct": 1}, {"type": "multiple", "stem": "¿Cuáles de estos son mitos sobre el equilibrio vida-trabajo? (Marque todas las correctas.)", "options": ["Si me dedico más horas, voy a producir más, sin importar cuántas sean.", "Si pongo límites, voy a verme poco comprometido.", "El equilibrio es para gente sin ambición.", "Sostener límites claros suele aumentar la percepción de confiabilidad profesional."], "correctAnswer": [0, 1, 2], "correct": [0, 1, 2]}, {"type": "single", "stem": "¿Cuál NO es uno de los seis momentos de la semana donde notar erosión del equilibrio?", "options": ["Lunes a las 8am: cómo empieza la semana.", "Miércoles 9pm: seguir trabajando sin necesidad real.", "Domingo 8pm: ansiedad anticipatoria por la semana q   <script>
/**
 * Aacrom Course Player
 * Curso: P-A.1 · El arte de la guerra aplicado a los negocios
 */

(function () {
  'use strict';

  let course = null;
  let allScreens = [];
  let currentIndex = 0;
  let completedScreens = new Set();
  let quizFinalized = false;
  let quizState = {};
  let scenarioState = { exploredOptions: new Set(), convergentShown: false };

  // ==========================================================
  // INIT
  // ==========================================================
  async function init() {
    try {
      course = window.COURSE_DATA;
      buildScreenList();
      buildSidebar();
      loadProgress();
      renderScreen();
      bindNav();
    } catch (e) {
      document.getElementById('screen-container').innerHTML = '<p style="padding:40px;color:#B02A2A">Error cargando el curso: ' + e.message + '</p>';
    }
  }

  function buildScreenList() {
    allScreens = [];
    course.modules.forEach((mod, mi) => {
      mod.screens.forEach((scr, si) => {
        allScreens.push({ ...scr, moduleIndex: mi, screenIndex: si });
      });
    });
    document.getElementById('course-title').textContent = course.title;
  }

  function buildSidebar() {
    const nav = document.getElementById('module-nav');
    nav.innerHTML = '';
    course.modules.forEach((mod, idx) => {
      const item = document.createElement('div');
      item.className = 'module-item';
      item.dataset.moduleIndex = idx;
      item.innerHTML = `
        <div class="icon">≡</div>
        <div class="title">${mod.title}</div>
        <div class="check"></div>
      `;
      item.addEventListener('click', () => jumpToModule(idx));
      nav.appendChild(item);
    });
  }

  function jumpToModule(moduleIndex) {
    const first = allScreens.findIndex(s => s.moduleIndex === moduleIndex);
    if (first >= 0) { currentIndex = first; renderScreen(); }
    document.getElementById('sidebar').classList.remove('open');
  }

  function loadProgress() {
    var saved = null;
    try {
      if (window.AacromSCORM && window.AacromSCORM.isInitialized && window.AacromSCORM.isInitialized()) {
        saved = window.AacromSCORM.getSuspendData();
      }
    } catch (e) {}
    if (!saved) { try { saved = JSON.parse(sessionStorage.getItem('aacrom_progress_c6') || '{}'); } catch (e) { saved = {}; } }
    try {
      if (saved && saved.completed) completedScreens = new Set(saved.completed);
      if (saved && typeof saved.current === 'number') currentIndex = Math.min(saved.current, allScreens.length - 1);
    } catch (e) {}
  }

  function saveProgress() {
    var data = { completed: Array.from(completedScreens), current: currentIndex };
    try { sessionStorage.setItem('aacrom_progress_c6', JSON.stringify(data)); } catch (e) {}
    try {
      if (window.AacromSCORM && window.AacromSCORM.isInitialized && window.AacromSCORM.isInitialized()) {
        window.AacromSCORM.setSuspendData(data);
        window.AacromSCORM.commit();
      }
    } catch (e) {}
  }

  // ==========================================================
  // SIDEBAR UPDATE
  // ==========================================================
  function updateSidebar() {
    const items = document.querySelectorAll('.module-item');
    const currentModule = allScreens[currentIndex].moduleIndex;

    items.forEach((item, idx) => {
      item.classList.remove('active', 'current', 'completed');
      const modScreens = allScreens.filter(s => s.moduleIndex === idx);
      const modCompleted = modScreens.every(s => completedScreens.has(s.id));

      if (idx === currentModule) item.classList.add('active', 'current');
      if (modCompleted) item.classList.add('completed');
    });

    const totalScreens = allScreens.length;
    const completed = completedScreens.size;
    const pct = Math.round((completed / totalScreens) * 100);
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-text').textContent = pct + '% COMPLETADO';
  }

  // ==========================================================
  // RENDER SCREEN
  // ==========================================================
  function renderScreen() {
    const screen = allScreens[currentIndex];
    document.getElementById('screen-counter').textContent = (currentIndex + 1) + ' de ' + allScreens.length;

    const container = document.getElementById('screen-container');
    container.scrollTop = 0;

    let html = '';
    switch (screen.type) {
      case 'course_cover':       html = renderCourseCover(screen); break;
      case 'statement_list':     html = renderStatementList(screen); break;
      case 'module_intro':       html = renderModuleIntro(screen); break;
      case 'paragraph_audio':    html = renderParagraphAudio(screen); break;
      case 'hotspots':           html = renderHotspots(screen); break;
      case 'tabs':               html = renderTabs(screen); break;
      case 'case_study':         html = renderCaseStudy(screen); break;
      case 'module_outro':       html = renderModuleOutro(screen); break;
      case 'knowledge_check':    html = renderKnowledgeCheck(screen); break;
      case 'accordion':          html = renderAccordion(screen); break;
      case 'statement_paragraph':html = renderStatementParagraph(screen); break;
      case 'sorting':            html = renderSorting(screen); break;
      case 'decision_matrix':    html = renderDecisionMatrix(screen); break;
      case 'decision_scenario':  html = renderDecisionScenario(screen); break;
      case 'quiz':               html = renderQuiz(screen); break;
      case 'module_intro_full':  html = renderModuleIntroFull(screen); break;
      case 'paragraphs':         html = renderParagraphs(screen); break;
      case 'statement_paragraphs': html = renderStatementParagraphs(screen); break;
      case 'closing_resources':  html = renderClosingResources(screen); break;
      case 'course_cover_objective': html = renderCourseCoverObjective(screen); break;
      case 'hero_image':         html = renderHeroImage(screen); break;
      case 'stat_callout':       html = renderStatCallout(screen); break;
      case 'comparison_cards':   html = renderComparisonCards(screen); break;
      case 'flip_cards':         html = renderFlipCards(screen); break;
      case 'timeline':           html = renderTimeline(screen); break;
      case 'interactive_checklist': html = renderInteractiveChecklist(screen); break;
      default:                   html = `<div style="padding:40px;">Tipo no implementado: ${screen.type}</div>`;
    }

    container.innerHTML = html;

    if (screen.type === 'hotspots')          attachHotspotEvents(screen);
    else if (screen.type === 'tabs')          attachTabEvents(screen);
    else if (screen.type === 'accordion')     attachAccordionEvents(screen);
    else if (screen.type === 'knowledge_check')attachKCEvents(screen);
    else if (screen.type === 'sorting')       attachSortingEvents(screen);
    else if (screen.type === 'decision_matrix')attachMatrixEvents(screen);
    else if (screen.type === 'decision_scenario')attachScenarioEvents(screen);
    else if (screen.type === 'quiz')          attachQuizEvents(screen);

    if (!isInteractiveScreen(screen)) completedScreens.add(screen.id);
    updateSidebar();
    updateFooterNav();
    saveProgress();
  }

  function isInteractiveScreen(screen) {
    return ['knowledge_check', 'sorting', 'quiz', 'decision_scenario'].includes(screen.type);
  }

  // ==========================================================
  // RENDERERS
  // ==========================================================
  function audioHTML(audioFile) {
    if (!audioFile) return '';
    return `
      <div class="instructions-box">
        <div class="badge-icon"></div>
        <div class="text"><strong>Instrucciones:</strong> presione el botón "▶" y escuche atentamente el audio.</div>
      </div>
      <audio controls preload="metadata"><source src="${audioFile}" type="audio/mpeg">Su navegador no soporta audio.</audio>
    `;
  }

  function headerHTML(screen, withImage = false) {
    const imgStyle = withImage && screen.image
      ? `style="background-image: url('${screen.image}')"`
      : '';
    const moduleLabel = screen.moduleTitle || '';
    return `
      <div class="screen-header ${withImage && screen.image ? 'with-image' : ''}" ${imgStyle}>
        <h1>${screen.title}</h1>
        <div class="header-line"></div>
      </div>
    `;
  }

  function renderCourseCover(s) {
    return `
      ${headerHTML(s, true)}
      <div class="screen-body">
        <h2 class="subtitle-blue">${s.title}</h2>
        ${audioHTML(s.audio)}
        ${s.body.map(p => `<p>${p}</p>`).join('')}
      </div>
    `;
  }

  function renderStatementList(s) {
    return `
      ${headerHTML(s, !!s.image)}
      <div class="screen-body">
        ${s.statement ? `<div class="statement">${s.statement}</div>` : ''}
        ${s.audio ? audioHTML(s.audio) : ''}
        ${s.intro ? `<p style="font-weight:600;color:var(--aacrom-primary);margin-top:30px">${s.intro}</p>` : ''}
        <ul class="aacrom-list">${s.items.map(i => `<li><span>${i}</span></li>`).join('')}</ul>
      </div>
    `;
  }

  function renderModuleIntro(s) {
    return `
      ${headerHTML(s, true)}
      <div class="screen-body">
        ${audioHTML(s.audio)}
        <div class="statement">${s.statement}<span class="statement-citation">${s.citation}</span></div>
      </div>
    `;
  }

  function renderParagraphAudio(s) {
    return `
      ${headerHTML(s, !!s.image)}
      <div class="screen-body">
        ${audioHTML(s.audio)}
        <p class="justify">${s.body}</p>
      </div>
    `;
  }

  function renderStatementParagraph(s) {
    return `
      ${headerHTML(s, !!s.image)}
      <div class="screen-body">
        <div class="statement">${s.statement}</div>
        ${audioHTML(s.audio)}
        ${s.subheading ? `<h3 style="text-align:center;color:var(--aacrom-primary);margin:30px 0 18px;font-size:22px">${s.subheading}</h3>` : ''}
        <p class="justify">${s.body}</p>
      </div>
    `;
  }

  function renderCaseStudy(s) {
    return `
      ${headerHTML(s, false)}
      <div class="screen-body">
        ${audioHTML(s.audio)}
        <div class="case-card-wrapper">
          <div class="bg-image" style="background-image:url('${s.image}')"></div>
          <div class="card-content">
            ${s.subtitle ? `<div class="card-subtitle">${s.subtitle}</div>` : ''}
            <p>${s.body}</p>
          </div>
        </div>
      </div>
    `;
  }

  function renderModuleOutro(s) {
    return `
      ${headerHTML(s, false)}
      <div class="screen-body">
        <ul class="aacrom-list">${s.items.map(i => `<li><span>${i}</span></li>`).join('')}</ul>
      </div>
    `;
  }

  function renderHotspots(s) {
    return `
      ${headerHTML(s, false)}
      <div class="screen-body">
        <p>${s.intro}</p>
        <div class="hotspots-container">
          ${s.image ? `<img src="${s.image}" class="hotspots-image" alt="">` : ''}
          <div class="hotspots-list">
            ${s.hotspots.map((h, i) => `<button class="hotspot-btn" data-idx="${i}">${h.label}</button>`).join('')}
          </div>
          <div class="hotspot-content" id="hotspot-content"></div>
        </div>
      </div>
    `;
  }

  function renderTabs(s) {
    return `
      ${headerHTML(s, false)}
      <div class="screen-body">
        ${s.audio ? audioHTML(s.audio) : ''}
        <p>${s.intro}</p>
        <div class="tabs-container">
          <div class="tabs-nav">
            ${s.tabs.map((t, i) => `<button class="tab-btn ${i === 0 ? 'active' : ''}" data-idx="${i}">${t.title}</button>`).join('')}
          </div>
          ${s.tabs.map((t, i) => `<div class="tab-panel ${i === 0 ? 'active' : ''}" data-idx="${i}">${t.content}</div>`).join('')}
        </div>
      </div>
    `;
  }

  function renderAccordion(s) {
    return `
      ${headerHTML(s, false)}
      <div class="screen-body">
        ${s.audio ? audioHTML(s.audio) : ''}
        <p>${s.intro}</p>
        <div class="accordion">
          ${s.items.map((it, i) => `
            <div class="accordion-item" data-idx="${i}">
              <div class="accordion-header">
                <span>${it.title}</span>
                <span class="toggle">+</span>
              </div>
              <div class="accordion-content"><div class="accordion-content-inner">${it.content}</div></div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  function renderDecisionMatrix(s) {
    const ordered = ['tl', 'tr', 'bl', 'br'];
    const qByPos = {};
    s.quadrants.forEach(q => qByPos[q.position] = q);
    return `
      ${headerHTML(s, false)}
      <div class="screen-body">
        <p>${s.intro}</p>
        <div class="matrix-container">
          <div class="matrix-grid">
            ${ordered.map((pos, i) => {
              const q = qByPos[pos];
              return `<div class="matrix-quadrant" data-pos="${pos}" style="background:${q.color}">${q.label}</div>`;
            }).join('')}
          </div>
          <div class="matrix-label-x">${s.xAxis}</div>
          <div class="matrix-label-y">${s.yAxis}</div>
        </div>
        <div class="matrix-content" id="matrix-content"></div>
      </div>
    `;
  }

  function renderDecisionScenario(s) {
    const instructionsCallout = s.instructions ? `
      <div class="instructions-callout">
        <div class="callout-icon">!</div>
        <div class="callout-text">${s.instructions}</div>
      </div>
    ` : '';
    return `
      ${headerHTML(s, false)}
      <div class="screen-body">
        <div class="scenario-container">
          <div class="scenario-intro-card">
            <p style="text-align:left;font-size:17px">${s.intro_text || ''}</p>
          </div>

          ${instructionsCallout}

          <div class="dialogue-container" id="dialogue">
            ${(s.dialogue || []).map((d, i) => {
              const isAndres = d.character === 'Andrés';
              const isNarrator = d.character === 'Narrador';
              const cls = isAndres ? 'andres' : (isNarrator ? 'narrator' : '');
              const initial = isNarrator ? '"' : (d.character || '?').charAt(0);
              const dAudio = d.audio ? `<audio controls preload="metadata"><source src="${d.audio}" type="audio/mpeg"></audio>` : '';
              return `
                <div class="dialogue-line" data-idx="${i}">
                  <div class="dialogue-avatar ${cls}">${initial}</div>
                  <div class="dialogue-body">
                    <div class="dialogue-character">${d.character || ''}${d.role ? `<span class="role">${d.role}</span>` : ''}</div>
                    <div class="dialogue-text">${d.text || ''}</div>
                    ${dAudio}
                  </div>
                </div>
              `;
            }).join('')}
          </div>

          <div class="scenario-question">${s.question_text || '¿Qué decisión tomaría?'}</div>
          <div class="scenario-options" id="scenario-options">
            ${s.options.map(o => `
              <button class="scenario-option-btn" data-id="${o.id}">
                <div><span class="option-id">${o.id}</span><span class="option-label">${o.label}</span></div>
                <div class="option-sub">${o.subtitle || ''}</div>
              </button>
            `).join('')}
          </div>

          <div class="scenario-result" id="scenario-result" style="display:none"></div>

          <div class="scenario-convergent" id="scenario-convergent">
            <h4>${s.convergent_title || ''}</h4>
            <p>${s.convergent_text || ''}</p>
            ${s.convergent_audio ? `<audio controls preload="metadata" style="margin-top:16px;max-width:100%;filter:invert(0.85) hue-rotate(180deg)"><source src="${s.convergent_audio}" type="audio/mpeg"></audio>` : ''}
          </div>
        </div>
      </div>
    `;
  }

  function renderKnowledgeCheck(s) {
    return `
      ${headerHTML(s, false)}
      <div class="screen-body">
        ${s.questions.map((q, i) => `
          <div class="question-card" data-qidx="${i}">
            <div class="question-counter">PREGUNTA ${i + 1} DE ${s.questions.length}</div>
            <div class="question-stem">${q.stem}</div>
            <div class="options-container">
              ${q.options.map((opt, j) => `
                <div class="option-row" data-opt="${j}">
                  <input type="${q.type === 'multiple' ? 'checkbox' : 'radio'}" name="q${i}" id="q${i}o${j}" value="${j}">
                  <label for="q${i}o${j}">${opt}</label>
                </div>
              `).join('')}
            </div>
            <button class="quiz-submit" data-qidx="${i}">Verificar respuesta</button>
            <div class="feedback-box"><div class="feedback-title"></div><p></p></div>
          </div>
        `).join('')}
      </div>
    `;
  }

  function renderSorting(s) {
    const shuffled = [...s.items].map((it, i) => ({ ...it, originalIdx: i })).sort(() => Math.random() - 0.5);
    return `
      ${headerHTML(s, false)}
      <div class="screen-body">
        <p style="font-weight:600;color:var(--aacrom-primary)">${s.instruction}</p>
        <div class="sorting-container">
          <div class="sorting-items-pool" id="sorting-pool" data-zone="pool">
            ${shuffled.map((it, i) => `
              <div class="sortable-item" draggable="true" data-original="${it.originalIdx}" data-category="${it.category}">${it.text}</div>
            `).join('')}
          </div>
          <div class="sorting-categories">
            ${s.categories.map((cat, i) => `
              <div class="sorting-category" data-zone="${i}">
                <div class="sorting-category-title">${cat}</div>
                <div class="sorting-drop-zone"></div>
              </div>
            `).join('')}
          </div>

  function attachHotspotEvents(screen) {

    btns.forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);

        content.classList.add('show');
        if (viewed.size === screen.hotspots.length) {
          completedScreens.add(screen.id);
          updateSidebar(); saveProgress();
        }
      });
    });
  }

  function attachTabEvents(screen) {
    const btns = document.querySelectorAll('.tab-btn');
    const panels = document.querySelectorAll('.tab-panel');
    let viewed = new Set([0]);
    btns.forEach(btn => {

  function attachKCEvents(screen) {
    document.querySelectorAll('.question-card').forEach(card => {
      const qidx = parseInt(card.dataset.qidx);
      const q = screen.questions[qidx];
      const submitBtn = card.querySelector('.quiz-submit');
      const feedback = card.querySelector('.feedback-box');

      // Toggle selected style
      card.querySelectorAll('.option-row').forEach(row => {
        row.addEventListener('click', () => {
          if (q.type === 'single') {
            card.querySelectorAll('.option-row').forEach(r => r.classList.remove('selected'));
            row.classList.add('selected');
            row.querySelector('input').checked = true;
          } else {
            const input = row.querySelector('input');
            input.checked = !input.checked;
            row.classList.toggle('selected', input.checked);
          }
        });
      });

      submitBtn.addEventListener('click', () => {
        const inputs = card.querySelectorAll('input');
        const selected = Array.from(inputs).map((inp, i) => inp.checked ? i : null).filter(x => x !== null);
        if (selected.length === 0) {
          feedback.classList.remove('correct', 'incorrect');
          feedback.classList.add('show');
          feedback.querySelector('.feedback-title').textContent = 'Seleccione una respuesta';
          feedback.querySelector('p').textContent = '';
          return;
        }
        let correct = false;
        if (q.type === 'multiple') {
          const correctSet = new Set(q.correct);
          const selSet = new Set(selected);
          correct = correctSet.size === selSet.size && Array.from(correctSet).every(x => selSet.has(x));
        } else {
          correct = selected[0] === q.correct;
        }
        // marca visual
        card.querySelectorAll('.option-row').forEach((row, i) => {
          row.classList.remove('correct', 'incorrect');
          const correctIdx = q.type === 'multiple' ? q.correct : [q.correct];
          if (correctIdx.includes(i)) row.classList.add('correct');
          else if (selected.includes(i)) row.classList.add('incorrect');
        });
        feedback.classList.add('show');
        feedback.classList.toggle('correct', correct);
        feedback.classList.toggle('incorrect', !correct);
        feedback.querySelector('.feedback-title').textContent = correct ? '¡Correcto!' : 'Revisemos esto:';
        // q.feedback es un objeto {correct, incorrect}, no un string
        var fbObj = q.feedback || {};
        var fbText = correct ? (fbObj.correct || '¡Bien hecho!') : (fbObj.incorrect || 'Revisemos la respuesta.');
        feedback.querySelector('p').textContent = fbText;
        submitBtn.disabled = true;
        inputs.forEach(i => i.disabled = true);

        // marca completado si todas las preguntas respondidas
        const allAnswered = Array.from(document.querySelectorAll('.question-card .quiz-submit')).every(b => b.disabled);
        if (allAnswered) {
          completedScreens.add(screen.id);
          updateSidebar(); saveProgress();
        }
      });
    });
  }

  function attachSortingEvents(screen) {
    let dragged = null;
    document.querySelectorAll('.sortable-item').forEach(item => {
      item.addEventListener('dragstart', (e) => {
        dragged = item;
        item.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      item.addEventListener('dragend', () => {
        item.classList.remove('dragging');
        dragged = null;
      });
    });

    document.querySelectorAll('.sorting-category, #sorting-pool').forEach(zone => {
      const dropZone = zone.querySelector('.sorting-drop-zone') || zone;
      zone.addEventListener('dragover', (e) => {
        e.preventDefault();
        zone.classList.add('drag-over');
      });
      zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
      zone.addEventListener('drop', (e) => {
        e.preventDefault();
        zone.classList.remove('drag-over');
        if (dragged) {
          (zone.querySelector('.sorting-drop-zone') || zone).appendChild(dragged);
        }
      });
    });

    document.getElementById('sorting-check').addEventListener('click', () => {
      const items = document.querySelectorAll('.sortable-item');
      let allCorrect = true;
      items.forEach(item => {
        const parent = item.closest('.sorting-category');
        if (!parent) { allCorrect = false; return; }
        const zone = parseInt(parent.dataset.zone);
        const cat = parseInt(item.dataset.category);
        item.classList.remove('correct-placed', 'wrong-placed');
        if (zone === cat) item.classList.add('correct-placed');
        else { item.classList.add('wrong-placed'); allCorrect = false; }
      });
      const fb = document.getElementById('sorting-feedback');
      fb.classList.add('show');
      fb.classList.toggle('correct', allCorrect);
      fb.classList.toggle('incorrect', !allCorrect);
      fb.querySelector('.feedback-title').textContent = allCorrect ? '¡Excelente! Todas correctas.' : 'Algunas no están bien ubicadas.';
      fb.querySelector('p').textContent = screen.feedback;
      if (allCorrect) {
        completedScreens.add(screen.id);
        updateSidebar(); saveProgress();
      }
    });
  }
