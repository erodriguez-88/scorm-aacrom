tos de cumplimiento de Ley 8204 (prevención de legitimación de capitales).<br>· Información mínima identificativa para reportes regulatorios pendientes.<br><br><strong>Lo que aprendió el banco:</strong><br>1. El asesor de la primera llamada NO sabía cómo procesar una solicitud de ejercicio de derechos. Tres meses después, el banco capacitó a TODO el personal de atención al cliente.<br>2. La respuesta inicial 'no podemos borrar nada por sistema' era incorrecta y, ante una denuncia, habría sido constitutiva de incumplimiento.<br>3. La forma correcta es: 'Reciba su solicitud, déjeme escalarla al área correspondiente, le confirmamos el plazo de respuesta'.<br><br><strong>La lección:</strong> el primer punto de contacto suele ser quien más necesita saber. Una buena política de datos no sirve si las personas que atienden no la conocen. Reconocer una solicitud, no minimizarla, escalarla correctamente: tres habilidades básicas que evitan denuncias regulatorias."}, {"id": "p17", "type": "knowledge_check", "moduleTitle": "Módulo 2: Ley 8968 y derechos de los titulares", "title": "Verifique lo aprendido", "image": null, "questions": [{"type": "single", "stem": "Una clienta llama y dice: 'Ya no quiero recibir las ofertas comerciales en mi correo, sáquenme de esa lista'. ¿Qué derecho está ejerciendo?", "options": ["Acceso.", "Rectificación.", "Cancelación de todos sus datos.", "Oposición a un uso específico (comercial)."], "correctAnswer": 3, "correct": 3, "feedback": {"correct": "Correcto. La oposición es el derecho a rechazar usos específicos de los datos (en este caso, marketing comercial), sin necesidad de borrar todos los datos. El famoso enlace 'darse de baja' al pie de los correos es la materialización del derecho de oposición.", "incorrect": "Revise: la clienta no está pidiendo borrar todo (cancelación) ni acceso a sus datos ni rectificación. Está oponiéndose a un USO específico (comercial). Es derecho de oposición."}}, {"type": "single", "stem": "Un colaborador suyo dice 'esa información del cliente la encontré en su perfil de LinkedIn, la puedo usar para enviarle ofertas porque es pública'. ¿Cuál es la respuesta correcta?", "options": ["Tiene razón, si está en redes sociales es pública.", "Que sea visible no equivale a autorización de uso para otro propósito; se necesita consentimiento del titular.", "Solo si LinkedIn lo permite expresamente en sus términos.", "Sí, pero solo si la persona acepta nuestra solicitud de conexión."], "correctAnswer": 1, "correct": 1, "feedback": {"correct": "Correcto. Este es uno de los mitos más comunes y peligrosos. La persona publicó en LinkedIn con propósito profesional, no para autorizar marketing comercial. La visibilidad NO equivale a autorización de uso. Usar esos datos para otro propósito sin consentimiento viola la Ley 8968.", "incorrect": "Recuerde el mito visto en el módulo: visibilidad pública NO equivale a autorización para usar los datos con propósito distinto. La Ley 8968 protege el propósito específico para el que se publicaron los datos."}}]}, {"id": "p18", "type": "module_outro", "moduleTitle": "Módulo 2: Ley 8968 y derechos de los titulares", "title": "Lo que cierra este módulo", "image": null, "items": ["<strong>La Ley 8968 protege personas, no datos.</strong> Cambia la pregunta de 'qué puedo hacer con los datos' a 'qué le debo a la persona'.", "<strong>Cinco derechos ARCO+:</strong> Acceso, Rectificación, Cancelación, Oposición e Información. Aplican siempre, no son favores que la organización concede.", "<strong>Cuando llega una solicitud:</strong> reconózcala, verifique identidad proporcional, documente, escale al responsable, ejecute en plazo, comunique resultado. El silencio equivale a incumplimiento."]}]}, {"id": "m3", "title": "Módulo 3: Ciberseguridad básica y brechas", "screens": [{"id": "p19", "type": "module_intro_full", "moduleTitle": "Módulo 3: Ciberseguridad básica y brechas", "moduleLabel": "MÓDULO 3", "title": "La línea entre la prevención y el desastre", "image": "assets/images/cd6_img_p19.jpg", "audio": "assets/audio/cd6_audio_p19.mp3", "audio_script": "Le damos la bienvenida al tercer y último módulo. Los dos módulos anteriores hablaron de principios. Qué son los datos personales. Qué dice la ley. Cómo respetar al titular. Este módulo es de práctica. De manos en la masa. Porque la teoría no detiene las brechas. Las brechas se detienen... con prácticas pequeñas, sostenidas todos los días. Una buena contraseña. Un correo verificado antes de enviar. Un clic no dado en un email sospechoso. Un sistema bloqueado al levantarse del puesto. Lo aburrido funciona. Lo espectacular... es lo que aparece en las noticias cuando algo ya salió mal. En este módulo vamos a entrenar tres reflejos básicos. Crear contraseñas que no se rompan. Detectar correos de phishing. Y responder cuando algo ya salió mal.", "statement": "La teoría no detiene las brechas. Las brechas se detienen con prácticas pequeñas, sostenidas todos los días. Lo aburrido funciona. Lo espectacular es lo que aparece en las noticias cuando algo ya salió mal.", "citation": "Principio operativo del módulo", "paragraphs": ["Los dos módulos anteriores hablaron de principios: qué son los datos personales, qué dice la ley, cómo respetar al titular. Este módulo es de práctica, de manos en la masa. Porque la teoría no detiene las brechas. Las brechas se detienen con prácticas pequeñas, sostenidas todos los días.", "Una buena contraseña. Un correo verificado antes de enviar. Un clic no dado en un email sospechoso. Un sistema bloqueado al levantarse del puesto. Lo aburrido funciona. Lo espectacular es lo que aparece en las noticias cuando algo ya salió mal."], "nextSteps": "Lo que va a encontrar en este módulo", "learnItems": ["Cómo crear una contraseña que realmente resista (con medidor interactivo).", "Cómo identificar un correo de phishing antes de hacer clic.", "Comparación: email sospechoso vs email legítimo lado a lado.", "Protocolo de respuesta ante una brecha de datos.", "Decisión simulada ante un email sospechoso."]}, {"id": "p20", "type": "password_strength_meter", "moduleTitle": "Módulo 3: Ciberseguridad básica y brechas", "title": "¿Qué tan fuerte es su contraseña?", "image": null, "intro": "Las contraseñas siguen siendo la primera línea de defensa para la mayoría de cuentas. Y siguen siendo, también, la más débil. Pruebe escribiendo una contraseña (puede ser real o inventada) y vea en tiempo real qué tan fuerte es y por qué.", "label": "Escriba una contraseña para evaluar", "placeholder": "Por ejemplo: Casa123 o Inv1erno!2025!Casa", "criteria": [{"key": "length", "label": "Al menos 12 caracteres", "weight": 25}, {"key": "uppercase", "label": "Contiene mayúsculas", "weight": 15}, {"key": "lowercase", "label": "Contiene minúsculas", "weight": 10}, {"key": "numbers", "label": "Contiene números", "weight": 15}, {"key": "symbols", "label": "Contiene símbolos (!@#$%)", "weight": 20}, {"key": "no_common", "label": "No es una palabra común", "weight": 15}], "levels": [{"tone": "lv-danger", "min": 0, "max": 30, "label": "DÉBIL", "title": "Vulnerable en segundos", "text": "Un atacante con herramientas básicas la rompería en menos de un minuto. NO use contraseñas así para nada importante."}, {"tone": "lv-elev", "min": 31, "max": 60, "label": "MEDIA", "title": "Mejorable", "text": "Resiste ataques simples pero no ataques dirigidos. Servible para cuentas no críticas, no para correo, banco, sistemas con datos personales."}, {"tone": "lv-warn", "min": 61, "max": 85, "label": "FUERTE", "title": "Sólida", "text": "Buena para uso general. Combinada con autenticación de dos factores (2FA), protección adecuada para la mayoría de los sistemas con datos personales."}, {"tone": "lv-safe", "min": 86, "max": 100, "label": "EXCELENTE", "title": "Robusta", "text": "Muy difícil de romper por fuerza bruta o diccionario. Si además es única (no reutilizada en otras cuentas), excelente para sistemas críticos."}], "common_words": ["password", "contrasena", "contraseña", "123456", "qwerty", "admin", "casa", "amor", "futbol", "mama", "papa", "hola", "abc123"], "takeaway": "<strong>Tres reglas prácticas para contraseñas en el trabajo:</strong><br>1) <strong>Longitud mata complejidad:</strong> 14 caracteres simples son más fuertes que 8 con todos los tipos. Las frases con espacios funcionan muy bien.<br>2) <strong>Nunca reutilizar la del trabajo en cuentas personales</strong> (ni viceversa). Si una se compromete, todas caen.<br>3) <strong>Use un gestor de contraseñas</strong> autorizado por su organización. Recordar 50 contraseñas únicas es imposible; un gestor lo resuelve."}, {"id": "p21", "type": "phishing_detector", "moduleTitle": "Módulo 3: Ciberseguridad básica y brechas", "title": "Identifique: ¿es phishing o es real?", "image": null, "intro": "El phishing es el tipo de ataque más común y barato para los atacantes. Funciona porque imita correos legítimos. Pruebe identificar cuáles de estos cuatro correos son intentos de phishing y cuáles son legítimos. Toque su respuesta y reciba retroalimentación inmediata.", "emails": [{"from": "soporte@banco-bcr-confirmacion.com", "subject": "Su cuenta será suspendida en 24 horas", "preview": "Estimado cliente, hemos detectado actividad inusual en su cuenta. Para evitar la suspensión, confirme sus datos en el siguiente enlace: http://bcr-actualizar.com/login. Tiene 24 horas o su cuenta será cancelada permanentemente.", "is_phishing": true, "indicators": ["Dominio sospechoso: 'banco-bcr-confirmacion.com' NO es el dominio oficial del banco.", "Urgencia artificial: '24 horas o su cuenta será cancelada' es presión típica de phishing.", "Enlace a URL no oficial: 'bcr-actualizar.com' es un dominio falso.", "Bancos legítimos nunca piden 'confirmar datos' por enlace en correo. Si dudas, llame directamente al banco."], "feedback_correct": "Correcto. Este es un phishing clásico que combina urgencia falsa + dominio falso + solicitud de credenciales por enlace.", "feedback_wrong": "Falló: este SÍ es phishing. Note el dominio 'banco-bcr-confirmacion.com' (no oficial), la urgencia artificial de 24 horas y el enlace a dominio falso. Los bancos nunca piden datos así."}, {"from": "rrhh@suempresa.com", "subject": "Actualización de su política de vacaciones — para revisión", "preview": "Hola, le compartimos para su revisión el documento actualizado de política de vacaciones que entra en vigencia el próximo trimestre. Por favor revíselo y envíe sus comentarios antes del viernes 28. Adjunto: politica_vacaciones_v2.pdf", "is_phishing": false, "indicators": ["Dominio interno de la empresa (suempresa.com).", "Tono profesional y consistente con comunicaciones internas habituales.", "Plazo razonable, no urgente.", "Solicitud razonable: revisar y comentar un documento de política interna."], "feedback_correct": "Correcto. Este correo es legítimo: dominio interno, tono profesional, plazo razonable, solicitud habitual. Aun así, antes de abrir el adjunto, conviene verificar con el remitente si se esperaba el correo.", "feedback_wrong": "En realidad este NO es phishing: dominio interno, tono profesional, plazo razonable. Es comunicación interna típica. Aun así, verifique siempre antes de abrir adjuntos."}, {"from": "noreply@microsoft-security-team.net", "subject": "URGENTE: Inicio de sesión sospechoso detectado", "preview": "Detectamos un inicio de sesión desde Rusia en su cuenta. Si no fue usted, debe verificar su identidad inmediatamente haciendo clic AQUÍ y proporcionando su contraseña actual. De lo contrario, su cuenta será bloqueada por seguridad.", "is_phishing": true, "indicators": ["Dominio sospechoso: 'microsoft-security-team.net' NO es dominio oficial de Microsoft (sería microsoft.com).", "Pide proporcionar la contraseña actual: las empresas legítimas NUNCA piden la contraseña por correo.", "Urgencia y miedo: 'Rusia', 'inmediatamente', 'bloqueada'.", "Enlace genérico 'AQUÍ' sin mostrar URL real."], "feedback_correct": "Correcto. Phishing clásico que se hace pasar por Microsoft. Dominio falso, pide contraseña directamente (algo que las empresas legítimas NUNCA hacen) y usa miedo + urgencia.", "feedback_wrong": "Falló: este SÍ es phishing. Microsoft (ni ninguna empresa seria) NUNCA pide su contraseña por correo. Dominio falso 'microsoft-security-team.net'. Note la urgencia + miedo."}, {"from": "facturacion@proveedor-conocido.com", "subject": "Factura electrónica #FE-2026-04572", "preview": "Estimados, adjuntamos factura electrónica correspondiente al servicio de mantenimiento del mes en curso. Vencimiento: 30 días naturales. Cualquier consulta, no dude en contactarnos al teléfono indicado. Saludos cordiales.", "is_phishing": false, "indicators": ["Comunicación tipo: factura electrónica de proveedor habitual.", "Tono profesional, sin urgencia artificial.", "Información concreta: número de factura, vencimiento estándar (30 días).", "Sin presión de hacer clic en enlaces ni proporcionar credenciales."], "feedback_correct": "Correcto. Este es un correo legítimo de facturación. Aun así, antes de procesar la factura, verifique con el área de cuentas por pagar que el proveedor sea efectivamente uno con el que se trabaja.", "feedback_wrong": "En realidad este NO es phishing: es un correo típico de facturación. No pide credenciales, no genera urgencia. Verifique con cuentas por pagar pero no es phishing."}], "takeaway": "<strong>Cuatro señales de phishing que casi siempre aparecen juntas:</strong><br>1) <strong>Urgencia artificial</strong> ('en 24 horas, inmediatamente, su cuenta será bloqueada').<br>2) <strong>Solicitud de credenciales</strong> (contraseña, datos bancarios, código verificador).<br>3) <strong>Dominio sospechoso</strong> que parece real pero NO es el oficial.<br>4) <strong>Enlaces genéricos</strong> ('haga clic aquí') sin URL visible.<br><br>Cuando vea dos o más juntas, NO haga clic. Reporte al área de seguridad de la información o al área de TI."}, {"id": "p22", "type": "side_by_side_comparison", "moduleTitle": "Módulo 3: Ciberseguridad básica y brechas", "title": "Email sospechoso vs email legítimo: cuatro señales clave", "image": null, "intro": "Después del juego de identificación, sistematicemos las cuatro señales que distinguen un correo de phishing de uno legítimo. La columna izquierda muestra el patrón sospechoso; la derecha, el patrón legítimo.", "rows": [{"number": "1", "title": "El remitente", "bad": "<strong>Dominio extraño o disfrazado:</strong> 'banco-bcr-confirmacion.com', 'microsoft-security.net', 'paypal-verify.org'. Parecen reales pero el dominio NO es el oficial. A veces solo cambia una letra (payppal.com en lugar de paypal.com).", "good": "<strong>Dominio oficial verificado:</strong> el remitente coincide exactamente con el dominio oficial de la organización (banco-bcr.cr, microsoft.com, su-empresa.com). Si tiene duda, escriba el dominio directamente en el navegador, no haga clic en el enlace del correo."}, {"number": "2", "title": "El tono del mensaje", "bad": "<strong>Urgencia, miedo, amenaza:</strong> 'URGENTE', 'su cuenta será bloqueada', 'tiene 24 horas', 'última oportunidad'. El objetivo es que actúe sin pensar. Errores de ortografía, traducciones extrañas, gramática rara.", "good": "<strong>Profesional, sin presión artificial:</strong> tono cordial, plazos razonables, sin amenazas. Ortografía y gramática correctas. Si es una organización que usted conoce, el tono coincide con el habitual de comunicaciones internas o de servicio."}, {"number": "3", "title": "Lo que le pide hacer", "bad": "<strong>Proporcionar credenciales, hacer clic urgente, descargar archivos sin contexto:</strong> 'confirme su contraseña', 'verifique su cuenta', 'descargue el documento adjunto'. Especialmente sospechoso si pide contraseña, código de verificación, datos bancarios.", "good": "<strong>Solicitudes razonables y específicas:</strong> revisar una política, comentar un documento, atender una factura. NO pide credenciales por correo. NO pide clic urgente para 'verificar'. Las organizaciones legítimas NUNCA piden contraseñas por correo."}, {"number": "4", "title": "El enlace al que apunta", "bad": "<strong>Enlace genérico ('AQUÍ', 'haga clic') sin URL visible, o URL claramente distinta del dominio anunciado:</strong> el texto dice 'banco-bcr.com' pero al pasar el mouse por encima muestra otra URL completamente distinta. Usan acortadores (bit.ly, tinyurl) para esconder destinos.", "good": "<strong>URL visible, completa, coincidente con el dominio oficial:</strong> al pasar el mouse, el enlace muestra la URL real y coincide con el dominio declarado. Si quiere ir al sitio, mejor escriba la URL directamente en el navegador en lugar de hacer clic en el enlace del correo."}], "closing": "<strong>La regla práctica:</strong> ante la duda, no haga clic. Llame al remitente por un canal verificado. Cinco minutos de verificación previa son más baratos que una brecha de datos."}, {"id": "p23", "type": "emergency_protocol_card", "moduleTitle": "Módulo 3: Ciberseguridad básica y brechas", "title": "Protocolo ante una brecha de datos: detectar, contener, reportar", "image": null, "intro": "Cuando algo ya salió mal, lo que decide el desenlace son las primeras horas. El protocolo se organiza en tres fases con código semáforo: verde (detectar), amarillo (contener), rojo (reportar y notificar).", "bannerIcon": "🛡", "bannerTitle": "PROTOCOLO · BRECHA DE DATOS", "bannerMeta": "PLAZO DE NOTIFICACIÓN PRODHAB: HORAS, NO DÍAS", "phases": [{"tone": "green", "tagLabel": "FASE 1", "tagName": "DETECTAR", "title": "Identificar y documentar el incidente", "actions": ["<strong>Detecte señales tempranas:</strong> correo enviado a destinatario equivocado, USB perdido, sistema con actividad inusual, mensaje de proveedor reportando posible compromiso, denuncia de cliente afectado.", "<strong>Documente inmediatamente:</strong> qué pasó, cuándo, qué datos están involucrados (categorías y cantidad estimada), quién lo detectó. No espere a 'estar seguros': documente la sospecha primero.", "<strong>NO intente arreglarlo solo si no es su rol</strong>. Reportar es la prioridad."]}, {"tone": "amber", "tagLabel": "FASE 2", "tagName": "CONTENER", "title": "Limitar el alcance mientras se investiga", "actions": ["Avise al responsable de seguridad de la información o área de TI de inmediato (suele haber un canal interno definido).", "<strong>Aísle lo afectado:</strong> si fue un correo, intente retirarlo; si fue un sistema, desconéctelo de la red; si fue un USB, repórtelo formalmente.", "<strong>Preserve evidencia:</strong> no borre correos, logs ni archivos relacionados. La investigación posterior los necesita.", "Identifique a los titulares afectados y la sensibilidad de los datos comprometidos."], "warning": "NO informe a personas no autorizadas. La contención requiere comunicación controlada. Filtrar internamente puede empeorar el daño y comprometer la investigación.", "warningLabel": "CONFIDENCIALIDAD INTERNA"}, {"tone": "red", "tagLabel": "FASE 3", "tagName": "REPORTAR Y NOTIFICAR", "title": "Cumplir las obligaciones legales", "actions": ["<strong>Notificación interna formal</strong> al responsable de protección de datos y a la dirección de la organización.", "<strong>Notificación a la PRODHAB:</strong> según la Ley 8968, las brechas que afectan derechos del titular deben notificarse a la autoridad en plazos cortos. El reglamento establece los detalles, pero la regla es: cuanto antes, mejor.", "<strong>Notificación a los titulares afectados:</strong> deben saber qué datos suyos están comprometidos, qué consecuencias podría haber y qué medidas se están tomando.", "<strong>Plan de mitigación:</strong> qué medidas concretas se aplican para evitar que ocurra de nuevo. Auditoría posterior, refuerzo de capacitación, ajustes técnicos.", "<strong>Documentación completa</strong> para inspección de la PRODHAB si la solicita."], "warning": "Ocultar la brecha es siempre peor que reportarla. Cuando se descubre (y se descubren), agrava la sanción y constituye incumplimiento adicional. Transparencia es la mejor estrategia legal y reputacional.", "warningLabel": "NO OCULTAR"}], "keyMessage": "detectar, contener, reportar. En ese orden, sin saltarse fases. La organización puede recuperarse de una brecha manejada bien. De una brecha ocultada que sale a la luz, no se recupera."}, {"id": "p24", "type": "decision_scenario", "moduleTitle": "Módulo 3: Ciberseguridad básica y brechas", "title": "Decisión: ¿qué hace ante un email sospechoso?", "image": null, "instructions": "<strong>Instrucciones:</strong> lea la situación y elija la respuesta más alineada con lo que vio en el módulo. Esta es una decisión que ocurre en segundos en la vida real.", "intro_text": "<strong>La situación.</strong> Son las 10 de la mañana de un martes. Usted recibe un correo de 'soporte@su-empresa-online.com' (note: el dominio NO es exactamente el de su empresa, le falta un detalle). El correo dice: 'Detectamos un acceso sospechoso a su cuenta corporativa. Para verificar que es usted, haga clic aquí y proporcione su contraseña actual. De lo contrario, su acceso será suspendido en las próximas dos horas.'", "question_text": "¿Qué hace?", "dialogue": [], "options": [{"id": "A", "label": "Hacer clic y proporcionar la contraseña por seguridad", "subtitle": "Mejor verificar antes de que suspendan la cuenta.", "correct": false, "result": "Brecha probable", "outcome": "Es exactamente lo que el atacante quiere. El dominio no oficial, la urgencia y la solicitud de contraseña son las tres señales clásicas de phishing. Si proporciona la contraseña, el atacante puede acceder a todos los sistemas con sus credenciales. La organización legítima NUNCA pide la contraseña por correo."}, {"id": "B", "label": "Llamar al número de TI o seguridad de la organización para reportar el correo sospechoso", "subtitle": "Verificar por un canal independiente.", "correct": true, "result": "Respuesta correcta", "outcome": "Esta es la respuesta correcta. Las tres señales (dominio sospechoso, urgencia artificial, solicitud de contraseña) indican phishing claro. Reportar al área de seguridad de la información permite que: (a) verifiquen si es real o falso, (b) bloqueen el ataque si más personas lo recibieron, (c) inicien protocolo si alguien ya cayó."}, {"id": "C", "label": "Reenviarlo a sus compañeros para que también estén alertas", "subtitle": "Avisar al equipo no puede hacer daño.", "correct": false, "result": "Riesgo de propagación", "outcome": "Reenviar el correo aumenta la superficie de ataque: ahora más personas pueden caer en él pensando que es real. Lo correcto es reportarlo al canal oficial, NO reenviarlo. El área de seguridad de la información decide si emite alerta al equipo y cómo."}, {"id": "D", "label": "Ignorarlo y borrarlo, total no me afecta a mí", "subtitle": "Sin clicar nada, ya está.", "correct": false, "result": "Riesgo perdido", "outcome": "Ignorarlo personalmente está bien (no haga clic), pero borrarlo sin reportarlo pierde información valiosa: si otros recibieron el mismo correo, alguno puede caer. El reporte al área de seguridad permite alertar a toda la organización. La ciberseguridad es trabajo colectivo, no individual."}], "convergent_title": "Reportar al canal oficial. Nunca proporcionar credenciales por correo.", "convergent_text": "Esta decisión específica (qué hacer ante phishing) se repite muchas veces en la vida laboral. La regla operativa es siempre la misma: <strong>no hacer clic, no proporcionar credenciales, reportar al canal oficial.</strong> Las personas que aplican esto consistentemente protegen no solo sus cuentas sino las de toda la organización. Las organizaciones que han evitado brechas significativas casi siempre lo han logrado porque alguien reportó a tiempo lo que muchos otros también recibieron pero ignoraron."}, {"id": "p25", "type": "knowledge_check", "moduleTitle": "Módulo 3: Ciberseguridad básica y brechas", "title": "Verifique lo aprendido", "image": null, "questions": [{"type": "single", "stem": "Según el módulo, ¿cuál es la primera cosa que se debe hacer cuando se detecta una brecha de datos?", "options": ["Intentar arreglarlo uno mismo para no asustar a nadie.", "Documentar el incidente y reportarlo de inmediato al responsable de seguridad o área de TI.", "Esperar a verificar bien si realmente fue una brecha.", "Avisar a los clientes afectados directamente antes de coordinar con el equipo."], "correctAnswer": 1, "correct": 1, "feedback": {"correct": "Correcto. La fase 1 del protocolo es detectar y documentar inmediatamente, sin esperar 'a estar seguros'. La sospecha temprana se reporta para que el responsable la evalúe. Esperar a tener certeza pierde tiempo crítico.", "incorrect": "Recuerde el protocolo: detectar, contener, reportar. La fase 1 incluye documentar y reportar de inmediato al canal interno. NO se intenta arreglar solo. NO se espera 'a estar seguros'."}}, {"type": "single", "stem": "Sobre las contraseñas en el trabajo, ¿cuál es la práctica MÁS importante para proteger datos personales según el módulo?", "options": ["Cambiarla cada semana aunque sea con cambios pequeños.", "Usar mayúsculas, minúsculas, números y símbolos pero con solo 8 caracteres.", "Longitud (12+ caracteres), no reutilización entre cuentas, y uso de gestor de contraseñas.", "Tener una sola contraseña fuerte para todas las cuentas."], "correctAnswer": 2, "correct": 2, "feedback": {"correct": "Correcto. Longitud mata complejidad (14 caracteres simples > 8 con todos los tipos), no reutilizar entre cuentas, y un gestor de contraseñas para no tener que recordarlas todas. Cambio frecuente sin necesidad y reutilización son los peores hábitos.", "incorrect": "Revise: longitud mata complejidad (14 caracteres simples > 8 con todos los tipos). Tener una sola contraseña fuerte para todo es muy mala idea: si una cuenta se compromete, caen todas."}}]}, {"id": "p26", "type": "module_outro", "moduleTitle": "Módulo 3: Ciberseguridad básica y brechas", "title": "Lo que cierra este módulo", "image": null, "items": ["<strong>Las contraseñas son la primera línea de defensa.</strong> Longitud mata complejidad, no reutilizar entre cuentas, gestor de contraseñas para todo lo serio.", "<strong>El phishing tiene patrones reconocibles:</strong> urgencia artificial, dominio sospechoso, solicitud de credenciales, enlace genérico. Cuando vea dos o más juntas, NO haga clic. Reporte.", "<strong>Ante una brecha: detectar, contener, reportar.</strong> Sin saltarse fases. Ocultar es peor que reportar. La PRODHAB exige notificación; el silencio agrava la sanción."]}]}, {"id": "m4", "title": "Cierre y evaluación", "screens": [{"id": "p27", "type": "quiz", "moduleTitle": "Cierre y evaluación", "title": "Evaluación final del curso", "image": null, "intro": "Diez preguntas sobre lo trabajado en los tres módulos. Para aprobar necesita 80% o más (8 de 10).", "passingScore": 80, "questions": [{"type": "single", "stem": "Según la Ley 8968 de Costa Rica, ¿quién es el 'dueño' de los datos personales que una organización tiene en su base?", "options": ["La organización que los recolectó.", "El proveedor del sistema donde se almacenan.", "El titular (la persona a la que se refieren los datos).", "La PRODHAB como autoridad de control."], "correctAnswer": 2, "correct": 2}, {"type": "single", "stem": "¿Cuál de estos datos es considerado SENSIBLE según la Ley 8968?", "options": ["El correo electrónico de trabajo.", "El historial de compras en una tienda en línea.", "La información sobre salud o creencias religiosas.", "El nombre completo y la cédula."], "correctAnswer": 2, "correct": 2}, {"type": "single", "stem": "Un cliente le dice 'borren todos mis datos de su sistema'. ¿Cuál es la respuesta correcta?", "options": ["Decirle que por sistema no se puede borrar nada.", "Reconocer la solicitud, escalarla al responsable, ejecutar lo que se pueda y comunicar lo que se mantiene por obligación legal.", "Pedir que la solicitud venga por carta certificada con abogado.", "Ignorarla porque es un trámite muy complicado."], "correctAnswer": 1, "correct": 1}, {"type": "single", "stem": "¿Cuál de las siguientes es una característica TÍPICA de un correo de phishing?", "options": ["Tono profesional, plazo razonable, dominio interno.", "Solicita revisar y comentar un documento adjunto interno.", "Genera urgencia artificial y pide credenciales por enlace.", "Viene del jefe directo con su firma habitual."], "correctAnswer": 2, "correct": 2}, {"type": "single", "stem": "Para una contraseña de cuenta del trabajo, ¿cuál es la práctica MÁS recomendable según el módulo?", "options": ["8 caracteres con muchos símbolos especiales.", "Una sola contraseña fuerte que use en todos sus sistemas.", "12 o más caracteres, no reutilizada en otras cuentas, gestionada con gestor de contraseñas.", "Cambiarla cada semana aunque sean cambios pequeños."], "correctAnswer": 2, "correct": 2}, {"type": "single", "stem": "¿Qué significa el derecho de 'oposición' del titular según la Ley 8968?", "options": ["Acceder a sus datos personales en cualquier momento.", "Pedir que se borren todos sus datos sin excepciones.", "Oponerse a usos específicos de los datos (ej: marketing comercial) sin necesidad de borrarlos todos.", "Demandar a la organización por tener sus datos."], "correctAnswer": 2, "correct": 2}, {"type": "single", "stem": "Detecta una posible brecha de datos. ¿Cuál es la PRIMERA acción correcta?", "options": ["Intentar arreglarla uno mismo sin alarmar.", "Esperar a estar completamente seguro de que es real.", "Documentar el incidente y reportar de inmediato al responsable interno.", "Avisar primero a los clientes posiblemente afectados."], "correctAnswer": 2, "correct": 2}, {"type": "multiple", "stem": "¿Cuáles de los siguientes son derechos ARCO+ del titular? (Marque todas las correctas.)", "options": ["Acceso a sus datos.", "Rectificación de datos incorrectos.", "Cancelación cuando ya no se necesitan.", "Oposición a usos específicos."], "correctAnswer": [0, 1, 2, 3], "correct": [0, 1, 2, 3]}, {"type": "single", "stem": "Un compañero dice 'ese dato lo saqué de LinkedIn, lo puedo usar para campaña comercial porque es público'. ¿Qué responde?", "options": ["Tiene razón, lo público es libre de uso.", "Que sea visible NO autoriza usarlo para otro propósito; se necesita consentimiento del titular.", "Solo se puede si la persona aceptó conexión con la cuenta de la empresa.", "Es una zona gris y la decisión depende del jefe."], "correctAnswer": 1, "correct": 1}, {"type": "matching", "stem": "Empareje cada concepto con su definición:", "pairs": [{"left": "Dato personal", "right": "Cualquier información que permite identificar a una persona física"}, {"left": "Dato sensible", "right": "Información sobre salud, ideología, orientación que requiere consentimiento expreso"}, {"left": "PRODHAB", "right": "Agencia que supervisa el cumplimiento de la Ley 8968 en Costa Rica"}, {"left": "Phishing", "right": "Correo engañoso que imita uno legítimo para obtener credenciales"}]}]}, {"id": "p28", "type": "closing_resources", "moduleTitle": "Cierre y evaluación", "title": "Su primer paso esta semana", "image": "assets/images/cd6_img_p28.jpg", "audio": "assets/audio/cd6_audio_p28.mp3", "audio_script": "Ha terminado el curso. Tres ideas para llevarse. Una. La protección de datos personales... no es un trámite legal. Es respeto por la persona detrás de cada dato. El cambio empieza... cuando dejamos de pensar... esos datos son míos porque están en mi sistema. Y empezamos a pensar... esos datos son de alguien que confió en nosotros. Dos. La Ley 8968 da cinco derechos al titular. Acceso, rectificación, cancelación, oposición, información. No son favores. Son derechos exigibles. Si llegan a su escritorio... reconocer, documentar, escalar, ejecutar, comunicar. Tres. Las brechas no son ciberataques de Hollywood. Son errores humanos en tareas rutinarias. Una buena contraseña. Un correo verificado antes de enviar. Un clic no dado en un email sospechoso. Lo aburrido funciona. Y un compromiso para esta semana. Revise sus contraseñas. La de su correo. La de algún sistema con datos personales. Si tienen menos de doce caracteres... o son las mismas de hace años... cámbielas. Empieza ahí.", "paragraphs": ["Ha terminado el curso. Tres ideas para llevarse. Una: la protección de datos personales no es un trámite legal. Es respeto por la persona detrás de cada dato. El cambio empieza cuando dejamos de pensar 'esos datos son míos porque están en mi sistema' y empezamos a pensar 'esos datos son de alguien que confió en nosotros'.", "Dos: la Ley 8968 da cinco derechos al titular: Acceso, Rectificación, Cancelación, Oposición, Información. No son favores. Son derechos exigibles. Si llegan a su escritorio: reconocer, documentar, escalar, ejecutar, comunicar.", "Tres: las brechas no son ciberataques de Hollywood. Son errores humanos en tareas rutinarias. Una buena contraseña. Un correo verificado antes de enviar. Un clic no dado en un email sospechoso. Lo aburrido funciona.", "Un compromiso para esta semana: revise sus contraseñas. La de su correo. La de algún sistema con datos personales. Si tienen menos de doce caracteres o son las mismas de hace años, cámbielas. Empiece ahí."], "items": [], "closing": "La protección de datos no se logra con un curso. Se logra con personas que aplican lo aprendido día a día. Este curso le dio el marco. Lo que sigue depende de usted: <strong>reconocer al titular detrás del dato, respetar sus derechos, proteger lo que custodia.</strong> Cada persona haciéndolo bien protege a cientos. Todo un equipo haciéndolo bien protege a miles."}]}]};
  </script>
  <script>
/**
 * Aacrom Course Player
 * Curso: P-A.1 · El arte de la guerra aplicado a los negocios
 */

(function () {
  'use strict';

  let course = null;
  let allScreens = [];
  let currentIndex = 0;
  let completedScreens = new Set();
  let quizFinalized = false;
  let quizState = {};
  let scenarioState = { exploredOptions: new Set(), convergentShown: false };

  // ==========================================================
  // INIT
  // ==========================================================
  async function init() {
    try {
      course = window.COURSE_DATA;
      buildScreenList();
      buildSidebar();
      loadProgress();
      renderScreen();
      bindNav();
    } catch (e) {
      document.getElementById('screen-container').innerHTML = '<p style="padding:40px;color:#B02A2A">Error cargando el curso: ' + e.message + '</p>';
    }
  }

  function buildScreenList() {
    allScreens = [];
    course.modules.forEach((mod, mi) => {
      mod.screens.forEach((scr, si) => {
        allScreens.push({ ...scr, moduleIndex: mi, screenIndex: si });
      });
    });
    document.getElementById('course-title').textContent = course.title;
  }

  function buildSidebar() {
    const nav = document.getElementById('module-nav');
    nav.innerHTML = '';
    course.modules.forEach((mod, idx) => {
      const item = document.createElement('div');
      item.className = 'module-item';
      item.dataset.moduleIndex = idx;
      item.innerHTML = `
        <div class="icon">≡</div>
        <div class="title">${mod.title}</div>
        <div class="check"></div>
      `;
      item.addEventListener('click', () => jumpToModule(idx));
      nav.appendChild(item);
    });
  }

  function jumpToModule(moduleIndex) {
    const first = allScreens.findIndex(s => s.moduleIndex === moduleIndex);
    if (first >= 0) { currentIndex = first; renderScreen(); }
    document.getElementById('sidebar').classList.remove('open');
  }

  function loadProgress() {
    var saved = null;
    try {
      if (window.AacromSCORM && window.AacromSCORM.isInitialized && window.AacromSCORM.isInitialized()) {
        saved = window.AacromSCORM.getSuspendData();
      }
    } catch (e) {}
    if (!saved) { try { saved = JSON.parse(sessionStorage.getItem('aacrom_progress_cd6') || '{}'); } catch (e) { saved = {}; } }
    try {
      if (saved && saved.completed) completedScreens = new Set(saved.completed);
      if (saved && typeof saved.current === 'number') currentIndex = Math.min(saved.current, allScreens.length - 1);
    } catch (e) {}
  }

  function saveProgress() {
    var data = { completed: Array.from(completedScreens), current: currentIndex };
    try { sessionStorage.setItem('aacrom_progress_cd6', JSON.stringify(data)); } catch (e) {}
    try {
      if (window.AacromSCORM && window.AacromSCORM.isInitialized && window.AacromSCORM.isInitialized()) {
        window.AacromSCORM.setSuspendData(data);
        window.AacromSCORM.commit();
      }
    } catch (e) {}
  }

  // ==========================================================
  // SIDEBAR UPDATE
  // ==========================================================
  function updateSidebar() {
    const items = document.querySelectorAll('.module-item');
    const currentModule = allScreens[currentIndex].moduleIndex;

    items.forEach((item, idx) => {
      item.classList.remove('active', 'current', 'completed');
      const modScreens = allScreens.filter(s => s.moduleIndex === idx);
      const modCompleted = modScreens.every(s => completedScreens.has(s.id));

      if (idx === currentModule) item.classList.add('active', 'current');
      if (modCompleted) item.classList.add('completed');
    });

    const totalScreens = allScreens.length;
    const completed = completedScreens.size;
    const pct = Math.round((completed / totalScreens) * 100);
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-text').textContent = pct + '% COMPLETADO';
  }

  // ==========================================================
  // RENDER SCREEN
  // ==========================================================
  function renderScreen() {
    const screen = allScreens[currentIndex];
    document.getElementById('screen-counter').textContent = (currentIndex + 1) + ' de ' + allScreens.length;

    const container = document.getElementById('screen-container');
    container.scrollTop = 0;

    let html = '';
    switch (screen.type) {
      case 'course_cover':       html = renderCourseCover(screen); break;
      case 'statement_list':     html = renderStatementList(screen); break;
      case 'module_intro':       html = renderModuleIntro(screen); break;
      case 'paragraph_audio':    html = renderParagraphAudio(screen); break;
      case 'hotspots':           html = renderHotspots(screen); break;
      case 'tabs':               html = renderTabs(screen); break;
      case 'case_study':         html = renderCaseStudy(screen); break;
      case 'module_outro':       html = renderModuleOutro(screen); break;
      case 'knowledge_check':    html = renderKnowledgeCheck(screen); break;
      case 'accordion':          html = renderAccordion(screen); break;
      case 'statement_paragraph':html = renderStatementParagraph(screen); break;
      case 'sorting':            html = renderSorting(screen); break;
      case 'decision_matrix':    html = renderDecisionMatrix(screen); break;
      case 'decision_scenario':  html = renderDecisionScenario(screen); break;
      case 'quiz':               html = renderQuiz(screen); break;
      case 'module_intro_full':  html = renderModuleIntroFull(screen); break;
      case 'paragraphs':         html = renderParagraphs(screen); break;
      case 'statement_paragraphs': html = renderStatementParagraphs(screen); break;
      case 'closing_resources':  html = renderClosingResources(screen); break;
      case 'course_cover_objective': html = renderCourseCoverObjective(screen); break;
      case 'hero_image':         html = renderHeroImage(screen); break;
      case 'stat_callout':       html = renderStatCallout(screen); break;
      case 'comparison_cards':   html = renderComparisonCards(screen); break;
      case 'flip_cards':         html = renderFlipCards(screen); break;
      case 'timeline':           html = renderTimeline(screen); break;
      case 'interactive_checklist': html = renderInteractiveChecklist(screen); break;
      case 'pull_quote':              html = renderPullQuote(screen); break;
      case 'process_steps':           html = renderProcessSteps(screen); break;
      case 'calculator_widget':       html = renderCalculatorWidget(screen); break;
      case 'myth_buster':             html = renderMythBuster(screen); break;
      case 'funnel_diagram':          html = renderFunnelDiagram(screen); break;
      case 'interactive_chart':       html = renderInteractiveChart(screen); break;
      case 'safety_signs_grid':       html = renderSafetySignsGrid(screen); break;
      case 'side_by_side_comparison': html = renderSideBySideComparison(screen); break;
      case 'emergency_protocol_card': html = renderEmergencyProtocolCard(screen); break;
      case 'risk_meter':              html = renderRiskMeter(screen); break;
      case 'data_classification_grid':html = renderDataClassificationGrid(screen); break;
      case 'password_strength_meter': html = renderPasswordStrengthMeter(screen); break;
      case 'phishing_detector':       html = renderPhishingDetector(screen); break;
      default:                   html = `<div style="padding:40px;">Tipo no implementado: ${screen.type}</div>`;
    }

    container.innerHTML = html;

    if (screen.type === 'hotspots')          attachHotspotEvents(screen);
    else if (screen.type === 'tabs')          attachTabEvents(screen);
    else if (screen.type === 'accordion')     attachAccordionEvents(screen);
    else if (screen.type === 'knowledge_check')attachKCEvents(screen);
    else if (screen.type === 'sorting')       attachSortingEvents(screen);
    else if (screen.type === 'decision_matrix')attachMatrixEvents(screen);
    else if (screen.type === 'decision_scenario')attachScenarioEvents(screen);
    else if (screen.type === 'quiz')          attachQuizEvents(screen);

    if (!isInteractiveScreen(screen)) completedScreens.add(screen.id);
    updateSidebar();
    updateFooterNav();
    saveProgress();
  }

  function isInteractiveScreen(screen) {
    return ['knowledge_check', 'sorting', 'quiz', 'decision_scenario'].includes(screen.type);
  }

  // ==========================================================
  // RENDERERS
  // ==========================================================
  function audioHTML(audioFile) {
    if (!audioFile) return '';
    return `
      <div class="instructions-box">
        <div class="badge-icon"></div>
        <div class="text"><strong>Instrucciones:</strong> presione el botón "▶" y escuche atentamente el audio, posteriormente lea el texto de abajo.</div>
      </div>
      <audio controls preload="metadata"><source src="${audioFile}" type="audio/mpeg">Su navegador no soporta audio.</audio>
    `;
  }

  function headerHTML(screen, withImage = false) {
    const imgStyle = withImage && screen.image
      ? `style="background-image: url('${screen.image}')"`
      : '';
    const moduleLabel = screen.moduleTitle || '';
    return `
      <div class="screen-header ${withImage && screen.image ? 'with-image' : ''}" ${imgStyle}>
        <h1>${screen.title}</h1>
        <div class="header-line"></div>
      </div>
    `;
  }

  function renderCourseCover(s) {
    return `
      ${headerHTML(s, true)}
      <div class="screen-body">
        <h2 class="subtitle-blue">${s.title}</h2>
        ${audioHTML(s.audio)}
        ${s.body.map(p => `<p>${p}</p>`).join('')}
      </div>
    `;
  }

  function renderStatementList(s) {
    return `
      ${headerHTML(s, !!s.image)}
      <div class="screen-body">
        ${s.statement ? `<div class="statement">${s.statement}</div>` : ''}
        ${s.audio ? audioHTML(s.audio) : ''}
        ${s.intro ? `<p style="font-weight:600;color:var(--aacrom-primary);margin-top:30px">${s.intro}</p>` : ''}
        <ul class="aacrom-list">${s.items.map(i => `<li><span>${i}</span></li>`).join('')}</ul>
      </div>
    `;
  }

  function renderModuleIntro(s) {
    return `
      ${headerHTML(s, true)}
      <div class="screen-body">
        ${audioHTML(s.audio)}
        <div class="statement">${s.statement}<span class="statement-citation">${s.citation}</span></div>
      </div>
    `;
  }

  function renderParagraphAudio(s) {
    return `
      ${headerHTML(s, !!s.image)}
      <div class="screen-body">
        ${audioHTML(s.audio)}
        <p class="justify">${s.body}</p>
      </div>
    `;
  }

  function renderStatementParagraph(s) {
    return `
      ${headerHTML(s, !!s.image)}
      <div class="screen-body">
        <div class="statement">${s.statement}</div>
        ${audioHTML(s.audio)}
        ${s.subheading ? `<h3 style="text-align:center;color:var(--aacrom-primary);margin:30px 0 18px;font-size:22px">${s.subheading}</h3>` : ''}
        <p class="justify">${s.body}</p>
      </div>
    `;
  }

  function renderCaseStudy(s) {
    return `
      ${headerHTML(s, false)}
      <div class="screen-body">
        ${audioHTML(s.audio)}
        <div class="case-card-wrapper">
          <div class="bg-image" style="background-image:url('${s.image}')"></div>
          <div class="card-content">
            ${s.subtitle ? `<div class="card-subtitle">${s.subtitle}</div>` : ''}
            <p>${s.body}</p>
          </div>
        </div>
      </div>
    `;
  }

  function renderModuleOutro(s) {
    return `
      ${headerHTML(s, false)}
      <div class="screen-body">
        <ul class="aacrom-list">${s.items.map(i => `<li><span>${i}</span></li>`).join('')}</ul>
      </div>
    `;
  }

  function renderHotspots(s) {
    return `
      ${headerHTML(s, false)}
      <div class="screen-body">
        <p>${s.intro}</p>
        <div class="hotspots-container">
          ${s.image ? `<img src="${s.image}" class="hotspots-image" alt="">` : ''}
          <div class="hotspots-list">
            ${s.hotspots.map((h, i) => `<button class="hotspot-btn" data-idx="${i}">${h.label}</button>`).join('')}
          </div>
          <div class="hotspot-content" id="hotspot-content"></div>
        </div>
      </div>
    `;
  }

  function renderTabs(s) {
    return `
      ${headerHTML(s, false)}
      <div class="screen-body">
        ${s.audio ? audioHTML(s.audio) : ''}
        <p>${s.intro}</p>
        <div class="tabs-container">
          <div class="tabs-nav">
            ${s.tabs.map((t, i) => `<button class="tab-btn ${i === 0 ? 'active' : ''}" data-idx="${i}">${t.title}</button>`).join('')}
          </div>
          ${s.tabs.map((t, i) => `<div class="tab-panel ${i === 0 ? 'active' : ''}" data-idx="${i}">${t.content}</div>`).join('')}
        </div>
      </div>
    `;
  }

  function renderAccordion(s) {
    return `
      ${headerHTML(s, false)}
      <div class="screen-body">
        ${s.audio ? audioHTML(s.audio) : ''}
        <p>${s.intro}</p>
        <div class="accordion">
          ${s.items.map((it, i) => `
            <div class="accordion-item" data-idx="${i}">
              <div class="accordion-header">
                <span>${it.title}</span>
                <span class="toggle">+</span>
              </div>
              <div class="accordion-content"><div class="accordion-content-inner">${it.content}</div></div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  function renderDecisionMatrix(s) {
    const ordered = ['tl', 'tr', 'bl', 'br'];
    const qByPos = {};
    s.quadrants.forEach(q => qByPos[q.position] = q);
    return `
      ${headerHTML(s, false)}
      <div class="screen-body">
        <p>${s.intro}</p>
        <div class="matrix-container">
          <div class="matrix-grid">
            ${ordered.map((pos, i) => {
              const q = qByPos[pos];
              const sub = q.subtitle ? `<div class="matrix-quadrant-subtitle">${q.subtitle}</div>` : '';
              return `<div class="matrix-quadrant" data-pos="${pos}" style="background:${q.color}"><div>${q.label}</div>${sub}</div>`;
            }).join('')}
          </div>
          <div class="matrix-label-x">${s.xAxis}</div>
          <div class="matrix-label-y">${s.yAxis}</div>
        </div>
        <div class="matrix-content" id="matrix-content"></div>
      </div>
    `;
  }

  function renderDecisionScenario(s) {
    const instructionsCallout = s.instructions ? `
      <div class="instructions-callout">
        <div class="callout-icon">!</div>
        <div class="callout-text">${s.instructions}</div>
      </div>
    ` : '';
    return `
      ${headerHTML(s, false)}
      <div class="screen-body">
        <div class="scenario-container">
          <div class="scenario-intro-card">
            <p style="text-align:left;font-size:17px">${s.intro_text || ''}</p>
          </div>

          ${instructionsCallout}

          <div class="dialogue-container" id="dialogue">
            ${(s.dialogue || []).map((d, i) => {
              const isAndres = d.character === 'Andrés';
              const isNarrator = d.character === 'Narrador';
              const cls = isAndres ? 'andres' : (isNarrator ? 'narrator' : '');
              const initial = isNarrator ? '"' : (d.character || '?').charAt(0);
              const dAudio = d.audio ? `<audio controls preload="metadata"><source src="${d.audio}" type="audio/mpeg"></audio>` : '';
              return `
                <div class="dialogue-line" data-idx="${i}">
                  <div class="dialogue-avatar ${cls}">${initial}</div>
                  <div class="dialogue-body">
                    <div class="dialogue-character">${d.character || ''}${d.role ? `<span class="role">${d.role}</span>` : ''}</div>
                    <div class="dialogue-text">${d.text || ''}</div>
                    ${dAudio}
                  </div>
                </div>
              `;
            }).join('')}
          </div>

          <div class="scenario-question">${s.question_text || '¿Qué decisión tomaría?'}</div>
          <div class="scenario-options" id="scenario-options">
            ${s.options.map(o => `
              <button class="scenario-option-btn" data-id="${o.id}">
                <div><span class="option-id">${o.id}</span><span class="option-label">${o.label}</span></div>
                <div class="option-sub">${o.subtitle || ''}</div>
              </button>
            `).join('')}
          </div>

          <div class="scenario-result" id="scenario-result" style="display:none"></div>

          <div class="scenario-convergent" id="scenario-convergent">
            <h4>${s.convergent_title || ''}</h4>
            <p>${s.convergent_text || ''}</p>
            ${s.convergent_audio ? `<audio controls preload="metadata" style="margin-top:16px;max-width:100%;filter:invert(0.85) hue-rotate(180deg)"><source src="${s.convergent_audio}" type="audio/mpeg"></audio>` : ''}
          </div>
        </div>
      </div>
    `;
  }

  function renderKnowledgeCheck(s) {
    return `
      ${headerHTML(s, false)}
      <div class="screen-body">
        ${s.questions.map((q, i) => `
          <div class="question-card" data-qidx="${i}">
            <div class="question-counter">PREGUNTA ${i + 1} DE ${s.questions.length}</div>
            <div class="question-stem">${q.stem}</div>
            <div class="options-container">
              ${q.options.map((opt, j) => `
                <div class="option-row" data-opt="${j}">
                  <input type="${q.type === 'multiple' ? 'checkbox' : 'radio'}" name="q${i}" id="q${i}o${j}" value="${j}">
                  <label for="q${i}o${j}">${opt}</label>
                </div>
              `).join('')}
            </div>
            <button class="quiz-submit" data-qidx="${i}">Verificar respuesta</button>
            <div class="feedback-box"><div class="feedback-title"></div><p></p></div>
          </div>
        `).join('')}
      </div>
    `;
  }

  function renderSorting(s) {
    const shuffled = [...s.items].map((it, i) => ({ ...it, originalIdx: i })).sort(() => Math.random() - 0.5);
    return `
      ${headerHTML(s, false)}
      <div class="screen-body">
        <p style="font-weight:600;color:var(--aacrom-primary)">${s.instruction}</p>
        <div class="sorting-container">
          <div class="sorting-items-pool" id="sorting-pool" data-zone="pool">
            ${shuffled.map((it, i) => `
              <div class="sortable-item" draggable="true" data-original="${it.originalIdx}" data-category="${it.category}">${it.text}</div>
            `).join('')}
          </div>
          <div class="sorting-categories">
            ${s.categories.map((cat, i) => `
              <div class="sorting-category" data-zone="${i}">
                <div class="sorting-category-title">${cat}</div>
                <div class="sorting-drop-zone"></div>
              </div>
            `).join('')}
          </div>
          <button class="quiz-submit" id="sorting-check">Verificar</button>
          <div class="feedback-box" id="sorting-feedback"><div class="feedback-title"></div><p></p></div>
        </div>
      </div>
    `;
  }

  function renderQuiz(s) {
    return `
      ${headerHTML(s, false)}
      <div class="screen-body">
        <p style="text-align:center;color:var(--aacrom-text-muted);font-size:16px;margin-bottom:30px">${s.intro}</p>

        ${s.questions.map((q, i) => {
          if (q.type === 'matching') {
            const rights = [...q.pairs].map(p => p.right).sort(() => Math.random() - 0.5);
            return `
              <div class="question-card" data-qidx="${i}" data-qtype="matching">
                <div class="question-counter">PREGUNTA ${i + 1} DE ${s.questions.length}</div>
                <div class="question-stem">${q.stem}</div>
                <div class="matching-grid">
                  ${q.pairs.map((pair, pi) => `
                    <div class="matching-row" data-left="${pi}">
                      <div class="matching-cell left">${pair.left}</div>
                      <div class="matching-arrow">→</div>
                      <select class="matching-cell" data-pair="${pi}" style="border:2px solid var(--aacrom-border);background:white;font-family:inherit;font-size:15px;padding:14px 12px;border-radius:10px;cursor:pointer">
                        <option value="">— Seleccione —</option>
                        ${rights.map((r, ri) => `<option value="${r}">${r}</option>`).join('')}
                      </select>
                    </div>
                  `).join('')}
                </div>
              </div>
            `;
          }
          return `
            <div class="question-card" data-qidx="${i}" data-qtype="${q.type}">
              <div class="question-counter">PREGUNTA ${i + 1} DE ${s.questions.length}</div>
              <div class="question-stem">${q.stem}</div>
              <div class="options-container">
                ${q.options.map((opt, j) => `
                  <div class="option-row" data-opt="${j}">
                    <input type="${q.type === 'multiple' ? 'checkbox' : 'radio'}" name="quiz_q${i}" id="quiz_q${i}o${j}" value="${j}">
                    <label for="quiz_q${i}o${j}">${opt}</label>
                  </div>
                `).join('')}
              </div>
            </div>
          `;
        }).join('')}

        <button class="quiz-submit" id="quiz-submit">Enviar evaluación</button>
        <div id="quiz-result"></div>
      </div>
    `;
  }


  function renderCourseCoverObjective(s) {
    const fichaHTML = (s.ficha || []).map(f =>
      `<div class="ficha-item"><div class="ficha-label">${f.label}</div><div class="ficha-value">${f.value}</div></div>`
    ).join('');
    return `
      <div class="cover-objective" style="--cover-bg: url('${s.image || ''}')">
        <div class="cover-objective-content">
          <div class="course-code">Curso C-D.6 · Aacrom</div>
          <h1>${s.title}</h1>
          <div class="subtitle">${s.subtitle || ''}</div>
          <div class="objective-label">Objetivo de aprendizaje</div>
          <div class="objective-text">${s.objective || ''}</div>
          <div class="ficha">${fichaHTML}</div>
        </div>
      </div>
    `;
  }

  function renderHeroImage(s) {
    return `
      <div class="hero-image-screen">
        <div class="hero-image-bg" style="background-image: url('${s.image || ''}')">
          <div class="hero-image-title">${s.title || ''}</div>
        </div>
        <div class="hero-image-statement">
          <p>${s.statement || ''}</p>
        </div>
        ${s.footer ? `<div class="hero-image-footer">${s.footer}</div>` : ''}
      </div>
    `;
  }

  function renderModuleIntroFull(s) {
    const heroImg = s.image ? `<div class="module-hero-image" style="background-image:url('${s.image}')"></div>` : '';
    const paras = (s.paragraphs || []).map(p => `<p>${p}</p>`).join('');
    const learnItems = (s.learnItems || []).map(i => `<li><span>${i}</span></li>`).join('');
    const audio = s.audio ? `<audio controls src="${s.audio}" style="display:block;margin:20px auto;max-width:600px;width:100%"></audio>` : '';
    return `
      <div class="screen-header">
        <div class="module-label">${s.moduleLabel || 'MÓDULO'}</div>
        <h1>${s.title}</h1>
        <div class="header-line"></div>
      </div>
      <div class="screen-body">
        ${heroImg}
        <div class="statement">${s.statement}<span class="statement-citation">${s.citation || ''}</span></div>
        ${audio}
        <div class="aacrom-paragraphs">${paras}</div>
        ${s.nextSteps ? `<div class="next-steps-heading">${s.nextSteps}</div>` : ''}
        ${learnItems ? `<ul class="aacrom-list">${learnItems}</ul>` : ''}
      </div>
    `;
  }
  function renderParagraphs(s) {
    const paras = (s.paragraphs || []).map(p => `<p>${p}</p>`).join('');
    const heroImg = s.image ? `<div class="module-hero-image" style="background-image:url('${s.image}');height:240px"></div>` : '';
    const audio = s.audio ? `<audio controls src="${s.audio}" style="display:block;margin:20px auto;max-width:600px;width:100%"></audio>` : '';
    return `${headerHTML(s, false)}<div class="screen-body">${heroImg}${audio}<div class="aacrom-paragraphs">${paras}</div></div>`;

  // Helper global para cálculos del calculator_widget
  window.__c7CalcCompute = function(type, v, calc) {
    if (type === 'budget_503020') {
      return (calc.outputs || []).map(function(o) { return Math.round(v * o.factor); });
    } else if (type === 'loan_cost') {
      var monthlyRate = (calc.annualRate || 0.5) / 12;
      var months = calc.termMonths || 12;
      var pow = Math.pow(1 + monthlyRate, months);
      var cuota = Math.round(v * monthlyRate * pow / (pow - 1));
      var total = cuota * months;
      var intereses = total - v;
      var sobrecosto_pct = Math.round((intereses / v) * 100);
      return [cuota, intereses, total, sobrecosto_pct];
    }
    return [v];
  };

  // Helper global para inicializar la calculadora después del render
  window.__c7CalcInit = function(calcId, calcType, calcData, unit) {
    var slider = document.getElementById(calcId + '_slider');
    var display = document.getElementById(calcId + '_display');
    if (!slider || !display) return;

    function fmt(n) { return parseInt(n).toLocaleString('es-ES'); }

    function update(v) {
      display.querySelector('.num').textContent = fmt(v);
      var outs = window.__c7CalcCompute(calcType, parseInt(v), calcData);
      var rows = slider.closest('.calc-container').querySelectorAll('.calc-output-value');
      outs.forEach(function(val, idx) {
        if (rows[idx]) {
          var isPct = calcType === 'loan_cost' && idx === 3;
          var row = rows[idx];
          if (isPct) {
            row.innerHTML = '<span class="num">' + fmt(val) + '</span><span class="unit" style="margin-left:4px;margin-right:0;">%</span>';
          } else {
            row.innerHTML = '<span class="unit">' + unit + '</span><span class="num">' + fmt(val) + '</span>';
          }
        }
      });
    }
    slider.addEventListener('input', function(e) { update(e.target.value); });
    update(slider.value);
  };

  // === 2. PASSWORD_STRENGTH_METER ===
  window.__cd6PwdState = {};

  window.__cd6PwdAnalyze = function(meterId) {
    const input = document.getElementById(meterId + '_input');
    if (!input) return;
    const pwd = input.value || '';
    const state = window.__cd6PwdState[meterId];
    if (!state) return;
    // Calcular criterios
    const criteria = state.criteria;
    const common_words = state.common_words || [];
    let score = 0;
    const results = [];
    criteria.forEach(crit => {
      let met = false;
      switch (crit.key) {
        case 'length':    met = pwd.length >= 12; break;
        case 'uppercase': met = /[A-Z]/.test(pwd); break;
        case 'lowercase': met = /[a-z]/.test(pwd); break;
        case 'numbers':   met = /[0-9]/.test(pwd); break;
        case 'symbols':   met = /[^a-zA-Z0-9]/.test(pwd); break;
        case 'no_common':
          met = pwd.length > 0 && !common_words.some(w => pwd.toLowerCase().includes(w.toLowerCase()));
          break;
      }
      if (met) score += crit.weight;
      results.push({ key: crit.key, label: crit.label, met: met });
    });
    if (pwd.length === 0) score = 0;
    // Determinar nivel
    let level = null;
    for (const lvl of state.levels) {
      if (score >= lvl.min && score <= lvl.max) { level = lvl; break; }
    }
    // Renderizar
    const fill = document.getElementById(meterId + '_fill');
    const scoreEl = document.getElementById(meterId + '_score');
    const critsEl = document.getElementById(meterId + '_crits');
    const outputEl = document.getElementById(meterId + '_output');
    if (fill && level) {
      fill.style.width = Math.min(100, score) + '%';
      fill.className = 'pwstr-bar-fill ' + level.tone;
    }
    if (scoreEl && level && pwd.length > 0) {
      scoreEl.textContent = level.label;
      scoreEl.style.color = ({'lv-danger': '#8B2635', 'lv-elev': '#B8714D', 'lv-warn': '#A8881C', 'lv-safe': '#2E7D52'})[level.tone] || '#1F3864';
    } else if (scoreEl) {
      scoreEl.textContent = '—';
      scoreEl.style.color = '#6B7280';
    }
    if (critsEl) {
      critsEl.innerHTML = results.map(r => `
        <div class="pwstr-crit ${r.met ? 'met' : ''}">
          <div class="pwstr-crit-icon">${r.met ? '✓' : '·'}</div>
          <div>${r.label}</div>
        </div>
      `).join('');
    }
    if (outputEl) {
      if (pwd.length > 0 && level) {
        outputEl.classList.add('shown');
        outputEl.innerHTML = `
          <div class="pwstr-output-title" style="color: ${({'lv-danger': '#8B2635', 'lv-elev': '#B8714D', 'lv-warn': '#A8881C', 'lv-safe': '#2E7D52'})[level.tone]};">${level.title || ''}</div>
          <div class="pwstr-output-text">${level.text || ''}</div>
        `;
      } else {
        outputEl.classList.remove('shown');
      }
    }
  };

  window.__cd6PhishAnswer = function(emailId, choice) {
    const state = window.__cd6PhishState[emailId];
    if (!state || state.answered) return;
    state.answered = true;
    state.choice = choice;
    const isPhishing = state.email.is_phishing;
    const userSaidPhish = (choice === 'phish');
    const correct = (userSaidPhish === isPhishing);
    const emailEl = document.getElementById(emailId);
    if (!emailEl) return;
    emailEl.classList.add('answered');
    emailEl.classList.add(correct ? 'correct' : 'wrong');
    // Marcar botón elegido

    const btnPhish = emailEl.querySelector('.phish-btn.choice-phish');
    if (choice === 'real' && btnReal) btnReal.classList.add('chosen');
    if (choice === 'phish' && btnPhish) btnPhish.classList.add('chosen');
    // Render feedback
    const fb = emailEl.querySelector('.phish-feedback');
    if (fb) {
      const summary = correct
        ? `<span>✓ ${state.email.feedback_correct || 'Respuesta correcta.'}</span>`
        : `<span>✗ ${state.email.feedback_wrong || 'Falló la identificación.'}</span>`;
      const inds = (state.email.indicators || []).map(i => `<li>${i}</li>`).join('');
      fb.innerHTML = `
        <div class="phish-feedback-summary">${summary}</div>
        <ul class="phish-feedback-indicators">${inds}</ul>

    }

    window.__cd6UpdatePhishStats();
  };

  function attachKCEvents(screen) {
    document.querySelectorAll('.question-card').forEach(card => {
      const qidx = parseInt(card.dataset.qidx);
      const q = screen.questions[qidx];
      const submitBtn = card.querySelector('.quiz-submit');
      const feedback = card.querySelector('.feedback-box');

      // Toggle selected style
      card.querySelectorAll('.option-row').forEach(row => {
        row.addEventListener('click', () => {
          if (q.type === 'single') {
            card.querySelectorAll('.option-row').forEach(r => r.classList.remove('selected'));
            row.classList.add('selected');
            row.querySelector('input').checked = true;
          } else {
            const input = row.querySelector('input');
            input.checked = !input.checked;
            row.classList.toggle('selected', input.checked);
          }
        });
      });

      submitBtn.addEventListener('click', () => {
        const inputs = card.querySelectorAll('input');
        const selected = Array.from(inputs).map((inp, i) => inp.checked ? i : null).filter(x => x !== null);
        if (selected.length === 0) {
          feedback.classList.remove('correct', 'incorrect');
          feedback.classList.add('show');
          feedback.querySelector('.feedback-title').textContent = 'Seleccione una respuesta';
          feedback.querySelector('p').textContent = '';
          return;
        }
        let correct = false;
        if (q.type === 'multiple') {
          const correctSet = new Set(q.correct);
          const selSet = new Set(selected);
          correct = correctSet.size === selSet.size && Array.from(correctSet).every(x => selSet.has(x));
        } else {
          correct = selected[0] === q.correct;
        }
        // marca visual
        card.querySelectorAll('.option-row').forEach((row, i) => {
          row.classList.remove('correct', 'incorrect');
          const correctIdx = q.type === 'multiple' ? q.correct : [q.correct];
          if (correctIdx.includes(i)) row.classList.add('correct');
          else if (selected.includes(i)) row.classList.add('incorrect');
        });
        feedback.classList.add('show');
        feedback.classList.toggle('correct', correct);
        feedback.classList.toggle('incorrect', !correct);
        feedback.querySelector('.feedback-title').textContent = correct ? '¡Correcto!' : 'Revisemos esto:';
        // q.feedback es un objeto {correct, incorrect}, no un string
        var fbObj = q.feedback || {};
        var fbText = correct ? (fbObj.correct || '¡Bien hecho!') : (fbObj.incorrect || 'Revisemos la respuesta.');
        feedback.querySelector('p').textContent = fbText;
        submitBtn.disabled = true;
        inputs.forEach(i => i.disabled = true);

        // marca completado si todas las preguntas respondidas
        const allAnswered = Array.from(document.querySelectorAll('.question-card .quiz-submit')).every(b => b.disabled);
        if (allAnswered) {
          completedScreens.add(screen.id);
          updateSidebar(); saveProgress();
        }
      });
    });
  }

            : 'Le sugerimos repasar los módulos del curso y volver a intentar la evaluación. Cada módulo tiene las claves que necesita: identificar qué son los datos personales y reconocer cuáles son sensibles según la Ley 8968; comprender los cinco derechos del titular (acceso, rectificación, cancelación, oposición, información) y cómo responder cuando alguien los ejerce; y aplicar prácticas básicas de ciberseguridad para contraseñas, identificación de phishing y respuesta ante brechas. Recuerde que la aprobación se obtiene con ' + screen.passingScore + '% o más.'}</p>

      const api = window.AacromSCORM;
      if (api && api.isInitialized && api.isInitialized()) {
        api.setScore(Math.round((score / total) * 100), 100, 0);
        api.setStatus(passed ? 'passed' : 'failed');
        api.commit();
      }
    } catch (e) { console.warn('SCORM report failed:', e); }
  }

  // ==========================================================
  // NAV
  // ==========================================================
  function bindNav() {
    document.getElementById('btn-prev').addEventListener('click', () => {
      if (currentIndex > 0) { currentIndex--; renderScreen(); }
    });
    document.getElementById('btn-next').addEventListener('click', () => {
      if (currentIndex < allScreens.length - 1) { currentIndex++; renderScreen(); }
      else markCourseComplete();
    });
    document.getElementById('menu-toggle').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open');
    });
  }

  function updateFooterNav() {
    document.getElementById('btn-prev').disabled = (currentIndex === 0);
    const isLast = currentIndex === allScreens.length - 1;
    const btnNext = document.getElementById('btn-next');
    btnNext.textContent = isLast ? 'Finalizar curso ✓' : 'Continuar →';
  }

  function markCourseComplete() {
    try {
      const api = window.AacromSCORM;
      if (api && api.isInitialized && api.isInitialized()) {
        const allDone = completedScreens.size === allScreens.length;
        if (allDone && !quizFinalized) api.setStatus('completed');
        api.commit();
      }
    } catch (e) {}
  }

  // ==========================================================
  // START
  // ==========================================================
  document.addEventListener('DOMContentLoaded', init);
})();

  
  </script>
</body>
</html>
