    window.COURSE_DATA = {"code": "C-C.4", "title": "Hábitos que sostienen el rendimiento", "subtitle": "Sueño, ejercicio, alimentación y pausas: sin épica, con consistencia", "duration": "35 minutos", "author": "Aacrom", "passingScore": 80, "theme": {"primary": "#1F3864", "accent": "#C9A227", "title": "#1F3864", "text": "#2C2C2C", "background": "#FFFFFF", "fontFamily": "Open Sans"}, "modules": [{"id": "m0", "title": "Apertura", "screens": [{"id": "p_cover", "type": "course_cover_objective", "moduleTitle": "Apertura", "title": "Hábitos que sostienen el rendimiento", "subtitle": "Sueño, ejercicio, alimentación y pausas: sin épica, con consistencia", "image": "assets/images/img_01.jpg", "objective": "Identificar y aplicar cuatro hábitos de alto impacto —sueño, ejercicio, alimentación y pausas mentales— con base en evidencia, y diseñar un plan de implementación sostenible que reemplace la dependencia de la motivación por sistemas de hábitos consistentes.", "ficha": [{"label": "Duración", "value": "35 min"}, {"label": "Línea", "value": "C — Corporativa"}, {"label": "Aprobación", "value": "80%"}]}, {"id": "p_slider", "type": "hero_image", "moduleTitle": "Apertura", "title": "Lo pequeño le gana a lo grande", "image": "assets/images/img_02.jpg", "statement": "Las metas ambiciosas se rompen. Los hábitos pequeños se acumulan. Sin épica, con consistencia.", "footer": "MENOS ÉPICA · MÁS CONSISTENCIA"}, {"id": "p1", "type": "course_cover", "moduleTitle": "Apertura", "title": "Bienvenida", "subtitle": "Sueño, ejercicio, alimentación y pausas: sin épica, con consistencia", "image": "assets/images/img_01.jpg", "audio": "assets/audio/audio_01.mp3", "audio_script": "Le damos la bienvenida a este curso sobre hábitos. La mayoría de las personas adultas saben qué deberían hacer para rendir mejor... dormir más, moverse, comer con criterio, descansar la mente. Lo saben. Y aun así, no lo hacen sostenidamente. La razón no es falta de información. Es que confiamos en la motivación... y la motivación es inconstante. Lo que funciona son los hábitos. En los próximos treinta y cinco minutos, vamos a aprender la ciencia básica detrás de los cuatro hábitos de mayor impacto, y a diseñar un sistema personal para sostenerlos. Empecemos.", "body": ["La diferencia entre quienes rinden bien sostenidamente y quienes no, casi nunca está en saber qué hacer. Está en haber convertido lo que saben en sistemas automáticos que no dependen de cómo se sientan ese día.", "Este curso le va a dar la ciencia mínima necesaria para entender por qué cuatro hábitos específicos —sueño, ejercicio, alimentación y pausas mentales— tienen efecto desproporcionado sobre el rendimiento, y le va a enseñar cómo implementarlos sin caer en el ciclo de empezar el lunes y abandonar el miércoles.", "No prometemos transformación épica. Prometemos sistemas pequeños, sostenibles, basados en evidencia, que se acumulan con el tiempo. Empecemos."]}, {"id": "p2", "type": "statement_paragraphs", "moduleTitle": "Apertura", "title": "Lo que va a aprender en este curso", "image": null, "statement": "Los hábitos le ganan a la motivación cuando se diseñan bien y se sostienen con un sistema.", "paragraphs": ["<strong>Módulo 1 — Ciencia del hábito.</strong> Por qué la motivación falla, cómo funciona el circuito del hábito en el cerebro, y la regla del 1% que hace que los cambios pequeños compongan más que los grandes.", "<strong>Módulo 2 — Los cuatro hábitos de alto impacto.</strong> Sueño, ejercicio, alimentación y pausas mentales. La ciencia justa y las reglas prácticas para empezar esta semana con cada uno.", "<strong>Módulo 3 — Cómo sostenerlos en el tiempo.</strong> El sistema vence al objetivo. Cómo anticipar los días malos, qué hacer cuando el sistema falla, y cómo diseñar su plan personal para los próximos siete días."], "intro": "Al final del curso usted podrá:", "items": ["Distinguir por qué los hábitos producen resultados sostenibles que la motivación no.", "Identificar los cuatro hábitos de mayor impacto sobre el rendimiento y la salud, con evidencia.", "Aplicar al menos una regla práctica concreta por cada uno de los cuatro hábitos.", "Diseñar un plan personal de implementación que reemplace la dependencia de la motivación por un sistema."]}]}, {"id": "m1", "title": "Módulo 1: Ciencia del hábito", "screens": [{"id": "p3", "type": "module_intro_full", "moduleTitle": "Módulo 1: Ciencia del hábito", "moduleLabel": "MÓDULO 1", "title": "Por qué los hábitos le ganan a la motivación", "image": "assets/images/img_03.jpg", "audio": "assets/audio/audio_02.mp3", "audio_script": "Le damos la bienvenida al primer módulo del curso. Antes de hablar de los cuatro hábitos específicos, necesitamos entender algo más básico... y a la vez más profundo: cómo funcionan los hábitos en el cerebro humano. Por qué la motivación falla. Por qué los cambios pequeños le ganan a los grandes. Y por qué los lunes son traicioneros. Este módulo le da la ciencia mínima necesaria. No más. Empecemos.", "statement": "Saber qué hacer no produce el resultado. Hacerlo sostenidamente, sí.", "citation": "Principio operativo del módulo", "paragraphs": ["La mayoría de las personas que quieren cambiar algo en su vida —dormir mejor, moverse más, comer distinto— ya saben qué deberían hacer. La información está disponible. El problema casi nunca es de conocimiento.", "El problema es que confunden el cambio con un acto de voluntad puntual, y la voluntad es un recurso limitado. Cuando se gasta, el comportamiento vuelve a la línea base. Por eso los lunes son traicioneros: arrancan con voluntad alta, y para el miércoles ya no hay reservas.", "Los hábitos resuelven esto. Un hábito bien instalado no requiere voluntad; se ejecuta solo. Este módulo le explica por qué."], "nextSteps": "Lo que va a encontrar en este módulo", "learnItems": ["Por qué la motivación es inconstante y los hábitos no.", "Cómo funciona el circuito del hábito en el cerebro: señal → rutina → recompensa.", "La trampa del 'todo o nada' que hace fallar los lunes.", "La regla del 1%: por qué los cambios pequeños componen más que los grandes."]}, {"id": "p4", "type": "statement_paragraphs", "moduleTitle": "Módulo 1: Ciencia del hábito", "title": "Por qué la motivación falla y los hábitos no", "image": null, "statement": "La motivación es la chispa que enciende el cambio. El hábito es lo que lo mantiene cuando la chispa se apaga.", "paragraphs": ["La motivación tiene un problema biológico básico: es un estado, no un rasgo. Sube y baja según el sueño, el estrés, las hormonas, las estaciones, las noticias del día. Por eso pretender sostener un cambio sobre la motivación es como pretender que llueva todos los días porque hoy llovió.", "Un hábito funciona distinto. Es una conducta que el cerebro automatiza para ahorrar energía. Una vez instalado, la conducta se ejecuta con muy poco gasto consciente, casi por defecto. Lavarse los dientes no requiere motivación: es un hábito.", "El objetivo del cambio sostenible no es buscar más motivación. Es convertir las conductas que importan en hábitos, para que dejen de depender de cómo se siente uno ese día."], "intro": null, "items": []}, {"id": "p5", "type": "tabs", "moduleTitle": "Módulo 1: Ciencia del hábito", "title": "El circuito del hábito: señal, rutina, recompensa, anhelo", "image": null, "intro": "Todo hábito —bueno o malo— tiene la misma estructura en el cerebro. Entenderla es el primer paso para diseñar uno nuevo.", "tabs": [{"title": "1. Señal", "content": "<strong>Qué es:</strong> un disparador que le dice al cerebro que es momento de ejecutar una rutina. Puede ser una hora del día (las 7am), un lugar (la cocina), una emoción (el estrés), una persona (un colega), o una acción previa que actúa como gatillo (apagar el computador).<br><br><strong>Por qué importa:</strong> los hábitos nuevos fallan casi siempre porque no tienen señal clara. Decir 'voy a empezar a hacer ejercicio' es vago. Decir 'cuando termine de almorzar, salgo a caminar 10 minutos' es concreto: la señal es 'terminar de almorzar'."}, {"title": "2. Rutina", "content": "<strong>Qué es:</strong> la conducta en sí. La acción que se ejecuta tras la señal. Puede ser física (caminar), mental (revisar el correo) o emocional (irritarse).<br><br><strong>Por qué importa:</strong> la rutina debe ser <em>suficientemente pequeña</em> para que sea ejecutable en días malos. Si solo se puede hacer en días buenos, no es un hábito; es un evento."}, {"title": "3. Recompensa", "content": "<strong>Qué es:</strong> el resultado positivo que el cerebro asocia con la rutina. Puede ser inmediato (sabor, alivio, sensación de logro) o diferido (mejor sueño, más energía mañana).<br><br><strong>Por qué importa:</strong> el cerebro instala hábitos solo cuando hay recompensa percibida. Por eso los hábitos saludables cuestan tanto: las recompensas suelen ser diferidas (no se ve el efecto hasta semanas después). Hay que diseñarles recompensas inmediatas adicionales: una taza de café después de caminar, marcar una casilla en un calendario."}, {"title": "4. Anhelo", "content": "<strong>Qué es:</strong> el deseo anticipado de la recompensa. Es lo que hace que, con el tiempo, la sola señal active el impulso de ejecutar la rutina, antes de pensarlo.<br><br><strong>Por qué importa:</strong> el anhelo es la firma de un hábito ya instalado. Cuando alguien lleva tres meses caminando después de almorzar y un día se salta la caminata, siente que falta algo. Eso es anhelo. Es la señal de que el hábito ya no requiere voluntad."}]}, {"id": "p6", "type": "statement_paragraph", "moduleTitle": "Módulo 1: Ciencia del hábito", "title": "Por qué fallan los lunes: la trampa del 'todo o nada'", "image": null, "statement": "El error más común al instalar un hábito nuevo es pedirle demasiado el primer día.", "subheading": "Demasiado, demasiado pronto", "body": "El lunes es el día del optimismo desinformado. La motivación está alta —es lunes, semana nueva, todo es posible— y se diseñan planes que asumen que los próximos cinco días serán igual de luminosos. Una hora diaria de ejercicio. Sin azúcar. Sin redes. Dormir a las diez. Para el miércoles, el agotamiento del trabajo real choca con el plan ideal. Y como el plan era 'todo', no cumplirlo se siente como 'nada'. Se abandona.<br><br>El antídoto es contraintuitivo: <strong>diseñe un hábito tan pequeño que sea imposible no hacerlo</strong>, incluso en el peor día. Cinco minutos de caminata, no una hora. Dos páginas de lectura, no un capítulo. Una manzana al día, no rediseñar toda la alimentación. La consistencia importa cien veces más que la intensidad. Una vez instalado, el hábito puede crecer. Pero la batalla del primer mes es contra el 'todo o nada'."}, {"id": "p7", "type": "hotspots", "moduleTitle": "Módulo 1: Ciencia del hábito", "title": "La regla del 1%: por qué los cambios pequeños componen", "image": "assets/images/img_04.jpg", "intro": "Mejorar un 1% por día no parece nada en el momento. Pero con interés compuesto, en un año son 37 veces mejor. La curva no es lineal: es exponencial. Estos son los cuatro puntos clave para entenderla.", "hotspots": [{"label": "Día 1", "content": "El cambio de hoy es invisible. Caminar 10 minutos no produce ningún resultado medible. Esa es la trampa: el cerebro busca recompensa inmediata, y aquí no la hay. Por eso casi todos abandonan en esta zona."}, {"label": "Mes 1", "content": "Los efectos siguen siendo sutiles. Quizás duerme un poco mejor. Quizás tiene menos hambre por la noche. Nada espectacular. Pero el hábito ya está empezando a automatizarse: requiere menos voluntad ejecutarlo que la primera semana."}, {"label": "Mes 6", "content": "Aquí empieza a notarse. Las personas cercanas comentan. Hay energía sostenida durante la jornada. El hábito ya es parte de la identidad: 'soy alguien que camina después de almorzar', no 'estoy intentando caminar'."}, {"label": "Año 1", "content": "Efecto compuesto. El sueño es mejor, el ánimo es mejor, el rendimiento cognitivo es mejor. No por el día 365, sino por la acumulación de los 365 pequeños depósitos. Y el hábito ya no requiere voluntad; es automático."}]}, {"id": "p8", "type": "knowledge_check", "moduleTitle": "Módulo 1: Ciencia del hábito", "title": "Verifique lo aprendido", "image": null, "questions": [{"type": "single", "stem": "Lucía decide ir al gimnasio todos los días después del trabajo, una hora. La primera semana cumple cuatro días. La segunda, dos. La tercera, ninguno. ¿Cuál es el error de diseño más probable en su hábito?", "options": ["Eligió el gimnasio en lugar de caminar al aire libre.", "Le pidió al hábito demasiado el primer día, sin diseñarlo pequeño para días malos.", "No tenía suficiente motivación para sostenerlo.", "Le faltó disciplina y constancia."], "correctAnswer": 1, "correct": 1, "feedback": {"correct": "Exacto. El error clásico del 'todo o nada': una hora diaria es demasiado para el peor día. Un hábito sostenible se diseña para ejecutarse incluso en días malos, no solo en días buenos.", "incorrect": "Revisemos: el problema no es la motivación ni la disciplina (esos son síntomas, no causas), ni el tipo de ejercicio. El error está en haber diseñado el hábito demasiado grande para los días malos. Se llama la trampa del 'todo o nada'."}}, {"type": "single", "stem": "¿Cuál es la diferencia clave entre la motivación y un hábito instalado?", "options": ["La motivación es mental y el hábito es físico.", "La motivación es un estado que sube y baja; el hábito es automático y requiere poca energía consciente.", "Los hábitos son para gente disciplinada, la motivación para todo el mundo.", "No hay diferencia; son lo mismo con distinto nombre."], "correctAnswer": 1, "correct": 1, "feedback": {"correct": "Correcto. Ese es el punto clave del módulo. La motivación es un estado inestable; el hábito es una rutina automatizada. Por eso los cambios sostenibles se basan en hábitos, no en motivación.", "incorrect": "La distinción es importante: la motivación es un <em>estado</em> que fluctúa con el sueño, el estrés y el ánimo. Un hábito instalado se ejecuta solo, sin gasto consciente. Por eso los hábitos son más confiables que la motivación."}}]}, {"id": "p9", "type": "module_outro", "moduleTitle": "Módulo 1: Ciencia del hábito", "title": "Lo que cierra este módulo", "image": null, "items": ["<strong>La motivación es un estado, no un rasgo.</strong> Pretender sostener un cambio sobre la motivación es construir sobre arena. Los hábitos resuelven esto al automatizar la conducta.", "<strong>Todo hábito tiene la misma estructura:</strong> señal → rutina → recompensa → anhelo. Los hábitos nuevos fallan casi siempre porque no tienen señal clara o no tienen recompensa inmediata diseñada.", "<strong>La regla del 1%:</strong> diseñe el hábito tan pequeño que sea imposible no ejecutarlo en el peor día. La consistencia importa cien veces más que la intensidad. Los cambios pequeños componen exponencialmente."]}]}, {"id": "m2", "title": "Módulo 2: Los 4 hábitos de alto impacto", "screens": [{"id": "p10", "type": "module_intro_full", "moduleTitle": "Módulo 2: Los 4 hábitos de alto impacto", "moduleLabel": "MÓDULO 2", "title": "Cuatro hábitos, cuatro palancas", "image": "assets/images/img_02.jpg", "audio": "assets/audio/audio_03.mp3", "audio_script": "Le damos la bienvenida al módulo dos. Hay muchos hábitos que pueden mejorar el rendimiento. Pero entre todos, cuatro tienen un impacto desproporcionado. Tanto que vale la pena empezar por estos antes que por cualquier otro. Sueño. Ejercicio. Alimentación. Pausas mentales. Vamos a ver la ciencia justa de cada uno... un caso corto de alguien que lo implementó... y al menos una regla concreta para empezar esta semana. Sin épica. Empecemos.", "statement": "Cuatro hábitos explican la mayor parte del rendimiento sostenido. Empezar por estos es Pareto puro.", "citation": "Principio operativo del módulo", "paragraphs": ["Hay decenas de hábitos saludables. Meditar, agradecer, leer, planificar, hidratarse, exponerse al sol. Todos suman. Pero la evidencia es clara en que cuatro tienen un efecto desproporcionado sobre el rendimiento cognitivo, el estado de ánimo, la salud cardiovascular y la longevidad: dormir, moverse, comer con criterio, descansar la mente intencionalmente.", "Empezar por estos cuatro antes que por cualquier otro es Pareto aplicado: el 20% de los hábitos que producen el 80% del resultado. Este módulo cubre los cuatro: la ciencia justa de cada uno, un caso real de alguien que lo implementó, y al menos una regla concreta para esta semana."], "nextSteps": "Lo que va a encontrar en este módulo", "learnItems": ["Hábito 1 · Sueño: la base de todo lo demás.", "Hábito 2 · Ejercicio: no es estética, es función cognitiva.", "Hábito 3 · Alimentación: energía estable, no picos.", "Hábito 4 · Pausas mentales: recuperación cognitiva intencional."]}, {"id": "p11", "type": "statement_paragraphs", "moduleTitle": "Módulo 2: Los 4 hábitos de alto impacto", "title": "Hábito 1 · Sueño: la base de todo lo demás", "image": "assets/images/img_05.jpg", "statement": "Si solo pudiera elegir un hábito para cambiar, elija dormir. Todos los demás dependen de este.", "paragraphs": ["Durante el sueño profundo, el cerebro consolida la memoria del día, repara tejidos, regula hormonas que controlan el hambre y el estrés, y limpia desechos metabólicos que se acumulan durante la vigilia. No es tiempo perdido: es trabajo activo de mantenimiento sin el cual nada más funciona bien.", "<strong>Lo que muestran los estudios:</strong> dormir menos de seis horas reiteradamente reduce el rendimiento cognitivo a niveles equivalentes a estar levemente intoxicado, aumenta el apetito por alimentos procesados, eleva el cortisol basal, y empeora la respuesta emocional al estrés. No es una opinión: es lo que muestran décadas de investigación.", "<strong>El problema cultural:</strong> dormir poco se asocia con productividad ('hice una nocheada'), cuando la evidencia muestra lo contrario. Una persona que duerme bien produce más en seis horas de trabajo que una privada de sueño en diez. Dormir es la inversión de mayor retorno del día."], "intro": null, "items": []}, {"id": "p12", "type": "case_study", "moduleTitle": "Módulo 2: Los 4 hábitos de alto impacto", "title": "Caso: Roberto, el ingeniero que no entendía por qué rendía menos", "image": "assets/images/img_06.jpg", "audio": "assets/audio/audio_04.mp3", "audio_script": "Roberto es ingeniero. Treinta y cuatro años. Durante meses sintió que algo no funcionaba. El código que antes le salía limpio... ahora le tomaba el doble. Cometía errores de novato. Y al final del día estaba agotado, como si hubiera trabajado el doble. Pensó que era el equipo. Pensó que era el cansancio normal de los proyectos. Hasta que un médico le hizo una pregunta simple. ¿Cuántas horas duerme por noche? Roberto contó hacia atrás. Llevaba casi un año durmiendo cinco horas. Cinco y media en buena noche. El médico le dijo algo que lo desarmó. Su rendimiento no estaba bajando por el equipo. Estaba bajando porque su cerebro... literalmente no estaba terminando las tareas de mantenimiento nocturno.", "subtitle": "Cuando bajar rendimiento se confunde con falta de talento", "body": "Después de esa consulta, Roberto cambió una sola cosa: empezó a apagar las pantallas a las diez de la noche. Sin más reglas, sin programa de meditación, sin suplementos. Solo eso.<br><br>A las tres semanas dormía siete horas de forma natural. A las seis semanas, sus revisiones de código volvían al nivel anterior. A los tres meses, había recuperado completamente la sensación de claridad que había perdido durante el año previo.<br><br><strong>En síntesis:</strong> Roberto no necesitaba mejorar su trabajo. Necesitaba dormir. Su cerebro no era el problema; era el insumo que le estaba dando."}, {"id": "p13", "type": "accordion", "moduleTitle": "Módulo 2: Los 4 hábitos de alto impacto", "title": "Tres reglas para mejorar el sueño esta semana", "image": null, "intro": "No necesita un programa complejo. Estas tres reglas son las de mayor impacto y se pueden empezar mañana.", "items": [{"title": "1. Horario fijo, sobre todo de despertar", "content": "El cerebro se calibra por la hora a la que <em>despierta</em>, no por la hora a la que se acuesta. Si despierta a las 6:30 entre semana, hacerlo también el fin de semana —o a lo sumo una hora más tarde— mantiene el reloj biológico estable. Las trasnochadas de viernes producen 'jet lag social' los lunes.<br><br><strong>Cómo empezar:</strong> elija una hora de despertar fija. Acepte que la hora de acostarse se va a ajustar sola para sostenerla. La regularidad importa más que el número total de horas."}, {"title": "2. Luz brillante en la primera hora del día", "content": "La luz natural en los primeros 30 a 60 minutos después de despertar es la señal más potente para el reloj biológico. Le dice al cerebro 'es de día', y eso pone en marcha la cadena hormonal que garantiza somnolencia en la noche.<br><br><strong>Cómo empezar:</strong> salga al balcón, camine al café, tome desayuno cerca de una ventana. Diez minutos de luz natural en la mañana valen más que cualquier suplemento para dormir."}, {"title": "3. Pantallas y comidas pesadas: stop dos horas antes", "content": "La luz azul de las pantallas reduce la producción de melatonina —la hormona que induce el sueño— y las comidas pesadas mantienen al sistema digestivo trabajando cuando debería estar bajando revoluciones. Las dos cosas atrasan el inicio del sueño profundo, que es la fase de mayor recuperación.<br><br><strong>Cómo empezar:</strong> apague pantallas y cene ligero al menos dos horas antes de la hora objetivo de dormir. Si necesita revisar algo después, use modo nocturno con brillo bajo."}]}, {"id": "p14", "type": "statement_paragraphs", "moduleTitle": "Módulo 2: Los 4 hábitos de alto impacto", "title": "Hábito 2 · Ejercicio: no es estética, es función cognitiva", "image": "assets/images/img_07.jpg", "statement": "Moverse no es para verse mejor. Es para pensar mejor, manejar el estrés mejor y dormir mejor.", "paragraphs": ["El ejercicio tiene un problema cultural: se vendió durante décadas como medio para verse bien. Esa narrativa hizo que mucha gente lo abandonara cuando los resultados estéticos no llegaron en el plazo esperado. Pero la estética es el efecto menos importante del ejercicio.", "<strong>Lo que muestran los estudios:</strong> moverse aumenta el flujo sanguíneo cerebral, libera factores de crecimiento neuronal, mejora la consolidación de memoria, regula el sistema de estrés a la baja, y mejora la calidad del sueño de esa noche. Los efectos cognitivos son visibles en el mismo día.", "<strong>El cambio de marco:</strong> si lo piensa como 'ejercicio para ponerse en forma', va a abandonar cuando la balanza no se mueva. Si lo piensa como 'media hora de inversión en su cerebro y su sueño', el retorno se siente esa misma tarde. Las dos cosas son ciertas, pero la segunda sostiene el hábito mejor."], "intro": null, "items": []}, {"id": "p15", "type": "case_study", "moduleTitle": "Módulo 2: Los 4 hábitos de alto impacto", "title": "Caso: Andrea, la abogada que caminaba veinte minutos al mediodía", "image": "assets/images/img_08.jpg", "audio": "assets/audio/audio_05.mp3", "audio_script": "Andrea es abogada. Cuarenta y dos años. Socia de su despacho. Durante años intentó incorporar ejercicio a su rutina. Se inscribió en gimnasios. Compró equipamiento. Probó clases. Pero ninguna de esas opciones sobrevivió más de tres semanas. El problema no era falta de voluntad. Era que cada opción exigía una hora completa más traslados, y los días de trabajo ya estaban llenos. Hasta que cambió la pregunta. En vez de preguntarse cuándo iba a hacer ejercicio... se preguntó qué espacio del día ya tenía disponible que pudiera convertirse en movimiento. La respuesta era obvia. El mediodía. Empezó a caminar veinte minutos antes de almorzar. Sola. Sin audífonos. Y eso, que parecía trivial, fue lo que se sostuvo.", "subtitle": "Lo que se sostiene es lo que cabe en el día real, no en el día ideal", "body": "A los seis meses, Andrea había caminado más que en los cinco años anteriores combinados. Su sueño mejoró. Su capacidad de concentrarse durante la tarde —que antes se desplomaba a las 3pm— se sostenía. Y la caminata, que empezó como hábito de salud, terminó convertida en el momento del día en el que mejor pensaba.<br><br><strong>En síntesis:</strong> Andrea no necesitaba más motivación ni un gimnasio mejor. Necesitaba un hábito que cupiera en su día real, no en su día ideal. Los veinte minutos eran ejecutables incluso en su peor semana. Por eso sobrevivieron."}, {"id": "p16", "type": "decision_matrix", "moduleTitle": "Módulo 2: Los 4 hábitos de alto impacto", "title": "El mínimo viable: cuánto y qué tipo de movimiento basta", "image": null, "intro": "No todos los perfiles necesitan lo mismo. Esta matriz cruza frecuencia y intensidad para ayudarle a ubicar el mínimo viable según su punto de partida.", "xAxis": "Intensidad (suave ↔ intensa)", "yAxis": "Frecuencia (baja ↔ alta)", "quadrants": [{"position": "bl", "label": "Zona de arranque", "subtitle": "Frecuencia baja · Intensidad suave", "content": "Quien no se mueve hace meses o años. <strong>El objetivo es no abandonar.</strong><br><br>Recomendación: caminar 10-15 minutos, tres veces por semana. No importa la velocidad. Lo único que importa es la consistencia. En cuatro semanas, esto solo ya reduce ansiedad, mejora el sueño y eleva la energía basal. No agregue nada más hasta que esto esté instalado.", "color": "#E8F0F7"}, {"position": "tl", "label": "Zona de sostenibilidad", "subtitle": "Frecuencia alta · Intensidad suave", "content": "El mejor lugar a largo plazo para la mayoría. <strong>Caminar todos los días o casi.</strong><br><br>Recomendación: 30-45 minutos de caminata diaria. Puede ser dividida en bloques. Este patrón es el que correlaciona más fuerte con longevidad en estudios poblacionales. No requiere equipo, no genera lesiones, y la recuperación es instantánea. Es la base sobre la que se puede agregar todo lo demás.", "color": "#DAF1E3"}, {"position": "br", "label": "Zona de complemento", "subtitle": "Frecuencia baja · Intensidad intensa", "content": "Para quien ya tiene base de caminata y quiere agregar fuerza o cardio fuerte. <strong>Dos sesiones intensas a la semana, máximo.</strong><br><br>Recomendación: una sesión de fuerza (45-60 min) más una sesión de cardio intenso o deporte (45 min). Más que eso, para alguien con trabajo cognitivo intenso, suele restar más de lo que suma porque la recuperación se vuelve insuficiente.", "color": "#FBE9D3"}, {"position": "tr", "label": "Zona de atletas", "subtitle": "Frecuencia alta · Intensidad intensa", "content": "<strong>No es la zona objetivo para la mayoría.</strong><br><br>Cinco o más sesiones intensas semanales solo tiene sentido para deportistas con objetivos específicos, estructura de recuperación, y carga de trabajo cognitivo moderada. Para profesionales con trabajo demandante, este patrón compite con el sueño y aumenta el cortisol. No es 'lo ideal'. Es lo que sirve para metas particulares.", "color": "#FAF6E8"}]}, {"id": "p17", "type": "statement_paragraphs", "moduleTitle": "Módulo 2: Los 4 hábitos de alto impacto", "title": "Hábito 3 · Alimentación: energía estable, no picos", "image": "assets/images/img_09.jpg", "statement": "Lo que comemos no es solo combustible. Es la materia prima del estado de ánimo, del foco y del sueño.", "paragraphs": ["Hay miles de dietas, y la mayoría se contradicen entre sí. Esto genera la sensación de que la alimentación es un campo confuso donde no hay reglas claras. No es cierto. Hay un puñado de principios sobre los que toda la evidencia coincide.", "<strong>El principio central:</strong> el cerebro funciona mejor cuando la glucosa se mantiene estable, no cuando sube y baja en picos. Los picos de glucosa producen bajones de energía 1-2 horas después, hambre prematura, y ese 'cansancio mental' de las 3pm que la mayoría atribuye al estrés cuando en realidad es bioquímico.", "<strong>Las decisiones de mayor impacto:</strong> qué se come en el desayuno y al mediodía afecta cómo se rinde la tarde. No se trata de eliminar grupos de alimentos: se trata de ordenar el plato para que la energía dure. Proteína y fibra primero, carbohidratos refinados al final. Eso solo cambia la curva de glucosa significativamente."], "intro": null, "items": []}, {"id": "p18", "type": "case_study", "moduleTitle": "Módulo 2: Los 4 hábitos de alto impacto", "title": "Caso: Felipe, el gerente que cambió un solo desayuno", "image": "assets/images/img_10.jpg", "audio": "assets/audio/audio_06.mp3", "audio_script": "Felipe es gerente de operaciones. Cuarenta y cinco años. Durante años desayunó lo mismo. Pan blanco con mermelada. Jugo de naranja. Café con azúcar. Estaba convencido de que era un desayuno saludable. Y tenía un problema sostenido. A las once de la mañana se sentía agotado. Necesitaba un segundo café. A la una almorzaba con apuro porque ya estaba famélico. Y entre las tres y las cuatro de la tarde... se volvía improductivo. Pensaba que era el estrés del cargo. Hasta que un nutricionista le mostró su curva de glucosa con un sensor de tres días. El desayuno producía un pico enorme... seguido de una caída brusca a las once. Felipe cambió una sola cosa. Cambió el pan por dos huevos revueltos. Mantuvo el café. Eliminó el jugo. Y la curva se aplanó. La caída de las once desapareció. El bajón de las tres también. Sin proponérselo, bajó tres kilos en dos meses.", "subtitle": "El cambio más rentable suele ser el más concentrado", "body": "Felipe no se puso a dieta. No contó calorías. No eliminó grupos de alimentos. Lo único que hizo fue cambiar la composición del primer alimento del día.<br><br>El cambio se sostuvo —y se sostiene tres años después— por una razón simple: <strong>el resultado se sentía el mismo día</strong>. La energía a las once dejó de derrumbarse. La tarde dejó de ser un esfuerzo. Esa recompensa inmediata era el anhelo que mantenía el hábito sin esfuerzo consciente.<br><br><strong>En síntesis:</strong> cambiar todo es ingobernable. Cambiar el desayuno es ejecutable. Y, en muchos casos, es donde está la mayor palanca."}, {"id": "p19", "type": "sorting", "moduleTitle": "Módulo 2: Los 4 hábitos de alto impacto", "title": "Clasifique las decisiones alimenticias", "image": null, "instruction": "Arrastre cada decisión a la categoría correspondiente. ¿Sostiene la energía estable o la rompe en picos?", "categories": ["Sostiene energía estable", "Produce picos y caídas"], "items": [{"text": "Desayuno con proteína (huevos, yogur natural, frutos secos).", "category": 0}, {"text": "Pan blanco con mermelada y jugo de fruta.", "category": 1}, {"text": "Almuerzo que empieza por ensalada y proteína, los carbohidratos al final.", "category": 0}, {"text": "Galletas o pan industrial como snack a media mañana.", "category": 1}, {"text": "Frutos secos (almendras, nueces) entre comidas.", "category": 0}, {"text": "Bebida azucarada o gaseosa con el almuerzo.", "category": 1}, {"text": "Fruta entera como postre o snack.", "category": 0}, {"text": "Cereales 'integrales' con azúcar añadida en el desayuno.", "category": 1}]}, {"id": "p20", "type": "statement_paragraphs", "moduleTitle": "Módulo 2: Los 4 hábitos de alto impacto", "title": "Hábito 4 · Pausas mentales: recuperación cognitiva intencional", "image": "assets/images/img_11.jpg", "statement": "La atención sostenida no es ilimitada. La pregunta no es si va a fallar, sino si la recupera antes o después de que se rompa.", "paragraphs": ["El cerebro humano no está diseñado para mantener foco profundo durante ocho horas continuas. La atención funciona en ciclos: períodos de concentración seguidos de períodos de recuperación. Cuando se intenta forzar la atención más allá del ciclo, la calidad del trabajo cae bruscamente, aunque la sensación subjetiva sea 'sigo trabajando'.", "<strong>Lo que muestran los estudios:</strong> el rendimiento se sostiene mejor con bloques de 60 a 90 minutos de trabajo enfocado seguidos de 5 a 15 minutos de recuperación real, que con cuatro horas seguidas de trabajo declarado pero interrumpido por correos, notificaciones y micro-distracciones.", "<strong>El principio práctico:</strong> las pausas no son tiempo perdido. Son la condición que hace posible la siguiente hora productiva. Las personas con mayor rendimiento sostenido no son las que trabajan más horas seguidas, sino las que recuperan mejor entre bloques."], "intro": null, "items": []}, {"id": "p21", "type": "case_study", "moduleTitle": "Módulo 2: Los 4 hábitos de alto impacto", "title": "Caso: Mariana, la consultora que aprendió a parar antes de quemarse", "image": "assets/images/img_12.jpg", "audio": "assets/audio/audio_07.mp3", "audio_script": "Mariana es consultora estratégica. Treinta y nueve años. Trabajaba como muchos en su sector: diez, doce horas seguidas. Cafés entre llamadas. Almuerzo frente a la pantalla. Convencida de que descansar era para los demás. Durante años funcionó. Hasta que dejó de funcionar. Los entregables se volvieron tibios. Las ideas dejaron de aparecer. Sentía que estaba siempre cansada, incluso después de un fin de semana entero de descanso. Su coach le dijo algo simple. No estaba cansada por trabajar mucho. Estaba cansada por nunca terminar de recuperarse. Mariana hizo un cambio incómodo. Programó pausas obligatorias. Cada noventa minutos, cinco minutos sin pantalla. Al mediodía, media hora real... lejos del escritorio. Sin trabajo. Lo difícil no fue cumplir las pausas. Fue tolerar la incomodidad de no estar produciendo. A las tres semanas, su productividad real... no la sensación de productividad, había subido.", "subtitle": "La pausa que parece tiempo perdido es la que sostiene la siguiente hora", "body": "Después de dos meses, Mariana producía la misma cantidad de trabajo en ocho horas que antes hacía en doce. Lo que cambió no fue la velocidad. Cambió la calidad. Las decisiones estratégicas que antes le costaban un día entero, ahora le tomaban dos horas con foco real.<br><br><strong>En síntesis:</strong> Mariana no era menos capaz. Estaba operando crónicamente sin recuperar. El problema no era la cantidad de trabajo: era la ausencia de pausas que permitieran que el siguiente bloque fuera bueno. Una vez que las pausas se volvieron innegociables, todo lo demás se reordenó."}, {"id": "p22", "type": "tabs", "moduleTitle": "Módulo 2: Los 4 hábitos de alto impacto", "title": "Cuatro tipos de pausas y cuándo usar cada una", "image": null, "intro": "No todas las pausas hacen lo mismo. Diseñar bien el día implica usar el tipo correcto en cada momento.", "tabs": [{"title": "Micro-pausa", "content": "<strong>Duración:</strong> 1-3 minutos.<br><strong>Cuándo:</strong> entre tareas pequeñas, después de un correo difícil, antes de una llamada importante.<br><br>Sirve para resetear la atención sin perder contexto. Mire por la ventana, respire profundo, estire los hombros. Es lo opuesto a 'descansar revisando el teléfono', que no es pausa real porque mantiene al cerebro en modo entrada de información."}, {"title": "Pausa activa", "content": "<strong>Duración:</strong> 5-15 minutos.<br><strong>Cuándo:</strong> cada 60-90 minutos de trabajo enfocado.<br><br>Sirve para recuperar el ciclo atencional. Levántese del escritorio, camine, tome agua, mire algo lejano para descansar la vista. Lo importante es <em>cambiar de modo</em>: si trabajó sentado mirando una pantalla, la pausa debe ser de pie, mirando algo lejos."}, {"title": "Pausa profunda", "content": "<strong>Duración:</strong> 30-60 minutos al mediodía.<br><strong>Cuándo:</strong> una vez al día, idealmente en la mitad de la jornada.<br><br>Sirve para resetear la energía del día completo, no de un ciclo. Almuerce sin pantalla, camine, converse con alguien sobre algo no laboral. Es la pausa que hace que la tarde rinda. Las personas que se la saltan suelen tener un colapso de energía entre 3 y 5pm."}, {"title": "Descanso semanal", "content": "<strong>Duración:</strong> al menos un día completo a la semana, idealmente dos.<br><strong>Cuándo:</strong> en una rutina semanal predecible.<br><br>Sirve para que el sistema de estrés vuelva a línea base. No requiere actividades 'productivas' ni planes complejos. Solo requiere desconexión real del trabajo: sin correos, sin llamadas, sin pensar en pendientes. Es el equivalente cognitivo del sueño nocturno, pero a escala semanal."}]}, {"id": "p23", "type": "knowledge_check", "moduleTitle": "Módulo 2: Los 4 hábitos de alto impacto", "title": "Verifique lo aprendido", "image": null, "questions": [{"type": "single", "stem": "Si solo pudiera empezar por uno de los cuatro hábitos esta semana, ¿cuál tiene el mayor efecto base sobre el rendimiento, según el módulo?", "options": ["Ejercicio: porque mejora el ánimo de inmediato.", "Sueño: porque es la base sobre la que funcionan los otros tres.", "Alimentación: porque controla la energía durante el día.", "Pausas mentales: porque sostienen la atención."], "correctAnswer": 1, "correct": 1, "feedback": {"correct": "Correcto. El sueño es el hábito base: regula hormonas, consolida memoria, y la falta de sueño hace que los otros tres hábitos sean más difíciles de sostener (más hambre por alimentos procesados, menos energía para ejercicio, menos foco para pausas intencionales).", "incorrect": "Recuerde: el sueño es el hábito base. Sin sueño suficiente, el ejercicio cuesta, la alimentación tiende a peor (más hambre por azúcar), y las pausas mentales sirven menos porque el cerebro ya viene comprometido. Por eso es el lugar lógico para empezar."}}, {"type": "multiple", "stem": "¿Cuáles de los siguientes son patrones de pausa que SÍ funcionan para recuperar la atención? (Seleccione todas las correctas.)", "options": ["Cambiar de modo: si estaba sentado mirando pantalla, levantarse y mirar lejos.", "Revisar redes sociales durante 5 minutos.", "Pausa profunda al mediodía sin pantalla.", "Caminar tres minutos entre bloques de trabajo."], "correctAnswer": [0, 2, 3], "correct": [0, 2, 3], "feedback": {"correct": "Correcto. La clave está en cambiar de modo cognitivo. Revisar redes sociales no es pausa real porque mantiene el cerebro en modo entrada de información; solo cambia el tipo de estímulo, no permite recuperación.", "incorrect": "Revise: revisar redes no es pausa real porque mantiene al cerebro recibiendo estímulos. Las otras tres opciones implican cambio de modo (de sentado a parado, de pantalla a sin pantalla, de mental a físico)."}}]}, {"id": "p24", "type": "module_outro", "moduleTitle": "Módulo 2: Los 4 hábitos de alto impacto", "title": "Lo que cierra este módulo", "image": null, "items": ["<strong>Sueño.</strong> La base de todo lo demás. Tres reglas: horario fijo de despertar, luz brillante en la primera hora del día, sin pantallas ni comidas pesadas dos horas antes de dormir.", "<strong>Ejercicio.</strong> No es para verse bien, es para pensar bien. Para la mayoría, lo sostenible es caminar diario suave, no entrenar intenso esporádicamente.", "<strong>Alimentación.</strong> Energía estable, no picos. El cambio más rentable suele estar en el desayuno: proteína y fibra antes que carbohidratos refinados.", "<strong>Pausas mentales.</strong> No son tiempo perdido. Son la condición para que el siguiente bloque rinda. Hay cuatro tipos: micro, activa, profunda y descanso semanal."]}]}, {"id": "m3", "title": "Módulo 3: Cómo sostenerlos en el tiempo", "screens": [{"id": "p25", "type": "module_intro_full", "moduleTitle": "Módulo 3: Cómo sostenerlos en el tiempo", "moduleLabel": "MÓDULO 3", "title": "De saber qué hacer a sostenerlo", "image": "assets/images/img_13.jpg", "audio": "assets/audio/audio_08.mp3", "audio_script": "Le damos la bienvenida al módulo tres. Hasta acá tiene la ciencia... y los cuatro hábitos. Pero la mayoría de la gente que abandona no abandona por falta de información. Abandona en los días malos. En los lunes con gripe. En las semanas con un proyecto demandante. Este módulo es sobre eso. Cómo diseñar un sistema que sobrevive a los días malos... no uno que solo funciona en los buenos. Y al final, va a diseñar su propio plan para los próximos siete días.", "statement": "El sistema vence al objetivo. No falla quien no se esfuerza: falla quien depende de su motivación de ese día.", "citation": "Principio operativo del módulo", "paragraphs": ["Casi todos los hábitos saludables se abandonan no por falta de conocimiento ni de motivación inicial, sino porque el sistema que los sostiene no fue diseñado para sobrevivir los días malos. Cuando llega el día con gripe, la semana con proyecto demandante, el mes con un duelo, el hábito se desmorona y muchas veces ya no vuelve.", "Este módulo cubre los principios para diseñar un sistema robusto. Cómo anticipar los días malos antes de que lleguen, qué hacer cuando el sistema falla (porque va a fallar), y cómo formalizar un plan personal concreto para los próximos siete días."], "nextSteps": "Lo que va a encontrar en este módulo", "learnItems": ["Los cuatro principios del sistema que sostiene hábitos.", "Un escenario de decisión: diseñe el próximo hábito de un profesional.", "La regla 'nunca dos días seguidos' para cuando el sistema falla.", "Su plan personal de siete días, con hábito mínimo viable y disparador definido."]}, {"id": "p26", "type": "statement_paragraphs", "moduleTitle": "Módulo 3: Cómo sostenerlos en el tiempo", "title": "El sistema vence al objetivo: cuatro principios", "image": null, "statement": "Un objetivo le dice adónde quiere llegar. Un sistema decide cómo se comporta hoy.", "paragraphs": ["La diferencia entre quienes sostienen hábitos durante años y quienes los abandonan en semanas casi nunca está en los objetivos. Los dos grupos quieren lo mismo: dormir mejor, moverse, comer bien. La diferencia está en el diseño del sistema que ejecuta esos objetivos en el día a día. Estos son los cuatro principios que la evidencia respalda más fuerte:"], "intro": "Cuatro principios del sistema", "items": ["<strong>1. Hacerlo evidente.</strong> La señal del hábito debe estar a la vista o ligada a algo que ya hace todos los días. 'Cuando termine de almorzar, salgo a caminar diez minutos' es más sólido que 'voy a empezar a caminar'.", "<strong>2. Hacerlo fácil.</strong> Reduzca la fricción de inicio. Deje las zapatillas de caminar junto a la puerta. Tenga el desayuno con proteína preparado la noche anterior. Cada gramo de fricción aumenta la probabilidad de saltarlo en un día malo.", "<strong>3. Hacerlo satisfactorio.</strong> Diseñe una recompensa inmediata, aunque sea pequeña: marcar una casilla en un calendario, una taza de café después de caminar. El cerebro instala hábitos cuando hay recompensa percibida, y los efectos saludables son demasiado lentos como recompensa.", "<strong>4. Diseñarlo para el peor día.</strong> Si el hábito solo se puede hacer en días buenos, no es hábito. Versión mínima viable: cinco minutos en vez de cuarenta y cinco, dos páginas en vez de un capítulo. Lo que se hace cuesta veces vence a lo que se hace intensamente una vez."]}, {"id": "p27", "type": "decision_scenario", "moduleTitle": "Módulo 3: Cómo sostenerlos en el tiempo", "title": "¿Qué le recomienda a este profesional?", "image": "assets/images/img_14.jpg", "instructions": "<strong>Instrucciones:</strong> lea el caso del profesional, evalúe las cuatro opciones, y elija el diseño de hábito más sostenible. Cada opción tiene su consecuencia. Tómese un momento antes de decidir.", "intro_text": "<strong>El caso.</strong> Tiene un colega de 38 años, gerente intermedio. Le cuenta que decidió mejorar su salud y quiere empezar por uno de los cuatro hábitos del curso. Está motivado: dice que esta vez va en serio. Le pide consejo sobre cómo diseñar su primer hábito. Sabe que en el pasado ha empezado fuerte y abandonado a las tres semanas. Esta vez quiere que no le pase.", "question_text": "¿Qué diseño de hábito le recomienda?", "dialogue": [{"character": "Colega", "role": "gerente intermedio, 38 años", "text": "Estoy decidido. Esta vez sí lo voy a hacer. Tengo dos opciones en la cabeza: o empezar a ir al gimnasio cinco veces por semana, o cambiar la dieta a cero azúcar. Voy a ir con todo desde el lunes. ¿Vos qué crees que es mejor?", "audio": null, "audio_script": null}], "options": [{"id": "A", "label": "Gimnasio 5 veces por semana", "subtitle": "Es la opción más completa: aprovechar la motivación inicial al máximo.", "correct": false, "result": "Es el típico patrón de abandono", "outcome": "Esta opción cae en la trampa del 'todo o nada' que vimos en el M1. La motivación inicial alta hace que parezca sostenible, pero a las 2-3 semanas el cansancio acumulado más cualquier semana difícil de trabajo vuelven el hábito imposible. Es el patrón clásico del abandono: arranca fuerte, no sobrevive el primer obstáculo."}, {"id": "B", "label": "Cero azúcar desde el lunes", "subtitle": "Decisión radical alimenticia con un solo cambio.", "correct": false, "result": "Restricciones totales tienden a romperse", "outcome": "Las restricciones tipo 'cero' suelen funcionar dos semanas y romperse con cualquier evento social, viaje o día difícil. Después del primer 'fallo', el patrón clásico es abandonar todo el sistema. Mejor 'reducir el azúcar añadido a postres del fin de semana' que 'cero azúcar siempre'."}, {"id": "C", "label": "Caminar 15 minutos después de almorzar", "subtitle": "Un solo hábito, pequeño, anclado a una rutina existente.", "correct": true, "result": "Diseño sólido en los cuatro principios", "outcome": "Excelente diseño. Cumple los cuatro principios: <strong>evidente</strong> (anclado al almuerzo, que ya hace todos los días); <strong>fácil</strong> (15 minutos, sin equipo, sin traslado); <strong>satisfactorio</strong> (efecto inmediato sobre la digestión y la concentración de la tarde); y <strong>diseñado para el peor día</strong> (15 minutos son ejecutables incluso con gripe leve o un día sobrecargado). Una vez instalado, puede crecer."}, {"id": "D", "label": "Esperar a sentirse más motivado", "subtitle": "Mejor empezar cuando la motivación esté más fuerte.", "correct": false, "result": "La motivación no llega; se construye", "outcome": "Esta opción confunde causa y efecto. La motivación no precede a la acción: la motivación aparece <em>como resultado</em> de ver progreso. Esperar a sentirse motivado es esperar indefinidamente. La forma de generar motivación es empezar con un hábito tan pequeño que sea ejecutable hoy, ver el progreso, y dejar que la motivación crezca de ahí."}], "convergent_title": "El sistema bien diseñado parece pequeño desde afuera", "convergent_text": "Hay una intuición fuerte que sabotea esta decisión: la sensación de que '15 minutos es poco'. Cuando alguien viene motivado, quiere un cambio que sienta proporcional a la motivación. Pero el sistema sostenible se diseña al revés. Se diseña <strong>para el peor día, no para el mejor</strong>. Lo que sobrevive es lo pequeño y consistente, no lo grande y esporádico. Una vez instalado, el hábito crece solo. La paradoja es que <em>diseñar el hábito pequeño</em> es lo que produce el cambio grande, porque es lo único que se sostiene.", "convergent_audio": "assets/audio/audio_09.mp3", "convergent_audio_script": "Hay una intuición fuerte que sabotea esta decisión. Cuando alguien viene motivado, quiere un cambio que sienta proporcional a la motivación. Y un hábito pequeño se siente insuficiente. Pero el sistema sostenible se diseña al revés. Se diseña para el peor día. No para el mejor. Lo que sobrevive es lo pequeño y consistente, no lo grande y esporádico. Una vez instalado, el hábito crece solo. La paradoja es esta. Diseñar el hábito pequeño... es lo que produce el cambio grande. Porque es lo único que se sostiene."}, {"id": "p28", "type": "statement_paragraph", "moduleTitle": "Módulo 3: Cómo sostenerlos en el tiempo", "title": "Anticipar los días malos: la regla 'nunca dos días seguidos'", "image": null, "statement": "El hábito no se rompe el día que falla. Se rompe el segundo día consecutivo que no se ejecuta.", "subheading": "Cuando el sistema inevitablemente falla", "body": "Todos los sistemas fallan eventualmente. Habrá un día con gripe, una semana con un proyecto que se desbordó, un fin de semana con un evento familiar. Esto no es un defecto del sistema: es parte del diseño. Pretender 100% de cumplimiento es lo que rompe a las personas perfeccionistas.<br><br><strong>La regla práctica:</strong> nunca dos días seguidos. Un día que se salta el hábito es un evento. Dos días seguidos es el inicio de un patrón. Tres días seguidos es casi siempre el final del hábito.<br><br>Por eso, cuando un día se rompe la rutina, la acción más importante no es 'recuperar' lo perdido (caminar 30 minutos al día siguiente porque no caminó hoy). La acción importante es <strong>retomar al día siguiente la versión mínima del hábito</strong>, aunque sean cinco minutos en pijama antes del trabajo. La continuidad importa más que la cantidad. Una vez que la cadena se reanuda, el sistema queda intacto."}, {"id": "p29", "type": "statement_paragraphs", "moduleTitle": "Módulo 3: Cómo sostenerlos en el tiempo", "title": "Su plan personal para los próximos siete días", "image": "assets/images/img_15.jpg", "statement": "Salir de este curso con un hábito definido vale más que salir con cuatro intenciones.", "paragraphs": ["El cierre práctico del curso es este: elija uno de los cuatro hábitos. Solo uno. El que le resulte más relevante hoy. Para los próximos siete días, va a comprometerse con la versión más pequeña ejecutable de ese hábito. No más.", "Las cuatro decisiones que hacen el plan operativo —y que conviene escribir explícitamente antes de cerrar el curso— son las siguientes:"], "intro": "Defina su hábito en cuatro líneas", "items": ["<strong>Hábito elegido.</strong> Cuál de los cuatro: sueño, ejercicio, alimentación o pausas mentales. Uno solo. (Ejemplo: pausas mentales.)", "<strong>Versión mínima viable.</strong> La forma más pequeña ejecutable, incluso en el peor día. (Ejemplo: una pausa de cinco minutos sin pantalla a la mitad de la mañana.)", "<strong>Disparador concreto.</strong> Una señal específica que ya ocurre todos los días, ligada al hábito. (Ejemplo: cuando termine la reunión de las 10:30, antes de abrir el correo.)", "<strong>Recompensa inmediata.</strong> Algo pequeño que marque la ejecución exitosa. (Ejemplo: marcar la casilla en una hoja pegada al monitor, o una taza de café.)"]}, {"id": "p30", "type": "module_outro", "moduleTitle": "Módulo 3: Cómo sostenerlos en el tiempo", "title": "Lo que cierra este módulo", "image": null, "items": ["<strong>El sistema vence al objetivo.</strong> Cuatro principios: hacerlo evidente, fácil, satisfactorio y diseñado para el peor día.", "<strong>Nunca dos días seguidos.</strong> Cuando el sistema falla, la acción importante no es recuperar lo perdido, sino retomar al día siguiente la versión mínima. La continuidad importa más que la cantidad.", "<strong>Un solo hábito a la vez.</strong> Salir del curso con un hábito definido, con disparador concreto y recompensa inmediata, vale más que salir con cuatro intenciones."]}]}, {"id": "m4", "title": "Cierre y evaluación", "screens": [{"id": "p31", "type": "quiz", "moduleTitle": "Cierre y evaluación", "title": "Evaluación final del curso", "image": null, "intro": "Diez preguntas sobre lo que vimos en los tres módulos. Para aprobar necesita 80% o más (8 de 10).", "passingScore": 80, "questions": [{"type": "single", "stem": "Pedro lleva tres semanas siguiendo un plan de gimnasio de una hora diaria. Esta semana se enfermó dos días y rompió la racha. ¿Qué le recomienda hacer mañana?", "options": ["Hacer dos horas de gimnasio mañana para 'recuperar' lo perdido.", "Esperar hasta el lunes siguiente para reiniciar bien con la semana nueva.", "Hacer una versión mínima viable (10-15 minutos) mañana mismo para no encadenar tres días.", "Cambiar el plan a 'menos exigente' antes de seguir."], "correctAnswer": 2, "correct": 2}, {"type": "single", "stem": "¿Cuál de estas frases describe mejor la diferencia entre motivación y hábito?", "options": ["La motivación es para principiantes y los hábitos para expertos.", "La motivación es un estado inestable; el hábito es una rutina automatizada que requiere poca energía consciente.", "Los hábitos son físicos y la motivación es mental.", "Son lo mismo desde el punto de vista neurológico."], "correctAnswer": 1, "correct": 1}, {"type": "single", "stem": "Los cuatro componentes del circuito del hábito en orden son:", "options": ["Recompensa → señal → rutina → anhelo.", "Anhelo → señal → recompensa → rutina.", "Señal → rutina → recompensa → anhelo.", "Rutina → recompensa → señal → anhelo."], "correctAnswer": 2, "correct": 2}, {"type": "single", "stem": "Según el módulo de sueño, ¿cuál es la señal más potente para regular el reloj biológico?", "options": ["La hora a la que se acuesta.", "La luz natural en los primeros 30-60 minutos después de despertar.", "La temperatura de la habitación.", "Tomar melatonina antes de dormir."], "correctAnswer": 1, "correct": 1}, {"type": "single", "stem": "Para la mayoría de profesionales, ¿cuál es el patrón de ejercicio más sostenible a largo plazo según la matriz del módulo?", "options": ["Cinco o más sesiones intensas a la semana.", "Tres sesiones intensas de fuerza más dos de cardio fuerte.", "Caminata diaria suave (30-45 min) como base.", "Una sesión semanal de alta intensidad."], "correctAnswer": 2, "correct": 2}, {"type": "single", "stem": "¿Cuál de estos cambios alimenticios produce mayor estabilidad de glucosa?", "options": ["Reemplazar pan blanco con mermelada por huevos revueltos en el desayuno.", "Saltarse el desayuno y solo tomar café.", "Empezar el almuerzo con el postre para tener energía.", "Comer galletas integrales con azúcar añadida a media mañana."], "correctAnswer": 0, "correct": 0}, {"type": "multiple", "stem": "¿Cuáles de estas son pausas que SÍ recuperan la atención según el módulo? (Marque todas las correctas.)", "options": ["Mirar redes sociales durante cinco minutos entre tareas.", "Caminar tres minutos al baño y de regreso.", "Almorzar sin pantalla, mirando por la ventana.", "Cambiar de tarea sin levantarse del escritorio."], "correctAnswer": [1, 2], "correct": [1, 2]}, {"type": "single", "stem": "La regla 'nunca dos días seguidos' significa:", "options": ["Hacer el hábito solo en días alternos para evitar quemarse.", "Si falla un día, no encadenar un segundo día perdido; retomar al día siguiente la versión mínima.", "Limitar el hábito a un día sí, un día no, para protegerlo del cansancio.", "Si falla dos días seguidos, descansar una semana completa."], "correctAnswer": 1, "correct": 1}, {"type": "single", "stem": "¿Cuál de estos diseños de hábito tiene mayor probabilidad de sostenerse a largo plazo?", "options": ["Cero azúcar desde el lunes que viene.", "Una hora de gimnasio cinco veces por semana, sin excepciones.", "Cinco minutos de caminata después de almorzar, todos los días.", "Esperar a sentirse motivado y entonces empezar fuerte."], "correctAnswer": 2, "correct": 2}, {"type": "matching", "stem": "Empareje cada tipo de pausa con la situación donde mejor aplica:", "pairs": [{"left": "Micro-pausa (1-3 min)", "right": "Entre tareas pequeñas o antes de una llamada importante"}, {"left": "Pausa activa (5-15 min)", "right": "Cada 60-90 minutos de trabajo enfocado"}, {"left": "Pausa profunda (30-60 min)", "right": "Una vez al día, al mediodía, lejos del escritorio"}, {"left": "Descanso semanal", "right": "Al menos un día completo sin trabajo, en rutina semanal"}]}]}, {"id": "p32", "type": "closing_resources", "moduleTitle": "Cierre y evaluación", "title": "Hábitos que sostienen el rendimiento", "image": "assets/images/img_16.jpg", "audio": "assets/audio/audio_10.mp3", "audio_script": "Ha terminado el curso. Lo importante no es haber escuchado la información. Es lo que va a hacer mañana. Recuerde el principio del curso. Diseñar el hábito pequeño... es lo que produce el cambio grande. Porque es lo único que se sostiene. Elija un solo hábito esta semana. El que sienta más relevante hoy. Hágalo en la versión más pequeña ejecutable. Anclelo a algo que ya hace todos los días. Y dele una recompensa inmediata. En siete días vuelva a esta lección. Si lo cumplió, aumente un poco. Si no, revise el diseño. No abandone. Solo ajuste. Cuídese.", "paragraphs": ["Ha terminado el curso. Tiene la ciencia básica, los cuatro hábitos y los principios del sistema. Pero todo eso vale poco si no se traduce en una acción concreta esta semana.", "<strong>El compromiso mínimo:</strong> elija un hábito. Solo uno. El que sienta más relevante hoy. Hágalo en la versión más pequeña ejecutable, anclelo a algo que ya hace todos los días, y dele una recompensa inmediata. En siete días, vuelva a este punto: si lo cumplió, aumente un poco; si no, revise el diseño. No abandone: solo ajuste."], "items": ["Plantilla de plan personal de hábito de siete días (PDF descargable).", "Resumen visual de los cuatro principios del sistema (PDF descargable).", "Recordatorio operativo: cómo retomar el hábito cuando falla un día (PDF descargable)."], "closing": "El cambio sostenible es la suma de muchos depósitos pequeños, no el resultado de un esfuerzo épico. <strong>Empiece esta semana con uno solo.</strong> Cuídese."}]}]};

  <script>
/**
 * Aacrom Course Player
 * Curso: P-A.1 · El arte de la guerra aplicado a los negocios
 */

(function () {
  'use strict';

  let course = null;
  let allScreens = [];
  let currentIndex = 0;
  let completedScreens = new Set();
  let quizFinalized = false;
  let quizState = {};
  let scenarioState = { exploredOptions: new Set(), convergentShown: false };

  // ==========================================================
  // INIT
  // ==========================================================
  async function init() {
    try {
      course = window.COURSE_DATA;
      buildScreenList();
      buildSidebar();
      loadProgress();
      renderScreen();
      bindNav();
    } catch (e) {
      document.getElementById('screen-container').innerHTML = '<p style="padding:40px;color:#B02A2A">Error cargando el curso: ' + e.message + '</p>';
    }
  }

  function buildScreenList() {
    allScreens = [];
    course.modules.forEach((mod, mi) => {
      mod.screens.forEach((scr, si) => {
        allScreens.push({ ...scr, moduleIndex: mi, screenIndex: si });
      });
    });
    document.getElementById('course-title').textContent = course.title;
  }

  function buildSidebar() {
    const nav = document.getElementById('module-nav');
    nav.innerHTML = '';
    course.modules.forEach((mod, idx) => {
      const item = document.createElement('div');
      item.className = 'module-item';
      item.dataset.moduleIndex = idx;
      item.innerHTML = `
        <div class="icon">≡</div>
        <div class="title">${mod.title}</div>
        <div class="check"></div>
      `;
      item.addEventListener('click', () => jumpToModule(idx));
      nav.appendChild(item);
    });
  }

  function jumpToModule(moduleIndex) {
    const first = allScreens.findIndex(s => s.moduleIndex === moduleIndex);
    if (first >= 0) { currentIndex = first; renderScreen(); }
    document.getElementById('sidebar').classList.remove('open');
  }

  function loadProgress() {
    var saved = null;
    try {
      if (window.AacromSCORM && window.AacromSCORM.isInitialized && window.AacromSCORM.isInitialized()) {
        saved = window.AacromSCORM.getSuspendData();
      }
    } catch (e) {}
    if (!saved) { try { saved = JSON.parse(sessionStorage.getItem('aacrom_progress_cc4') || '{}'); } catch (e) { saved = {}; } }
    try {
      if (saved && saved.completed) completedScreens = new Set(saved.completed);
      if (saved && typeof saved.current === 'number') currentIndex = Math.min(saved.current, allScreens.length - 1);
    } catch (e) {}
  }

  function saveProgress() {
    var data = { completed: Array.from(completedScreens), current: currentIndex };
    try { sessionStorage.setItem('aacrom_progress_cc4', JSON.stringify(data)); } catch (e) {}
    try {
      if (window.AacromSCORM && window.AacromSCORM.isInitialized && window.AacromSCORM.isInitialized()) {
        window.AacromSCORM.setSuspendData(data);
        window.AacromSCORM.commit();
      }
    } catch (e) {}
  }

  // ==========================================================
  // SIDEBAR UPDATE
  // ==========================================================
  function updateSidebar() {
    const items = document.querySelectorAll('.module-item');
    const currentModule = allScreens[currentIndex].moduleIndex;

    items.forEach((item, idx) => {
      item.classList.remove('active', 'current', 'completed');
      const modScreens = allScreens.filter(s => s.moduleIndex === idx);
      const modCompleted = modScreens.every(s => completedScreens.has(s.id));

      if (idx === currentModule) item.classList.add('active', 'current');
      if (modCompleted) item.classList.add('completed');
    });

    const totalScreens = allScreens.length;
    const completed = completedScreens.size;
    const pct = Math.round((completed / totalScreens) * 100);
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-text').textContent = pct + '% COMPLETADO';
  }

  // ==========================================================
  // RENDER SCREEN
  // ==========================================================
  function renderScreen() {
    const screen = allScreens[currentIndex];
    document.getElementById('screen-counter').textContent = (currentIndex + 1) + ' de ' + allScreens.length;

    const container = document.getElementById('screen-container');
    container.scrollTop = 0;

    let html = '';
    switch (screen.type) {
      case 'course_cover':       html = renderCourseCover(screen); break;
      case 'statement_list':     html = renderStatementList(screen); break;
      case 'module_intro':       html = renderModuleIntro(screen); break;
      case 'paragraph_audio':    html = renderParagraphAudio(screen); break;
      case 'hotspots':           html = renderHotspots(screen); break;
      case 'tabs':               html = renderTabs(screen); break;
      case 'case_study':         html = renderCaseStudy(screen); break;
      case 'module_outro':       html = renderModuleOutro(screen); break;
      case 'knowledge_check':    html = renderKnowledgeCheck(screen); break;
      case 'accordion':          html = renderAccordion(screen); break;
      case 'statement_paragraph':html = renderStatementParagraph(screen); break;
      case 'sorting':            html = renderSorting(screen); break;
      case 'decision_matrix':    html = renderDecisionMatrix(screen); break;
      case 'decision_scenario':  html = renderDecisionScenario(screen); break;
      case 'quiz':               html = renderQuiz(screen); break;
      case 'module_intro_full':  html = renderModuleIntroFull(screen); break;
      case 'paragraphs':         html = renderParagraphs(screen); break;
      case 'statement_paragraphs': html = renderStatementParagraphs(screen); break;
      case 'closing_resources':  html = renderClosingResources(screen); break;
      case 'course_cover_objective': html = renderCourseCoverObjective(screen); break;
      case 'hero_image':         html = renderHeroImage(screen); break;
      default:                   html = `<div style="padding:40px;">Tipo no implementado: ${screen.type}</div>`;
    }

    container.innerHTML = html;

    if (screen.type === 'hotspots')          attachHotspotEvents(screen);
    else if (screen.type === 'tabs')          attachTabEvents(screen);
    else if (screen.type === 'accordion')     attachAccordionEvents(screen);
    else if (screen.type === 'knowledge_check')attachKCEvents(screen);
    else if (screen.type === 'sorting')       attachSortingEvents(screen);
    else if (screen.type === 'decision_matrix')attachMatrixEvents(screen);
    else if (screen.type === 'decision_scenario')attachScenarioEvents(screen);
    else if (screen.type === 'quiz')          attachQuizEvents(screen);

    if (!isInteractiveScreen(screen)) completedScreens.add(screen.id);
    updateSidebar();
    updateFooterNav();
    saveProgress();
  }

  function isInteractiveScreen(screen) {
    return ['knowledge_check', 'sorting', 'quiz', 'decision_scenario'].includes(screen.type);
  }

  // ==========================================================
  // RENDERERS
  // ==========================================================
  function audioHTML(audioFile) {
    if (!audioFile) return '';
    return `
      <div class="instructions-box">
        <div class="badge-icon"></div>
        <div class="text"><strong>Instrucciones:</strong> presione el botón "▶" y escuche atentamente el audio.</div>
      </div>
      <audio controls preload="metadata"><source src="${audioFile}" type="audio/mpeg">Su navegador no soporta audio.</audio>
    `;
  }

  function headerHTML(screen, withImage = false) {
    const imgStyle = withImage && screen.image
      ? `style="background-image: url('${screen.image}')"`
      : '';
    const moduleLabel = screen.moduleTitle || '';
    return `
      <div class="screen-header ${withImage && screen.image ? 'with-image' : ''}" ${imgStyle}>
        <h1>${screen.title}</h1>
        <div class="header-line"></div>
      </div>
    `;
  }

  function renderCourseCover(s) {
    return `
      ${headerHTML(s, true)}
      <div class="screen-body">
        <h2 class="subtitle-blue">${s.title}</h2>
        ${audioHTML(s.audio)}
        ${s.body.map(p => `<p>${p}</p>`).join('')}
      </div>

  function attachHotspotEvents(screen) {
    const btns = document.querySelectorAll('.hotspot-btn');
    const content = document.getElementById('hotspot-content');
    let viewed = new Set();
    btns.forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        btns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active', 'viewed');
        viewed.add(idx);
        content.innerHTML = `<strong style="color:var(--aacrom-primary);display:block;margin-bottom:8px">${screen.hotspots[idx].label}</strong>${screen.hotspots[idx].content}`;
        content.classList.add('show');
        if (viewed.size === screen.hotspots.length) {
          completedScreens.add(screen.id);
          updateSidebar(); saveProgress();
        }
      });
    });
  }

  function attachTabEvents(screen) {
    const btns = document.querySelectorAll('.tab-btn');
    const panels = document.querySelectorAll('.tab-panel');
    let viewed = new Set([0]);
    btns.forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        btns.forEach(b => b.classList.remove('active'));
        panels.forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        panels[idx].classList.add('active');
        viewed.add(idx);
        if (viewed.size === btns.length) {
          completedScreens.add(screen.id);
          updateSidebar(); saveProgress();
        }

    });
  }
