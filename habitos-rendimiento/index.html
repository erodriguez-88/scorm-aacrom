<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Hábitos que sostienen el rendimiento · Aacrom</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>

/* ============================================
   THEME — Aacrom Rise
   ============================================ */
:root {
  --aacrom-primary: #1F3864;
  --aacrom-primary-light: #2E5497;
  --aacrom-accent: #C9A227;
  --aacrom-accent-light: #E8C667;
  --aacrom-text: #2C2C2C;
  --aacrom-text-muted: #6B6B6B;
  --aacrom-bg: #FFFFFF;
  --aacrom-bg-soft: #F7F8FA;
  --aacrom-border: #E5E7EB;
  --aacrom-success: #1F7A42;
  --aacrom-danger: #B02A2A;
  --sidebar-width: 320px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  color: var(--aacrom-text);
  background: var(--aacrom-bg);
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

#app {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ============================================
   SIDEBAR
   ============================================ */
#sidebar {
  width: var(--sidebar-width);
  background: var(--aacrom-primary);
  color: white;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
  transition: transform 0.3s ease;
}

.sidebar-header {
  padding: 32px 28px 24px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

#course-title {
  font-size: 22px;
  font-weight: 700;
  line-height: 1.25;
  margin-bottom: 28px;
}

.progress-wrapper { margin-top: 8px; }

.progress-bar {
  width: 100%;
  height: 3px;
  background: rgba(255,255,255,0.18);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 10px;
}

#progress-fill {
  height: 100%;
  width: 0%;
  background: white;
  transition: width 0.4s ease;
}

#progress-text {
  font-size: 11px;
  letter-spacing: 1.5px;
  font-weight: 600;
  opacity: 0.85;
}

#module-nav {
  padding: 20px 0;
  flex: 1;
}

.module-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 28px;
  cursor: pointer;
  font-size: 14px;
  line-height: 1.4;
  color: rgba(255,255,255,0.9);
  border-left: 3px solid transparent;
  transition: background 0.15s, border-left-color 0.15s;
}

.module-item:hover { background: rgba(255,255,255,0.06); }

.module-item.active {
  background: rgba(255,255,255,0.12);
  border-left-color: var(--aacrom-accent);
  font-weight: 600;
}

.module-item .icon {
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  opacity: 0.8;
}

.module-item .check {
  margin-left: auto;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.45);
  flex-shrink: 0;
  transition: all 0.2s;
}

.module-item.current .check {
  border-color: var(--aacrom-accent);
  border-style: dashed;
  animation: spin 4s linear infinite;
}

.module-item.completed .check {
  background: var(--aacrom-accent);
  border-color: var(--aacrom-accent);
  position: relative;
}

.module-item.completed .check::after {
  content: '✓';
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: var(--aacrom-primary);
  font-weight: 900;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ============================================
   MAIN
   ============================================ */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--aacrom-bg);
}

#topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 48px;
  background: var(--aacrom-bg);
  border-bottom: 1px solid var(--aacrom-border);
  flex-shrink: 0;
  z-index: 2;
}

#menu-toggle {
  background: none;
  border: none;
  font-size: 22px;
  cursor: pointer;
  color: var(--aacrom-text);
  padding: 4px 8px;
  display: none;
}

#screen-counter {
  font-size: 13px;
  color: var(--aacrom-text-muted);
  font-weight: 600;
}

#screen-container {
  flex: 1;
  overflow-y: auto;
  padding: 0;
  position: relative;
}

/* ============================================
   SCREEN — Header con onda decorativa
   ============================================ */
.screen-header {
  position: relative;
  padding: 60px 64px 50px;
  background: var(--aacrom-bg-soft);
  overflow: hidden;
}

.screen-header::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  right: 0;
  height: 60px;
  background: var(--aacrom-bg);
  clip-path: polygon(0 100%, 0 40%, 50% 70%, 100% 30%, 100% 100%);
}

.screen-header h1 {
  font-size: 44px;
  font-weight: 700;
  color: var(--aacrom-text);
  line-height: 1.15;
  position: relative;
  z-index: 1;
  max-width: 80%;
}

.screen-header .header-line {
  width: 80px;
  height: 4px;
  background: var(--aacrom-text);
  margin-top: 18px;
  position: relative;
  z-index: 1;
}

.screen-header.with-image {
  background-size: cover;
  background-position: right center;
  background-blend-mode: lighten;
}

.screen-header.with-image::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, rgba(247,248,250,0.97) 0%, rgba(247,248,250,0.85) 50%, rgba(247,248,250,0.4) 100%);
}

.screen-header > * { position: relative; z-index: 1; }

/* ============================================
   SCREEN BODY
   ============================================ */
.screen-body {
  padding: 50px 64px 80px;
  max-width: 1100px;
  margin: 0 auto;
}

.subtitle-blue {
  font-size: 36px;
  font-weight: 700;
  color: var(--aacrom-primary);
  text-align: center;
  margin: 30px 0 24px;
}

/* Bloque de instrucciones dorado */
.instructions-box {
  display: flex;
  align-items: center;
  gap: 18px;
  margin: 30px auto;
  padding: 0;
  font-size: 22px;
  max-width: 900px;
}

.instructions-box .badge-icon {
  width: 56px;
  height: 56px;
  flex-shrink: 0;
  background: var(--aacrom-accent);
  border-radius: 50%;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.instructions-box .badge-icon::before {
  content: '!';
  font-size: 32px;
  font-weight: 900;
  color: white;
}

.instructions-box .badge-icon::after {
  content: '';
  position: absolute;
  inset: -4px;
  border: 2.5px dashed var(--aacrom-accent);
  border-radius: 50%;
  opacity: 0.5;
}

.instructions-box .text {
  font-size: 22px;
  line-height: 1.4;
  color: var(--aacrom-text);
}

.instructions-box .text strong {
  color: var(--aacrom-primary);
  font-weight: 700;
}

/* Reproductor de audio */
audio {
  display: block;
  width: 100%;
  max-width: 700px;
  margin: 30px auto;
  height: 44px;
}

audio::-webkit-media-controls-panel {
  background-color: #F0F2F5;
}

/* Texto cuerpo de la pantalla */
.screen-body p {
  font-size: 18px;
  line-height: 1.7;
  margin-bottom: 20px;
  text-align: center;
  max-width: 900px;
  margin-left: auto;
  margin-right: auto;
}

.screen-body p.left { text-align: left; }
.screen-body p.justify { text-align: justify; }

.screen-body p strong { color: var(--aacrom-primary); font-weight: 700; }

/* ============================================
   STATEMENT (cita destacada)
   ============================================ */
.statement {
  background: var(--aacrom-bg-soft);
  border-left: 5px solid var(--aacrom-accent);
  padding: 32px 40px;
  margin: 30px auto;
  font-size: 22px;
  font-weight: 600;
  line-height: 1.45;
  color: var(--aacrom-primary);
  max-width: 900px;
  font-style: italic;
}

.statement::before {
  content: '"';
  font-size: 60px;
  line-height: 0;
  color: var(--aacrom-accent);
  vertical-align: -20px;
  margin-right: 8px;
  font-family: Georgia, serif;
}

.statement-citation {
  display: block;
  margin-top: 14px;
  font-size: 14px;
  font-style: normal;
  color: var(--aacrom-text-muted);
  font-weight: 500;
}

/* ============================================
   LIST
   ============================================ */
.aacrom-list {
  list-style: none;
  margin: 30px auto;
  max-width: 900px;
  padding: 0;
}

.aacrom-list li {
  display: flex;
  gap: 18px;
  padding: 18px 24px;
  background: var(--aacrom-bg-soft);
  margin-bottom: 12px;
  border-radius: 8px;
  font-size: 17px;
  line-height: 1.5;
  border-left: 4px solid var(--aacrom-accent);
}

.aacrom-list li::before {
  content: '';
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--aacrom-accent);
  flex-shrink: 0;
  margin-top: 9px;
}

/* ============================================
   CASE CARD (cards con texto sobre imagen)
   ============================================ */
.case-card-wrapper {
  position: relative;
  margin: 30px auto;
  max-width: 1000px;
  min-height: 480px;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 10px 40px rgba(0,0,0,0.12);
}

.case-card-wrapper .bg-image {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
}

.case-card-wrapper .bg-image::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.5) 100%);
}

.case-card-wrapper .card-content {
  position: relative;
  z-index: 1;
  background: white;
  border-radius: 20px;
  padding: 36px 44px;
  margin: 130px auto 40px;
  max-width: 720px;
  font-size: 18px;
  line-height: 1.6;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  text-align: justify;
}

.case-card-wrapper .card-content strong {
  color: var(--aacrom-primary);
  font-weight: 700;
}

.case-card-wrapper .card-subtitle {
  text-align: center;
  font-size: 20px;
  font-weight: 600;
  color: var(--aacrom-accent);
  margin-bottom: 20px;
}

/* ============================================
   TABS
   ============================================ */
.tabs-container {
  margin: 30px auto;
  max-width: 900px;
}

.tabs-nav {
  display: flex;
  gap: 4px;
  border-bottom: 2px solid var(--aacrom-border);
  margin-bottom: 0;
}

.tab-btn {
  flex: 1;
  padding: 16px 20px;
  border: none;
  background: var(--aacrom-bg-soft);
  cursor: pointer;
  font-size: 15px;
  font-weight: 600;
  color: var(--aacrom-text-muted);
  border-radius: 8px 8px 0 0;
  transition: all 0.2s;
  font-family: inherit;
}

.tab-btn:hover { background: #EEF1F5; color: var(--aacrom-text); }

.tab-btn.active {
  background: var(--aacrom-primary);
  color: white;
}

.tab-panel {
  display: none;
  background: var(--aacrom-bg-soft);
  padding: 30px 36px;
  border-radius: 0 0 12px 12px;
  font-size: 16px;
  line-height: 1.65;
}

.tab-panel.active { display: block; animation: fadeIn 0.3s; }
.tab-panel ul { padding-left: 20px; }
.tab-panel li { margin-bottom: 10px; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ============================================
   ACCORDION
   ============================================ */
.accordion {
  margin: 30px auto;
  max-width: 900px;
}

.accordion-item {
  margin-bottom: 10px;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--aacrom-border);
}

.accordion-header {
  padding: 18px 24px;
  background: var(--aacrom-bg-soft);
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 600;
  font-size: 17px;
  color: var(--aacrom-primary);
  transition: background 0.2s;
}

.accordion-header:hover { background: #EEF1F5; }

.accordion-header .toggle {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--aacrom-primary);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 300;
  transition: transform 0.3s;
}

.accordion-item.open .toggle { transform: rotate(45deg); }

.accordion-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
  background: white;
}

.accordion-item.open .accordion-content {
  max-height: 500px;
}

.accordion-content-inner {
  padding: 20px 24px;
  font-size: 16px;
  line-height: 1.65;
}

/* ============================================
   HOTSPOTS
   ============================================ */
.hotspots-container {
  position: relative;
  margin: 30px auto;
  max-width: 900px;
}

.hotspots-image {
  width: 100%;
  border-radius: 12px;
  display: block;
}

.hotspots-list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-top: 24px;
}

.hotspot-btn {
  padding: 16px 20px;
  background: var(--aacrom-bg-soft);
  border: 2px solid var(--aacrom-border);
  border-radius: 10px;
  cursor: pointer;
  font-weight: 600;
  font-size: 15px;
  color: var(--aacrom-primary);
  transition: all 0.2s;
  font-family: inherit;
  position: relative;
}

.hotspot-btn::before {
  content: '+';
  display: block;
  font-size: 22px;
  font-weight: 300;
  color: var(--aacrom-accent);
  margin-bottom: 4px;
}

.hotspot-btn:hover {
  background: white;
  border-color: var(--aacrom-accent);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(31,56,100,0.12);
}

.hotspot-btn.viewed {
  background: var(--aacrom-primary);
  color: white;
  border-color: var(--aacrom-primary);
}

.hotspot-btn.viewed::before { color: var(--aacrom-accent-light); }

.hotspot-content {
  margin-top: 24px;
  padding: 24px 30px;
  background: var(--aacrom-bg-soft);
  border-left: 4px solid var(--aacrom-accent);
  border-radius: 8px;
  font-size: 16px;
  line-height: 1.65;
  display: none;
}

.hotspot-content.show { display: block; animation: fadeIn 0.3s; }

/* ============================================
   DECISION MATRIX (4 cuadrantes)
   ============================================ */
.matrix-container {
  position: relative;
  margin: 30px auto;
  max-width: 800px;
  padding: 40px 60px 30px;
}

.matrix-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 8px;
  aspect-ratio: 1.2;
  position: relative;
}

.matrix-quadrant {
  border-radius: 10px;
  padding: 24px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  color: white;
  font-weight: 700;
  font-size: 22px;
  letter-spacing: 0.5px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.12);
  position: relative;
  min-height: 180px;
}

.matrix-quadrant:hover { transform: scale(1.03); box-shadow: 0 8px 24px rgba(0,0,0,0.18); }

.matrix-quadrant.active { box-shadow: 0 0 0 3px var(--aacrom-accent); }

.matrix-label-x, .matrix-label-y {
  position: absolute;
  font-size: 13px;
  font-weight: 700;
  color: var(--aacrom-text-muted);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.matrix-label-x {
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
}

.matrix-label-y {
  left: -20px;
  top: 50%;
  transform: rotate(-90deg) translateX(50%);
  transform-origin: center;
}

.matrix-content {
  margin-top: 30px;
  padding: 24px 30px;
  background: var(--aacrom-bg-soft);
  border-left: 4px solid var(--aacrom-accent);
  border-radius: 8px;
  font-size: 16px;
  line-height: 1.65;
  display: none;
}

.matrix-content.show { display: block; animation: fadeIn 0.3s; }

/* ============================================
   DECISION SCENARIO
   ============================================ */
.scenario-container { margin: 20px auto; max-width: 1000px; }

.scenario-intro-card {
  background: var(--aacrom-bg-soft);
  padding: 30px 36px;
  border-radius: 12px;
  margin-bottom: 24px;
  font-size: 17px;
  line-height: 1.65;
  border-left: 4px solid var(--aacrom-primary);
}

.dialogue-container { margin: 30px 0; }

.dialogue-line {
  display: flex;
  gap: 14px;
  margin-bottom: 18px;
  align-items: flex-start;
  opacity: 0.4;
  transition: opacity 0.3s;
}

.dialogue-line.played, .dialogue-line.active { opacity: 1; }
.dialogue-line.active { background: rgba(201, 162, 39, 0.07); border-radius: 10px; padding: 10px 14px; margin: 8px -14px 8px -14px; }

.dialogue-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  color: white;
  font-size: 14px;
  flex-shrink: 0;
  background: var(--aacrom-primary);
}

.dialogue-avatar.andres { background: #4A5C77; }
.dialogue-avatar.narrator { background: var(--aacrom-text-muted); font-size: 18px; }

.dialogue-body { flex: 1; }

.dialogue-character {
  font-weight: 700;
  font-size: 13px;
  color: var(--aacrom-primary);
  margin-bottom: 4px;
  letter-spacing: 0.3px;
}

.dialogue-character .role {
  font-weight: 400;
  color: var(--aacrom-text-muted);
  font-size: 12px;
  margin-left: 8px;
}

.dialogue-text {
  font-size: 16px;
  line-height: 1.55;
  color: var(--aacrom-text);
}

.dialogue-line audio { margin: 8px 0 0; max-width: 100%; height: 36px; }

.scenario-question {
  margin-top: 30px;
  font-size: 24px;
  font-weight: 700;
  color: var(--aacrom-primary);
  text-align: center;
}

.scenario-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-top: 24px;
}

.scenario-option-btn {
  padding: 22px 24px;
  background: white;
  border: 2px solid var(--aacrom-border);
  border-radius: 12px;
  cursor: pointer;
  text-align: left;
  transition: all 0.2s;
  font-family: inherit;
}

.scenario-option-btn:hover {
  border-color: var(--aacrom-accent);
  transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(31,56,100,0.1);
}

.scenario-option-btn .option-id {
  display: inline-block;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--aacrom-primary);
  color: white;
  text-align: center;
  line-height: 28px;
  font-weight: 700;
  margin-right: 10px;
  font-size: 14px;
}

.scenario-option-btn .option-label {
  font-weight: 700;
  color: var(--aacrom-primary);
  font-size: 16px;
  margin-bottom: 6px;
  display: block;
}

.scenario-option-btn .option-sub {
  font-size: 14px;
  color: var(--aacrom-text-muted);
  line-height: 1.5;
}

.scenario-result {
  margin-top: 24px;
  padding: 30px 36px;
  border-radius: 12px;
  background: var(--aacrom-bg-soft);
  border-left: 5px solid var(--aacrom-accent);
}

.scenario-result.correct { border-left-color: var(--aacrom-success); }
.scenario-result.incorrect { border-left-color: var(--aacrom-danger); }

.scenario-result-badge {
  display: inline-block;
  padding: 5px 14px;
  border-radius: 20px;
  background: var(--aacrom-accent);
  color: white;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  margin-bottom: 14px;
}

.scenario-result.correct .scenario-result-badge { background: var(--aacrom-success); }
.scenario-result.incorrect .scenario-result-badge { background: var(--aacrom-danger); }

.scenario-result h4 {
  font-size: 22px;
  color: var(--aacrom-primary);
  margin-bottom: 12px;
}

.scenario-result p { font-size: 16px; line-height: 1.65; text-align: left; }

.scenario-actions { margin-top: 24px; display: flex; gap: 12px; justify-content: center; }

.scenario-convergent {
  margin-top: 30px;
  padding: 30px 36px;
  background: linear-gradient(135deg, var(--aacrom-primary) 0%, var(--aacrom-primary-light) 100%);
  color: white;
  border-radius: 16px;
  display: none;
}

.scenario-convergent.show { display: block; animation: fadeIn 0.4s; }
.scenario-convergent h4 {

.option-row {

.matching-grid {

.matching-row {

  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 14px;
}

.matching-cell {
  padding: 16px 20px;

  border: 2px solid var(--aacrom-border);

.matching-arrow { font-size: 24px; color: var(--aacrom-accent); }

.feedback-box {
  margin-top: 20px;

.feedback-box.incorrect { border-left-color: var(--aacrom-danger); }

  padding: 14px 38px;

.quiz-result-summary {

  border-radius: 14px;
  margin: 24px auto;

}

}

}

  font-weight: 700;
  font-size: 14px;

}

.quiz-result-summary .badge.failed { background: var(--aacrom-danger); color: white; }

.quiz-result-summary p { margin-top: 20px; font-size: 16px; line-height: 1.6; }

/* ============================================
   SORTING (drag & drop)
   ============================================ */
.sorting-container { margin: 30px auto; max-width: 1100px; }

.sorting-items-pool {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  padding: 20px;
  background: var(--aacrom-bg-soft);
  border-radius: 12px;
  min-height: 80px;
  margin-bottom: 20px;
}

.sortable-item {
  padding: 12px 18px;

  border: 2px solid var(--aacrom-border);

  font-size: 14px;
  line-height: 1.4;
  max-width: 320px;
  transition: all 0.2s;
}

.sortable-item:hover { border-color: var(--aacrom-accent); }

.sortable-item.correct-placed { border-color: var(--aacrom-success); background: #E8F5EC; }
.sortable-item.wrong-placed { border-color: var(--aacrom-danger); background: #FBEAEA; }

.sorting-categories {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
}

.sorting-category {
  background: white;
  border: 2px dashed var(--aacrom-border);
  border-radius: 12px;
  padding: 18px;
  min-height: 160px;
  display: flex;
  flex-direction: column;
}

.sorting-category.drag-over { border-color: var(--aacrom-accent); background: #FFF9E8; }

.sorting-category-title {
  font-weight: 700;
  color: var(--aacrom-primary);
  font-size: 14px;
  text-align: center;
  margin-bottom: 12px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--aacrom-border);

.sorting-drop-zone { flex: 1; display: flex; flex-direction: column; gap: 8px; }

/* ============================================
   FOOTER NAV
   ============================================ */
#footer-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 48px;
  border-top: 1px solid var(--aacrom-border);
  background: var(--aacrom-bg);
  flex-shrink: 0;
}

.nav-btn {
  padding: 12px 28px;
  font-size: 14px;
  font-weight: 600;
  background: transparent;
  color: var(--aacrom-primary);
  border: 2px solid var(--aacrom-primary);
  border-radius: 30px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}

.nav-btn:hover:not(:disabled) {
  background: var(--aacrom-primary);
  color: white;
}

.nav-btn.primary {
  background: var(--aacrom-primary);
  color: white;
}

.nav-btn.primary:hover:not(:disabled) {
  background: var(--aacrom-primary-light);
  border-color: var(--aacrom-primary-light);
}

.nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
