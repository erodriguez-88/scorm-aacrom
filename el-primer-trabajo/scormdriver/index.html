<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Curso Aacrom</title>

  <style>
    /* Loader minimal antes de cargar el contenido */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #aacrom-loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      background: #ffffff;
      color: #1F3864;
      z-index: 9999;
    }
    #aacrom-loader__spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(31, 56, 100, 0.2);
      border-top-color: #1F3864;
      border-radius: 50%;
      animation: aacrom-spin 0.8s linear infinite;
    }
    @keyframes aacrom-spin {
      to { transform: rotate(360deg); }
    }
    #aacrom-loader__text {
      font-size: 14px;
      letter-spacing: 0.5px;
    }
    #aacrom-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
    .aacrom-loader-hidden { display: none !important; }
  </style>

  <!-- API Wrapper SCORM (debe cargar antes del iframe) -->
  <script src="api-wrapper.js"></script>
  <script src="scormdriver.js"></script>
</head>
<body>

  <!-- Loader inicial -->
  <div id="aacrom-loader" role="status" aria-live="polite">
    <div id="aacrom-loader__spinner" aria-hidden="true"></div>
    <div id="aacrom-loader__text">Cargando curso…</div>
  </div>

  <!-- iframe que carga el contenido del curso -->
  <iframe id="aacrom-frame"
          src="../content/index.html"
          title="Contenido del curso"
          allow="autoplay; fullscreen"
          onload="AacromDriver.handleContentLoaded()"></iframe>

  <script>
    // Inicializar SCORM al cargar la página
    document.addEventListener('DOMContentLoaded', function () {
      AacromDriver.start();
    });
  </script>

</body>
</html>
