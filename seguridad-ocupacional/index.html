    window.COURSE_DATA = {"code": "C-CE.1", "title": "Seguridad y salud ocupacional básica", "subtitle": "Prevención de accidentes, ergonomía, riesgos psicosociales y emergencias", "duration": "30 minutos", "author": "Aacrom", "passingScore": 80, "theme": {"primary": "#1F3864", "accent": "#C9A227", "sublineAccent": "#8B2635", "title": "#1F3864", "text": "#2C2C2C", "background": "#FBF9F4", "fontFamily": "Open Sans", "fontTitle": "Fraunces"}, "modules": [{"id": "m0", "title": "Apertura", "screens": [{"id": "p_cover", "type": "course_cover_objective", "moduleTitle": "Apertura", "title": "Seguridad y salud ocupacional básica", "subtitle": "Prevención de accidentes, ergonomía, riesgos psicosociales y emergencias", "image": "assets/images/cce1_img_p_cover.jpg", "objective": "Identificar los principales riesgos del puesto de trabajo, aplicar prácticas básicas de prevención de accidentes y ergonomía, reconocer riesgos psicosociales y ejecutar protocolos de emergencia ante sismo, incendio y evacuación.", "ficha": [{"label": "Duración", "value": "30 min"}, {"label": "Línea", "value": "C — Corporativa"}, {"label": "Sub-línea", "value": "CE — Cumplimiento y ética"}, {"label": "Aprobación", "value": "80%"}]}, {"id": "p_slider", "type": "hero_image", "moduleTitle": "Apertura", "title": "La salud ocupacional no es un trámite", "image": "assets/images/cce1_img_p_slider.jpg", "statement": "Es la base sobre la que descansan todas las demás decisiones de la empresa. Trabajadores seguros, productividad sostenible.", "footer": "PREVENIR · CUIDAR · RESPONDER"}, {"id": "p3", "type": "course_cover", "moduleTitle": "Apertura", "title": "Bienvenida", "subtitle": "Por qué este curso existe", "image": "assets/images/cce1_img_p3.jpg", "audio": "assets/audio/cce1_audio_p3.mp3", "audio_script": "Le damos la bienvenida a este curso. La seguridad y salud ocupacional... no es un manual aburrido que hay que firmar y guardar. Es lo que decide... si usted llega bien a la casa al final del día. Si su compañero llega bien. Y si la empresa puede seguir operando mañana. Treinta minutos. Tres módulos. Prevenir accidentes... ajustar el puesto a la persona... y saber qué hacer cuando algo se pone difícil. Vamos a hablar sin tecnicismos. Lo que necesita saber... para no ser parte de las estadísticas.", "body": ["Este es un curso de cumplimiento, pero no le pedimos solo cumplir: le pedimos entender. Cuando una persona entiende por qué se hace algo, lo hace mejor. Cuando solo cumple, lo hace una vez y se olvida.", "La <strong>seguridad y salud ocupacional</strong> (SSO) es el conjunto de prácticas que protegen la integridad física y mental de quienes trabajan. No es responsabilidad solo del comité de salud ocupacional ni del jefe: empieza con cada persona haciendo bien lo suyo, y multiplica su efecto cuando todos en el equipo lo hacen.", "En este curso vamos a ver las bases, sin tecnicismos: cómo identificar riesgos antes de que se conviertan en accidentes, cómo ajustar el puesto para no enfermar a largo plazo, y qué hacer cuando algo grave ya está pasando. Es contenido adaptable a oficina, industria o servicios: cambia el ejemplo, pero los principios son los mismos."]}]}, {"id": "m1", "title": "Módulo 1: Prevención de accidentes", "screens": [{"id": "p4", "type": "module_intro_full", "moduleTitle": "Módulo 1: Prevención de accidentes", "moduleLabel": "MÓDULO 1", "title": "Lo que no se ve es lo que más accidenta", "image": "assets/images/cce1_img_p4.jpg", "audio": "assets/audio/cce1_audio_p4.mp3", "audio_script": "Le damos la bienvenida al primer módulo. Hay una verdad incómoda sobre los accidentes laborales. La gran mayoría... no son mala suerte. Son la consecuencia visible... de una cadena de pequeñas omisiones invisibles. Un cable suelto que nadie reportó. Una señal borrada que se asumió como conocida. Un equipo de protección que se dejó en el casillero... porque era incómodo. Este módulo es sobre eso. Sobre aprender a ver lo que está antes del accidente. Sin dramatismo. Con criterio. Para que cuando llegue ese día en que algo pudo salir mal... haya salido bien... porque alguien lo vio venir.", "statement": "El accidente no es el origen del problema: es el final de una cadena de riesgos que alguien ya había visto, pero no había nombrado.", "citation": "Principio operativo del módulo", "paragraphs": ["La mayoría de los accidentes laborales son evitables. Las estadísticas internacionales y locales lo confirman: entre el 70% y el 90% de los accidentes registrados se hubieran podido prevenir actuando antes sobre condiciones o conductas conocidas. Esto cambia la pregunta de fondo: no es '¿cómo respondemos al accidente?', es '¿cómo lo vemos antes de que ocurra?'", "Identificar riesgos no es una habilidad técnica: es un hábito. Es lo que distingue a alguien que ve el pasillo bloqueado y lo libera, de alguien que pasa por encima y sigue. Este módulo trabaja ese hábito: cómo ver, cómo nombrar y cómo reportar lo que vemos."], "nextSteps": "Lo que va a encontrar en este módulo", "learnItems": ["Lo que dicen los datos sobre accidentalidad laboral.", "La cadena del accidente: cómo se construye un evento prevenible.", "Mapa de riesgos del puesto: identificación práctica.", "Caso real de un accidente evitable.", "Cómo reportar lo que se ve."]}, {"id": "p5", "type": "stat_callout", "moduleTitle": "Módulo 1: Prevención de accidentes", "title": "Lo que dicen los datos sobre accidentalidad laboral", "image": null, "intro": "Estas cifras vienen de organismos de salud ocupacional internacionales y dan dimensión al problema.", "stats": [{"number": "~80%", "unit": "de accidentes", "label": "Eran evitables", "context": "Cerca de 8 de cada 10 accidentes laborales registrados se hubieran evitado actuando sobre condiciones o conductas inseguras conocidas antes del evento."}, {"number": "~30%", "unit": "de incidentes", "label": "Nunca se reportan", "context": "Las cuasi-accidentes (situaciones que pudieron causar daño pero no lo hicieron) son advertencias gratuitas que la mayoría de organizaciones desperdicia: no se reportan ni se aprende de ellas."}, {"number": "1:300", "unit": "proporción", "label": "Pirámide de Bird", "context": "Por cada accidente grave registrado, ocurren aproximadamente 300 incidentes menores y miles de actos o condiciones inseguras. Atender la base de la pirámide es lo que reduce los accidentes graves."}], "closing": "<strong>La conclusión:</strong> los accidentes graves no aparecen de la nada. Son la punta visible de una pirámide de cosas pequeñas que ya estaban pasando. Reducirlos empieza por mirar la base, no la punta."}, {"id": "p6", "type": "funnel_diagram", "moduleTitle": "Módulo 1: Prevención de accidentes", "title": "La cadena del accidente: del riesgo no identificado al daño", "image": null, "intro": "Los accidentes no son eventos aislados. Son el resultado de una cadena de cinco etapas. Romper la cadena en cualquier punto evita el desenlace. Cuanto más arriba se rompa, menos costoso.", "stages": [{"name": "RIESGO LATENTE", "value": "Existe", "detail": "Algo en el entorno o proceso puede causar daño (cable suelto, falta de señalización, herramienta gastada).", "color": "#2A4A82"}, {"name": "NO IDENTIFICADO", "value": "Nadie lo nombra", "detail": "El riesgo está presente pero no se ha visto, reportado o documentado.", "color": "#1F3864"}, {"name": "CONDICIÓN INSEGURA", "value": "Pasa el tiempo", "detail": "El riesgo se mantiene en el ambiente. Cualquiera puede exponerse en cualquier momento.", "color": "#C9A227"}, {"name": "ACTO INSEGURO", "value": "Alguien actúa", "detail": "Una persona, sin saber del riesgo o por descuido, ejecuta una acción que la pone en contacto con él.", "color": "#E07A1F"}, {"name": "ACCIDENTE", "value": "Daño", "detail": "Lesión a la persona, pérdida material o detención de la operación. Lo que aparece en las estadísticas.", "color": "#8B2635"}], "explanations": [{"title": "Dónde se rompe la cadena", "text": "Cada etapa se puede interrumpir. La más barata: en la primera. Ver el riesgo y reportarlo es la intervención de mayor retorno en salud ocupacional."}, {"title": "Por qué se rompe casi siempre tarde", "text": "Muchas organizaciones actúan sólo en la etapa de 'accidente'. Investigan después. Cuando se trabaja preventivamente, se actúa en las etapas 2 y 3."}, {"title": "Lo que cada persona puede hacer", "text": "No hace falta ser parte del comité de salud ocupacional para romper la cadena. Basta con observar, nombrar el riesgo y reportarlo por el canal que la empresa defina."}, {"title": "El costo de no actuar temprano", "text": "Un riesgo identificado y resuelto cuesta entre $1 y $10 según el caso. El mismo riesgo convertido en accidente cuesta entre $1.000 y $100.000 (atención, indemnización, paro de operación, investigación)."}]}, {"id": "p7", "type": "safety_signs_grid", "moduleTitle": "Módulo 1: Prevención de accidentes", "title": "Las señales que su lugar de trabajo le habla en silencio", "image": null, "intro": "Cada señal de seguridad ocupacional tiene un código universal de forma y color. Conocerlas no es opcional: es el lenguaje básico de la SSO. Toque cada señal para ver su significado y la acción esperada.", "signs": [{"icon": "⛔", "tone": "danger", "category": "Prohibición", "label": "Prohibido", "meaning": "Círculo rojo con línea diagonal. Indica un comportamiento expresamente prohibido por riesgo grave.", "action": "DETÉNGASE. NO ACTÚE."}, {"icon": "!", "tone": "warn", "category": "Advertencia", "label": "Riesgo presente", "meaning": "Triángulo amarillo con símbolo negro. Advierte de un peligro existente que requiere precaución (eléctrico, químico, caídas, alta temperatura).", "action": "EVALÚE. PROCEDA CON CUIDADO."}, {"icon": "EPP", "tone": "mandatory", "category": "Obligación", "label": "EPP obligatorio", "meaning": "Círculo azul con símbolo blanco. Indica el uso obligatorio de equipo de protección personal (casco, lentes, guantes, calzado, protectores auditivos).", "action": "USE EL EPP INDICADO."}, {"icon": "→", "tone": "safe", "category": "Evacuación", "label": "Salida de emergencia", "meaning": "Cuadrado verde con flecha y/o silueta corriendo. Indica la ruta de evacuación y la salida más próxima.", "action": "MEMORICE LA RUTA DESDE SU PUESTO."}, {"icon": "+", "tone": "safe", "category": "Auxilio", "label": "Primeros auxilios", "meaning": "Cuadrado verde con cruz blanca. Indica la ubicación de botiquines, salas de auxilio o desfibriladores.", "action": "IDENTIFIQUE EL MÁS CERCANO."}, {"icon": "🔥", "tone": "fire", "category": "Combate incendios", "label": "Equipo contra incendios", "meaning": "Cuadrado rojo con símbolo de extintor, manguera o alarma. Indica equipos de combate de incendios disponibles.", "action": "CONOZCA EL EXTINTOR MÁS CERCANO."}, {"icon": "⚡", "tone": "warn", "category": "Advertencia", "label": "Riesgo eléctrico", "meaning": "Triángulo amarillo con rayo. Advierte de elementos energizados con riesgo de electrocución. Áreas restringidas para personal autorizado.", "action": "NO MANIPULE. REPORTE FALLAS."}, {"icon": "★", "tone": "info", "category": "Información", "label": "Punto de encuentro", "meaning": "Cuadrado verde con cuatro flechas convergentes. Lugar designado para concentrarse después de una evacuación.", "action": "VAYA AHÍ DESPUÉS DE EVACUAR."}], "footer": "<strong>La regla práctica:</strong> en su primer día en un lugar de trabajo nuevo, dedique cinco minutos a identificar las salidas de emergencia, el extintor más cercano, el botiquín y el punto de encuentro de su área. Cinco minutos de inversión que pueden ser críticos un día cualquiera."}, {"id": "p8", "type": "case_study", "moduleTitle": "Módulo 1: Prevención de accidentes", "title": "Caso: el accidente evitable de Esteban", "image": "assets/images/cce1_img_p8.jpg", "subtitle": "Un cable de extensión, una decisión, una fractura", "body": "Esteban es técnico de mantenimiento en una planta industrial. 42 años, 15 de experiencia. Una mañana entró al área de empaque a revisar un equipo. Había un cable de extensión cruzando el pasillo, sin protector ni señalización. Lo había visto la semana anterior y había pensado 'le digo al jefe de turno'. Esa semana fue intensa y se le olvidó.<br><br>El día del accidente entró rápido porque había una alarma menor en otro punto. Tropezó con el cable. Cayó. Se fracturó la muñeca derecha. Estuvo cuatro semanas con incapacidad. Tres meses de fisioterapia.<br><br><strong>Lo que mostró la investigación posterior:</strong><br>1. El cable estaba ahí desde hacía 11 días.<br>2. Al menos cuatro personas lo habían visto.<br>3. Nadie lo había reportado formalmente.<br>4. Existía un canal de reporte (formulario en línea de la empresa), pero la mayoría no lo usaba 'porque era engorroso'.<br><br><strong>El costo del accidente:</strong><br>· Atención médica y rehabilitación: aproximadamente 4.500 dólares cubiertos por seguro de riesgos del trabajo.<br>· Días de incapacidad: 28 días laborales perdidos.<br>· Paro de operación parcial: la primera mañana, 3 horas.<br>· Investigación y reporte: 14 horas-persona del equipo de salud ocupacional.<br>· Costo total estimado: <strong>entre 9.000 y 12.000 dólares</strong>.<br><br><strong>Lo que habría costado prevenirlo:</strong> 2 minutos de Esteban llenando el reporte hace 11 días. Cero dólares.<br><br><strong>La lección:</strong> el reporte de riesgos no es burocracia. Es la herramienta más barata y efectiva de la salud ocupacional. La organización mejoró el proceso de reporte: lo digitalizó por WhatsApp para que tomara menos de un minuto. En los seis meses siguientes los reportes aumentaron en 400% y los accidentes registrados bajaron 35%."}, {"id": "p9", "type": "knowledge_check", "moduleTitle": "Módulo 1: Prevención de accidentes", "title": "Verifique lo aprendido", "image": null, "questions": [{"type": "single", "stem": "Según los datos del módulo, ¿qué porcentaje aproximado de accidentes laborales se hubiera podido prevenir?", "options": ["Alrededor del 20%.", "Alrededor del 50%.", "Cerca del 80% (la gran mayoría era evitable).", "Casi ninguno (los accidentes son básicamente mala suerte)."], "correctAnswer": 2, "correct": 2, "feedback": {"correct": "Correcto. Cerca de 8 de cada 10 accidentes registrados se hubieran podido evitar actuando sobre condiciones o conductas inseguras conocidas antes del evento. La prevención no es opcional: es donde está el retorno.", "incorrect": "Revise: las estadísticas internacionales sitúan la prevenibilidad entre el 70% y el 90% de los accidentes registrados. Los accidentes no son mayoritariamente mala suerte: son cadenas de omisiones."}}, {"type": "single", "stem": "Marta ve un extintor con la presión baja en el pasillo. Hace dos semanas que lo notó. ¿Cuál es la respuesta más alineada con lo visto en el módulo?", "options": ["Asumir que ya alguien lo habrá reportado.", "Reportarlo formalmente por el canal establecido, aunque parezca un detalle menor.", "Cambiar el extintor por su cuenta para no molestar a nadie.", "Esperar a la próxima inspección del comité de salud ocupacional."], "correctAnswer": 1, "correct": 1, "feedback": {"correct": "Correcto. Reportar es la intervención de mayor retorno. La organización solo puede actuar sobre lo que conoce. 'Alguien más lo reportará' es exactamente lo que pasó en el caso de Esteban: nadie lo reportó.", "incorrect": "Recuerde: el reporte es el eslabón que rompe la cadena del accidente más temprano. Asumir que alguien más reportará es lo que perpetúa los riesgos."}}]}, {"id": "p10", "type": "module_outro", "moduleTitle": "Módulo 1: Prevención de accidentes", "title": "Lo que cierra este módulo", "image": null, "items": ["<strong>La mayoría de accidentes son evitables.</strong> No mala suerte: cadenas de omisiones. La estadística está cerca del 80%.", "<strong>La cadena del accidente tiene cinco etapas:</strong> riesgo latente → no identificado → condición insegura → acto inseguro → accidente. Romperla en cualquier punto evita el desenlace; cuanto más temprano, menos costoso.", "<strong>Reportar es la herramienta más barata y efectiva.</strong> Dos minutos de reporte previenen costos de miles de dólares. No es burocracia: es prevención."]}]}, {"id": "m2", "title": "Módulo 2: Ergonomía y riesgos psicosociales", "screens": [{"id": "p11", "type": "module_intro_full", "moduleTitle": "Módulo 2: Ergonomía y riesgos psicosociales", "moduleLabel": "MÓDULO 2", "title": "Lo que daña sin que duela hoy", "image": "assets/images/cce1_img_p11.jpg", "audio": "assets/audio/cce1_audio_p11.mp3", "audio_script": "Le damos la bienvenida al segundo módulo. Los accidentes son visibles. Pasan en un momento... y dejan marca. Pero hay otra forma de daño laboral... que no se ve en el momento. Se acumula. Por semanas. Por meses. Por años. Es el desgaste ergonómico. Y el desgaste psicosocial. Una silla mal ajustada... no le rompe la espalda hoy. Pero a los cinco años... le rompe la columna lumbar. Un ambiente de presión sostenida... no le da un infarto el lunes. Pero a los dos años... le da insomnio crónico... ansiedad... agotamiento. Este módulo es sobre eso. Sobre los riesgos lentos. Los que no se ven hoy... pero se cobran después.", "statement": "Los riesgos lentos no producen dramas inmediatos. Producen enfermedades crónicas, agotamiento y abandono. Por eso son los menos atendidos.", "citation": "Principio operativo del módulo", "paragraphs": ["La salud ocupacional clásica se enfocó en los accidentes: lo visible, lo medible, lo inmediato. Pero las últimas dos décadas han mostrado que los daños lentos —ergonómicos y psicosociales— terminan siendo los más caros para el trabajador y para la organización.", "Una persona con dolor crónico de espalda por silla mal ajustada tiene la misma productividad reducida que alguien con incapacidad recurrente. Una persona con agotamiento psicosocial sostenido tiene tres veces más probabilidad de cambiar de empleo. Ninguno de los dos casos aparece en la estadística de 'accidentes', pero ambos son daño ocupacional real."], "nextSteps": "Lo que va a encontrar en este módulo", "learnItems": ["Tres tipos de riesgo: físico, ergonómico, psicosocial.", "Mitos comunes sobre los riesgos psicosociales.", "Cinco ajustes ergonómicos básicos para cualquier puesto.", "Caso real de agotamiento silencioso."]}, {"id": "p12", "type": "tabs", "moduleTitle": "Módulo 2: Ergonomía y riesgos psicosociales", "title": "Tres tipos de riesgo del puesto", "image": null, "intro": "No todo riesgo laboral funciona igual. Comprender los tres tipos básicos ayuda a aplicar la respuesta correcta a cada uno. Explore las tres pestañas.", "tabs": [{"title": "1. Físico (mecánico)", "content": "<strong>Qué es:</strong> riesgos por contacto con elementos físicos, energías o agentes ambientales que pueden causar daño inmediato o a corto plazo.<br><br><strong>Ejemplos:</strong> golpes con maquinaria, electrocución, quemaduras, ruido intenso, vibración, temperaturas extremas, radiación, sustancias químicas o biológicas.<br><br><strong>Cómo se atiende:</strong> equipos de protección, guardas, señalización, procedimientos seguros, controles ambientales. Estos son los riesgos clásicos donde más se ha desarrollado la disciplina."}, {"title": "2. Ergonómico (postural)", "content": "<strong>Qué es:</strong> riesgos derivados del diseño del puesto, la postura, los movimientos repetitivos y el esfuerzo físico inadecuado. Producen daño acumulativo.<br><br><strong>Ejemplos:</strong> postura inadecuada frente a computador, movimientos repetitivos en línea de producción, levantamiento de cargas sin técnica, sillas mal ajustadas, monitores a altura incorrecta.<br><br><strong>Cómo se atiende:</strong> ajustes del mobiliario y herramientas a la persona (no al revés), pausas activas, rotación de tareas, capacitación en técnica. Subestimado porque el daño aparece años después."}, {"title": "3. Psicosocial", "content": "<strong>Qué es:</strong> riesgos derivados de la organización del trabajo y las relaciones laborales. Afectan salud mental, sueño, ánimo, vida personal.<br><br><strong>Ejemplos:</strong> sobrecarga de trabajo sostenida, falta de autonomía, conflicto interpersonal no gestionado, liderazgo abusivo, jornadas excesivas, ambigüedad de rol, acoso laboral.<br><br><strong>Cómo se atiende:</strong> diagnóstico del clima laboral, ajustes en carga y procesos, formación de liderazgo, canales de denuncia, programas de bienestar. El más reciente en regulación pero el de mayor impacto en rotación y ausentismo."}]}, {"id": "p13", "type": "myth_buster", "moduleTitle": "Módulo 2: Ergonomía y riesgos psicosociales", "title": "Cuatro mitos sobre los riesgos psicosociales", "image": null, "intro": "Los riesgos psicosociales son los más nuevos en la regulación y los menos comprendidos. Estas creencias comunes los minimizan o normalizan. Toque cada tarjeta para ver la realidad.", "cards": [{"myth": "El estrés laboral es parte del trabajo. Si uno aguanta, se acostumbra.", "reality": "El estrés puntual es normal y manejable. El estrés sostenido NO. La exposición prolongada produce daño biológico real: alteraciones del sueño, ansiedad, depresión, problemas cardiovasculares. La normativa internacional ya lo reconoce como riesgo ocupacional. 'Aguantar' no es resiliencia, es daño acumulado."}, {"myth": "Si la persona se siente sobrecargada, es porque no sabe gestionar su tiempo.", "reality": "En la mayoría de los casos no es problema individual: es problema de diseño del trabajo. Cargas mal distribuidas, plazos imposibles, recursos insuficientes. Echar la responsabilidad al individuo cuando el problema es estructural empeora todo: el trabajador se siente culpable, la organización no corrige nada."}, {"myth": "Los riesgos psicosociales solo afectan a personas débiles o sensibles.", "reality": "Las personas tienen distintos niveles de tolerancia, pero ningún nivel resiste exposición indefinida a factores extremos. Equipos completos pueden colapsar bajo presión sostenida. La evidencia es clara: el agotamiento ocupacional no es debilidad individual, es respuesta humana normal a condiciones extraordinarias."}, {"myth": "Reportar riesgos psicosociales es quejarse y perjudica la carrera.", "reality": "En organizaciones maduras el reporte es bienvenido porque permite ajustar antes del daño. La normativa actual protege explícitamente al que reporta de represalias. Si en una organización reportar perjudica al que reporta, ya hay un problema de cultura organizacional que también es riesgo psicosocial."}]}, {"id": "p14", "type": "side_by_side_comparison", "moduleTitle": "Módulo 2: Ergonomía y riesgos psicosociales", "title": "Cinco ajustes ergonómicos del puesto: incorrecto vs correcto", "image": null, "intro": "La diferencia entre una postura que enferma y una que protege suele ser cuestión de milímetros y minutos. Compare la columna izquierda (lo que muchos hacen) con la derecha (lo recomendado por ergonomía ocupacional).", "rows": [{"number": "1", "title": "Altura de la silla", "bad": "<strong>Pies colgando o muslos inclinados hacia abajo.</strong> Pies sin apoyo causan mala circulación, muslos hacia abajo aumentan presión lumbar. Es lo que pasa cuando la silla quedó configurada para alguien más alto y nadie la reajustó.", "good": "<strong>Pies planos en el piso, muslos paralelos al suelo, rodilla en 90-110°.</strong> Si los pies no llegan, use un reposapiés. Si los muslos se inclinan, baje la silla. Cinco segundos de ajuste con la palanca."}, {"number": "2", "title": "Altura del monitor", "bad": "<strong>Monitor demasiado bajo, cabeza inclinada hacia abajo.</strong> Es lo que pasa cuando usted usa laptop sin base. La cervical inclinada 8 horas al día por años produce daño crónico de columna cervical.", "good": "<strong>Parte superior del monitor a la altura de los ojos.</strong> Distancia de un brazo extendido (60-75 cm). Con laptop, use base o libros gruesos y teclado/mouse externos. Una vez configurado, no hay que volver a pensarlo."}, {"number": "3", "title": "Posición de brazos y muñecas", "bad": "<strong>Brazos suspendidos, muñecas quebradas hacia arriba o hacia abajo.</strong> Es lo que pasa cuando el teclado está sobre escritorio alto. Resultado a largo plazo: síndrome del túnel carpiano, daño nervioso permanente.", "good": "<strong>Codos a 90°, antebrazos paralelos al piso, muñecas neutras.</strong> Si el teclado está alto, baje la silla o use bandeja deslizable. Mantenga las muñecas rectas al teclear, no quebradas."}, {"number": "4", "title": "Postura de la espalda", "bad": "<strong>Encorvado hacia el monitor, espalda sin apoyo.</strong> Es lo que pasa cuando el monitor está lejos o pequeño y usted compensa inclinándose. Hernias discales y dolor lumbar crónico son la consecuencia a 5-10 años.", "good": "<strong>Espalda recta apoyada en el respaldo, curva lumbar respetada.</strong> Si el respaldo tiene soporte lumbar, ajústelo. En lugar de inclinarse hacia el monitor, acerque el monitor a usted."}, {"number": "5", "title": "Movimiento durante la jornada", "bad": "<strong>Postura estática durante horas, sin pausas, sin caminar.</strong> Lo que cree que es concentración es en realidad daño acumulado. El cuerpo no está diseñado para estar quieto durante horas.", "good": "<strong>Pausa activa cada 50 minutos: 5 minutos de movimiento.</strong> Levantarse, caminar, estirar cuello/hombros/lumbar, mirar a 6+ metros para descansar la vista (regla 20-20-20). Tomar agua. La productividad sube, no baja."}], "closing": "<strong>La inversión total:</strong> diez minutos de configuración una vez. <strong>El retorno:</strong> evitar 5-10 años de dolor crónico y eventuales incapacidades. La ergonomía es la prevención más barata de la salud ocupacional moderna."}, {"id": "p15", "type": "case_study", "moduleTitle": "Módulo 2: Ergonomía y riesgos psicosociales", "title": "Caso: Carolina y el agotamiento silencioso", "image": "assets/images/cce1_img_p15.jpg", "audio": "assets/audio/cce1_audio_p15.mp3", "audio_script": "Carolina es coordinadora de atención al cliente. Treinta y cuatro años. Lleva cinco años en la misma empresa. Buena evaluadora. Buena resolutora de problemas. La empresa creció rápido. Y la carga de Carolina creció con ella. Hace ocho meses... lo que era una jornada normal de ocho horas... se convirtió en jornadas de diez. Sin que nadie lo pidiera explícitamente. Sólo porque... el trabajo no salía si no se quedaba. Carolina empezó a dormir mal. A levantarse cansada. A irritarse por cosas pequeñas en la casa. Pensó... 'es una etapa, va a pasar'. Cuatro meses después... estaba en consulta médica... con diagnóstico de agotamiento ocupacional severo. Tres semanas de incapacidad. Y la conversación más difícil con su jefatura.", "subtitle": "Lo que se ve después, ya estaba pasando antes", "body": "Carolina nunca pensó que sería 'el caso de psicosocial'. Tenía buena salud, buena familia, buena actitud. Y aun así, cayó en agotamiento ocupacional. Lo que mostraba el diagnóstico médico era simple: <strong>su carga de trabajo no era sostenible para un humano normal, y la organización no había ajustado a tiempo</strong>.<br><br>Las señales habían estado ahí durante meses: dormía mal, irritabilidad, postergaba tareas que antes resolvía rápido, evitaba reuniones donde se asignaba más trabajo. Su jefa lo había notado pero asumió que 'era una etapa'. Sus compañeros lo habían notado pero pensaron 'es ella, no nosotros'. Carolina misma lo había notado pero pensó 'todos tenemos picos de estrés, esto va a pasar'.<br><br><strong>Lo que cambió después del caso:</strong><br>1. La empresa revisó las cargas del área y redistribuyó tareas con dos contrataciones nuevas.<br>2. Se implementó una conversación de 1:1 trimestral obligatoria con preguntas explícitas sobre carga y bienestar.<br>3. Se capacitó a las jefaturas para detectar señales tempranas de agotamiento.<br>4. Se estableció un canal confidencial para reportar señales de riesgo psicosocial (propio o de compañeros).<br><br><strong>El costo del caso:</strong> tres semanas de incapacidad de una persona clave, baja moral en el equipo, riesgo de rotación, conversaciones difíciles. <strong>El costo de prevenirlo:</strong> la 1:1 trimestral, que toma 30 minutos cada tres meses por persona.<br><br><strong>La lección:</strong> los riesgos psicosociales tienen señales tempranas. Aprender a verlas —en uno mismo y en los compañeros— es parte de la salud ocupacional moderna. Y reportarlas es parte del cuidado mutuo, no de la queja."}, {"id": "p16", "type": "knowledge_check", "moduleTitle": "Módulo 2: Ergonomía y riesgos psicosociales", "title": "Verifique lo aprendido", "image": null, "questions": [{"type": "single", "stem": "Andrés trabaja 8 horas al día frente al computador. Tiene la espalda apoyada en la silla pero el monitor está mucho más bajo que sus ojos, lo que lo obliga a inclinar la cabeza hacia abajo todo el día. ¿Cuál es el ajuste prioritario?", "options": ["Cambiar de silla, la espalda es lo más importante.", "Comprar lentes especiales para descansar la vista.", "Elevar el monitor (con base, libros, soporte) hasta que la parte superior quede a la altura de sus ojos.", "Esperar a que aparezca el dolor para actuar."], "correctAnswer": 2, "correct": 2, "feedback": {"correct": "Correcto. El monitor a baja altura es de los factores ergonómicos que más daño acumulado producen al cuello. La solución suele ser barata (base, soporte, hasta libros gruesos) y previene problemas crónicos a los 2-5 años.", "incorrect": "Revise: la postura cervical mantenida por horas todos los días genera daño acumulado. Elevar el monitor a la altura de los ojos es uno de los cinco ajustes básicos del módulo."}}, {"type": "single", "stem": "Su compañera Lucía lleva dos meses muy irritable, comete errores en cosas que antes resolvía bien, se queda hasta tarde, evita reuniones. ¿Cuál es la respuesta más alineada con lo visto en el módulo?", "options": ["No es asunto suyo, cada uno gestiona su trabajo.", "Hablar con ella con genuino interés y, si confirma sobrecarga, sugerir reportar al canal de salud ocupacional.", "Reportarla a la jefatura por bajo rendimiento.", "Esperar a que pida ayuda explícitamente."], "correctAnswer": 1, "correct": 1, "feedback": {"correct": "Correcto. Las señales tempranas existen para verse. Acercarse con cuidado, no con juicio, y abrir la puerta a usar canales formales es parte del cuidado mutuo en SST. No es invadir: es trabajo en equipo en su forma más concreta.", "incorrect": "Recuerde: el caso de Carolina muestra que las señales estaban antes y nadie actuó. 'Cada uno gestiona lo suyo' es la cultura que permite que los riesgos psicosociales se conviertan en daño."}}]}, {"id": "p17", "type": "module_outro", "moduleTitle": "Módulo 2: Ergonomía y riesgos psicosociales", "title": "Lo que cierra este módulo", "image": null, "items": ["<strong>Tres tipos de riesgo del puesto:</strong> físico (daño inmediato), ergonómico (daño acumulado), psicosocial (daño relacional y mental). Los lentos son los más subestimados.", "<strong>Cinco ajustes ergonómicos básicos:</strong> silla, monitor, brazos, respaldo, pausas activas. Diez minutos de configuración previenen años de daño.", "<strong>Los riesgos psicosociales tienen señales tempranas.</strong> Aprenderlas y reportarlas —en uno mismo y en compañeros— es parte del trabajo en equipo, no de la queja."]}]}, {"id": "m3", "title": "Módulo 3: Emergencias y evacuación", "screens": [{"id": "p18", "type": "module_intro_full", "moduleTitle": "Módulo 3: Emergencias y evacuación", "moduleLabel": "MÓDULO 3", "title": "Cuando lo previsto no alcanza", "image": "assets/images/cce1_img_p18.jpg", "audio": "assets/audio/cce1_audio_p18.mp3", "audio_script": "Le damos la bienvenida al tercer módulo. Los dos módulos anteriores son sobre prevención. Sobre lo que se hace antes... para que el evento grave no ocurra. Este módulo es sobre lo otro. Sobre qué hacer... cuando ya está ocurriendo. Un sismo. Un incendio. Una emergencia médica. La diferencia entre que termine bien o termine mal... depende de los primeros segundos. Y los primeros segundos dependen... de algo que se entrenó antes. Este módulo no es para memorizar. Es para que cuando llegue el momento... el cuerpo sepa qué hacer... porque ya lo pensó antes. Cinco minutos de hoy... para los treinta segundos que pueden valer una vida.", "statement": "En las emergencias, lo que decide el resultado no es lo que sabe el comité. Es lo que sabe cada persona del equipo.", "citation": "Principio operativo del módulo", "paragraphs": ["La salud ocupacional preventiva minimiza la probabilidad de emergencia, pero no la elimina. Sismos, incendios, fallas técnicas y eventos médicos pueden ocurrir aunque todas las prevenciones estén en su lugar. La pregunta no es si pasará una emergencia: es cuándo, y si vamos a estar preparados.", "La preparación para emergencia tiene una característica especial: <strong>no se improvisa</strong>. En el momento del evento, el cerebro tiene pocos segundos para decidir y suele entrar en bloqueo. Por eso la única forma de actuar bien es que los pasos ya estén pensados de antemano. Este módulo trabaja los tres más comunes: sismo, incendio y evacuación."], "nextSteps": "Lo que va a encontrar en este módulo", "learnItems": ["Protocolo en caso de sismo (antes, durante, después).", "Protocolo en caso de incendio (detección, alerta, evacuación).", "Las brigadas de emergencia: quiénes son y qué hacen.", "Cronología típica de una evacuación.", "Decisión simulada: qué hacer en una emergencia real."]}, {"id": "p19", "type": "emergency_protocol_card", "moduleTitle": "Módulo 3: Emergencias y evacuación", "title": "Protocolo en caso de sismo", "image": null, "intro": "Un sismo intenso dura entre 30 segundos y 2 minutos. El protocolo está organizado en tres fases con código semáforo: verde (preparación previa), amarillo (durante el evento) y rojo (después).", "bannerIcon": "⚠", "bannerTitle": "PROTOCOLO · SISMO", "bannerMeta": "DURACIÓN TÍPICA: 30 SEGUNDOS A 2 MINUTOS", "phases": [{"tone": "green", "tagLabel": "FASE 1", "tagName": "ANTES", "title": "Preparación: identifique zonas seguras y peligrosas en su área", "actions": ["Mire desde su puesto: ¿qué hay sobre usted, a su lado, detrás? Identifique <strong>una zona segura</strong> visible (bajo escritorio sólido, junto a columna, marco de puerta reforzada).", "Identifique <strong>zonas peligrosas</strong>: bajo ventanas, junto a estanterías altas no ancladas, bajo lámparas pesadas, junto a vidrios.", "Memorice la ruta a la zona segura y a la salida de emergencia más cercana."]}, {"tone": "amber", "tagLabel": "FASE 2", "tagName": "DURANTE", "title": "Agáchese, cúbrase, sosténgase", "actions": ["<strong>Agáchese</strong> al piso para no caer durante la sacudida.", "<strong>Cúbrase</strong> la cabeza y el cuello con los brazos, o métase bajo un escritorio sólido.", "<strong>Sosténgase</strong> de la base del escritorio para que se mueva con usted si la sacudida es fuerte.", "Aléjese de ventanas y objetos que puedan caer."], "warning": "NUNCA corra hacia las escaleras durante el movimiento; NUNCA use el ascensor; NUNCA salga corriendo a la calle (objetos pueden caer de fachadas).", "warningLabel": "NO HACER"}, {"tone": "red", "tagLabel": "FASE 3", "tagName": "DESPUÉS", "title": "Revise lesiones y evacúe si la edificación lo requiere", "actions": ["Una vez termina el movimiento, mantenga la calma. Revise si usted o personas cercanas tienen heridas. Atienda primero las más urgentes.", "<strong>NO mueva a heridos con sospecha de lesión de columna o cuello</strong> a menos que haya peligro adicional inmediato.", "Espere instrucciones de la brigada. Si no hay brigada presente, evalúe daños visibles del edificio (grietas, columnas dañadas, escapes de gas, fuego).", "Si hay daño estructural, evacúe por rutas señalizadas, sin correr, sin volver atrás por objetos personales. No use ascensores.", "Diríjase al punto de encuentro definido."]}], "keyMessage": "agáchese, cúbrase, sosténgase. Cuatro de cada cinco heridos en sismos lo son por intentar correr durante el movimiento o por objetos que caen sobre quien está de pie. La protección está cerca; salir corriendo es lo más peligroso."}, {"id": "p20", "type": "emergency_protocol_card", "moduleTitle": "Módulo 3: Emergencias y evacuación", "title": "Protocolo en caso de incendio", "image": null, "intro": "A diferencia del sismo, en el incendio hay tiempo limitado pero suficiente para actuar bien si los pasos están claros. Tres fases secuenciales sin saltarse ninguna: detectar, alertar, evacuar.", "bannerIcon": "🔥", "bannerTitle": "PROTOCOLO · INCENDIO", "bannerMeta": "REGLA: ALERTAR Y SALIR · NO VOLVER", "phases": [{"tone": "green", "tagLabel": "FASE 1", "tagName": "DETECTAR", "title": "Identifique señales tempranas", "actions": ["<strong>Olor a quemado, humo aunque sea leve, calor inusual en una pared o puerta, alarma sonora.</strong>", "Si suena la alarma, <strong>asuma que es real</strong> y proceda como tal.", "Nunca espere a verificar si 'es de verdad' o 'es prueba': actúe como si fuera real cada vez."]}, {"tone": "amber", "tagLabel": "FASE 2", "tagName": "ALERTAR", "title": "Active la alarma, llame, avise a su entorno", "actions": ["Active la alarma manual más cercana si no está sonando.", "Llame al número de emergencia local o de la organización.", "Avise a personas en su entorno inmediato, especialmente quienes podrían no haber escuchado."], "warning": "NO intente apagarlo solo si el fuego supera el tamaño de una papelera. Esa es función de la brigada o de bomberos. Su prioridad es alertar y evacuar.", "warningLabel": "PRIORIDAD"}, {"tone": "red", "tagLabel": "FASE 3", "tagName": "EVACUAR", "title": "Salga por rutas señalizadas y no regrese", "actions": ["Salga por la ruta señalizada más cercana. <strong>Camine, no corra</strong> (las caídas son la segunda causa de lesión en evacuaciones).", "<strong>No use ascensores.</strong>", "Si hay humo, agáchese: el aire respirable está en los 50-100 cm inferiores del piso.", "Cierre puertas detrás de usted (sin llave) para reducir oxígeno al fuego.", "Llegue al punto de encuentro y <strong>repórtese al jefe de brigada</strong>."], "warning": "NO REGRESE por objetos personales, computadoras, mascotas. La regla universal de incendios: salir y no volver hasta autorización oficial. Lo que más mata en incendios NO es el fuego: es el humo y la decisión de regresar.", "warningLabel": "REGLA DE ORO"}], "keyMessage": "alertar y salir. Sin heroísmo. Sin retorno. La organización puede reponer todo lo que se pierda en un incendio. A las personas no."}, {"id": "p21", "type": "statement_paragraphs", "moduleTitle": "Módulo 3: Emergencias y evacuación", "title": "Las brigadas de emergencia: quiénes son y qué hacen", "image": null, "statement": "Las brigadas de emergencia son colaboradores entrenados que asumen un rol específico cuando algo grave ocurre. No son superhéroes: son colegas con tareas claras.", "paragraphs": ["En toda organización mediana o grande existen (o deben existir) brigadas de emergencia compuestas por colaboradores que se ofrecen voluntariamente y reciben formación adicional. Su rol no es 'salvar a todos': es ejecutar tareas específicas que requieren entrenamiento previo, coordinándose con el resto del equipo y con servicios externos como bomberos, cruz roja o servicios médicos.", "Saber quiénes son los brigadistas en su área es parte del aprendizaje básico de SSO. Identificarlos toma un minuto y puede ser crítico en una emergencia."], "intro": "Las brigadas más comunes en una organización", "items": ["<strong>Brigada de evacuación.</strong> Coordina la salida ordenada por rutas señalizadas. Verifica que todas las personas salieron del área asignada. Reporta al jefe de brigada general en el punto de encuentro.", "<strong>Brigada contra incendios.</strong> Usa equipos de extinción (extintores, mangueras) para combate inicial. NO sustituye a bomberos: actúa en los primeros segundos mientras llegan los servicios profesionales. Recibe entrenamiento específico.", "<strong>Brigada de primeros auxilios.</strong> Atiende heridos hasta la llegada de servicios médicos. Estabiliza, no diagnostica. Conoce la ubicación de botiquines y desfibriladores (si los hay). Suele tener formación de cruz roja o entidad equivalente.", "<strong>Brigada de comunicación.</strong> Notifica a servicios externos (bomberos, cruz roja, autoridades). Mantiene el flujo de información durante la emergencia. Lleva el registro de quién está dentro y quién salió.", "<strong>Jefe de brigada general.</strong> Coordina las brigadas anteriores. Toma decisiones de mayor nivel durante la emergencia (suspender operación, contactar autoridades, autorizar retorno). Es el referente cuando alguien no sabe qué hacer."]}, {"id": "p22", "type": "risk_meter", "moduleTitle": "Módulo 3: Emergencias y evacuación", "title": "¿Qué tan preparada está su área para una emergencia?", "image": null, "intro": "La preparación de un área frente a una emergencia no es 0 o 100. Es un nivel acumulado de prácticas que reducen el riesgo. Mueva el slider según el estado actual de su área y vea las implicaciones.", "question": "Considerando rutas señalizadas, extintores accesibles, simulacros recientes y brigadistas identificados, ¿qué tan preparada está su área?", "explanation": "Mueva el indicador entre 'sin preparación visible' y 'totalmente preparada'. No es para juzgar: es para identificar qué falta y qué se puede mejorar esta semana.", "minLabel": "SIN PREPARACIÓN", "maxLabel": "TOTALMENTE PREPARADA", "initialValue": 50, "levels": [{"tone": "lv-safe", "icon": "✓", "label": "PREPARADA", "title": "Bajo nivel de riesgo · preparación adecuada", "text": "Su área tiene rutas señalizadas visibles, extintores recientemente inspeccionados, brigadistas identificados y ha tenido al menos un simulacro en los últimos seis meses. En una emergencia real, la probabilidad de respuesta ordenada es alta. Mantenga la práctica de los simulacros y vuelva a verificar señalización cada trimestre."}, {"tone": "lv-warn", "icon": "•", "label": "ACEPTABLE", "title": "Riesgo bajo-medio · faltan algunos elementos", "text": "La preparación básica existe pero hay vacíos: quizás no se han hecho simulacros recientes, algunos extintores podrían estar vencidos o no todos saben quiénes son los brigadistas. Estos vacíos son fácilmente solucionables. Identifique uno concreto y repórtelo al comité de salud ocupacional esta semana."}, {"tone": "lv-elev", "icon": "!", "label": "ATENCIÓN", "title": "Riesgo medio-alto · preparación significativamente insuficiente", "text": "Múltiples elementos clave están ausentes o desactualizados: señalización incompleta, sin simulacros recientes, brigadistas no identificados o sin formación. En una emergencia real la respuesta sería caótica y la probabilidad de víctimas adicionales aumenta. Es una situación que requiere acción del comité de salud ocupacional de inmediato."}, {"tone": "lv-danger", "icon": "✗", "label": "RIESGO ALTO", "title": "Riesgo alto · prácticamente sin preparación", "text": "Su área no tiene los elementos mínimos de preparación para emergencia. Esto no es solo incumplimiento normativo: es riesgo real de daño grave a personas en caso de emergencia. Esta situación debe escalarse de inmediato a la jefatura y al comité de salud ocupacional. Si nadie actúa, considere usar canales de denuncia formales: este nivel de exposición no se puede normalizar."}], "takeaway": "<strong>El propósito de este ejercicio:</strong> mover su atención del nivel teórico al nivel concreto de su área. Independientemente del nivel actual, hay siempre una acción pequeña que se puede hacer esta semana para subir el indicador. Identifíquela. La preparación para emergencia se construye con esas decisiones pequeñas, sostenidas en el tiempo."}, {"id": "p23", "type": "decision_scenario", "moduleTitle": "Módulo 3: Emergencias y evacuación", "title": "¿Qué hace usted en una emergencia?", "image": null, "instructions": "<strong>Instrucciones:</strong> lea la situación, elija la respuesta más alineada con el protocolo. Esta es una decisión que ocurre en segundos en la vida real. Pensarla con calma ahora ayuda a actuar mejor entonces.", "intro_text": "<strong>El caso.</strong> Son las 3 de la tarde. Usted está en su puesto en el segundo piso del edificio. Suena la alarma de incendio. No huele a humo en su área, no ve fuego, pero la alarma es claramente la de emergencia. Tres compañeros cerca suyo dicen 'seguro es prueba, no nos avisaron'. Su computador tiene un trabajo importante abierto que no ha guardado.", "question_text": "¿Qué hace?", "dialogue": [], "options": [{"id": "A", "label": "Esperar 30 segundos para ver si es prueba antes de moverse", "subtitle": "Tiene sentido confirmar primero.", "correct": false, "result": "Costoso si es real", "outcome": "Los 30 segundos pueden ser la diferencia entre salir o no salir. La regla de oro de emergencia: la alarma se trata como real hasta que las autoridades digan lo contrario. Si después resulta prueba, no se pierde nada relevante. Si era real, esos 30 segundos son recursos críticos."}, {"id": "B", "label": "Tomarse 2 minutos para guardar el trabajo y mandar un correo importante", "subtitle": "Es solo guardar, no se demora mucho.", "correct": false, "result": "Peligroso y contradice el protocolo", "outcome": "El protocolo de incendios es claro: salir y no regresar. Ningún archivo, correo o tarea justifica posponer la evacuación. El trabajo puede repetirse mañana; usted no. Esta es la decisión que aparece en investigaciones de víctimas en incendios: gente que se quedó 'un minuto más' y no salió."}, {"id": "C", "label": "Detener la tarea, no regresar por objetos, evacuar por la ruta señalizada y reportarme al punto de encuentro", "subtitle": "Asumir que es real y aplicar el protocolo.", "correct": true, "result": "La respuesta alineada con el protocolo", "outcome": "Esta es la respuesta correcta. Es lo que el protocolo de incendio prescribe paso por paso: no se confirma si la alarma es real desde adentro (eso lo decide la brigada y los bomberos), no se regresa por objetos, se evacúa por rutas señalizadas y se reporta al punto de encuentro para que se sepa que usted salió."}, {"id": "D", "label": "Llamar a recepción para confirmar si es real o prueba", "subtitle": "Antes de moverse, mejor verificar.", "correct": false, "result": "Demora innecesaria", "outcome": "Recepción puede estar atendiendo emergencias o ya evacuando. Llamar agrega un paso que retrasa la salida sin aportar información confiable. La confirmación de tipo de evento la da el jefe de brigada DESPUÉS de salir, no antes. Su prioridad en el momento es ejecutar el protocolo, no investigar la causa."}], "convergent_title": "Cuando suena la alarma, se evacúa. Punto.", "convergent_text": "La cultura de seguridad ocupacional madura es la que trata cada alarma como real, cada protocolo como necesario, cada ejercicio como entrenamiento real. Nadie debería tener que decidir 'si esta vez sí'. La regla es siempre la misma: <strong>alarma → evacuación → punto de encuentro → reporte.</strong><br><br>El argumento de 'pero he tenido alarmas falsas antes' es exactamente lo que hace que en la emergencia real haya víctimas: personas que ya estaban entrenadas a ignorar la alarma. La cultura de respuesta inmediata se construye respondiendo siempre, incluso cuando termina siendo prueba. La paciencia con el simulacro es la inversión de la salida real."}, {"id": "p24", "type": "module_outro", "moduleTitle": "Módulo 3: Emergencias y evacuación", "title": "Lo que cierra este módulo", "image": null, "items": ["<strong>Sismo: agáchese, cúbrase, sosténgase.</strong> No corra durante el movimiento. La protección está cerca; salir corriendo es lo más peligroso.", "<strong>Incendio: detectar, alertar, evacuar.</strong> Nunca regrese por objetos. El humo mata más que el fuego. Cierre puertas detrás (sin llave).", "<strong>Trate cada alarma como real.</strong> Sin esperar, sin verificar, sin demorarse. La cultura de respuesta inmediata se construye respondiendo siempre, incluso cuando termina siendo prueba."]}]}, {"id": "m4", "title": "Cierre y evaluación", "screens": [{"id": "p25", "type": "quiz", "moduleTitle": "Cierre y evaluación", "title": "Evaluación final del curso", "image": null, "intro": "Diez preguntas sobre lo trabajado en los tres módulos. Para aprobar necesita 80% o más (8 de 10).", "passingScore": 80, "questions": [{"type": "single", "stem": "¿Qué porcentaje aproximado de accidentes laborales son evitables según los datos del curso?", "options": ["20%", "50%", "Cerca del 80%", "Casi todos son inevitables"], "correctAnswer": 2, "correct": 2}, {"type": "single", "stem": "Marcos ve un tomacorriente recalentado pero asume que ya alguien lo reportará. ¿Cuál es la respuesta correcta?", "options": ["Asumir que alguien más lo reportará.", "Cambiarlo personalmente.", "Reportarlo por el canal establecido aunque sea breve.", "Esperar a la próxima inspección."], "correctAnswer": 2, "correct": 2}, {"type": "single", "stem": "¿Cuál es la etapa de la cadena del accidente donde es MÁS BARATO actuar?", "options": ["Después del accidente, con investigación.", "Durante el accidente, con respuesta.", "Cuando el riesgo aún es latente y no identificado.", "Después del primer incidente grave."], "correctAnswer": 2, "correct": 2}, {"type": "single", "stem": "Según el módulo de ergonomía, ¿a qué altura debe estar la parte superior del monitor del computador?", "options": ["Más arriba que los ojos.", "A la altura de los ojos cuando está sentado en posición natural.", "Más abajo que los ojos para descansar el cuello.", "No importa, lo que sea cómodo en el momento."], "correctAnswer": 1, "correct": 1}, {"type": "single", "stem": "Cuáles de estos son riesgos PSICOSOCIALES (no físicos ni ergonómicos)?", "options": ["Cable suelto y silla baja.", "Ruido excesivo y temperatura.", "Sobrecarga sostenida, liderazgo abusivo, ambigüedad de rol.", "Movimientos repetitivos y postura."], "correctAnswer": 2, "correct": 2}, {"type": "single", "stem": "Durante un sismo, ¿cuál es la regla más importante?", "options": ["Correr hacia las escaleras lo más rápido posible.", "Salir del edificio inmediatamente por la calle.", "Agacharse, cubrirse y sostenerse.", "Quedarse de pie junto a una ventana."], "correctAnswer": 2, "correct": 2}, {"type": "single", "stem": "Suena la alarma de incendio. Usted no huele humo. ¿Qué hace?", "options": ["Esperar a confirmar si es real.", "Tomar 2 minutos para guardar el trabajo importante.", "Asumir que es real, evacuar por ruta señalizada, no regresar por objetos.", "Llamar a recepción para confirmar."], "correctAnswer": 2, "correct": 2}, {"type": "single", "stem": "Si durante un incendio hay humo en su ruta de evacuación, ¿cuál es la mejor práctica?", "options": ["Correr más rápido para pasar antes de que sea más denso.", "Agacharse y avanzar bajo (el aire respirable está en los 50-100 cm inferiores).", "Cubrirse la boca con la ropa y seguir caminando normalmente.", "Aguantar la respiración hasta salir."], "correctAnswer": 1, "correct": 1}, {"type": "multiple", "stem": "¿Cuáles de estas son brigadas de emergencia comunes en una organización? (Marque todas las correctas.)", "options": ["Brigada de evacuación.", "Brigada contra incendios.", "Brigada de primeros auxilios.", "Brigada de queja sindical."], "correctAnswer": [0, 1, 2], "correct": [0, 1, 2]}, {"type": "matching", "stem": "Empareje cada tipo de riesgo con su característica principal:", "pairs": [{"left": "Riesgo físico", "right": "Daño inmediato por contacto con elementos físicos o energía"}, {"left": "Riesgo ergonómico", "right": "Daño acumulado por postura, repetición o esfuerzo inadecuado"}, {"left": "Riesgo psicosocial", "right": "Daño relacional y mental por carga, liderazgo o ambiente"}, {"left": "Cadena del accidente", "right": "Riesgo latente → no identificado → condición → acto → daño"}]}]}, {"id": "p26", "type": "closing_resources", "moduleTitle": "Cierre y evaluación", "title": "Su primer paso esta semana", "image": "assets/images/cce1_img_p26.jpg", "audio": "assets/audio/cce1_audio_p26.mp3", "audio_script": "Ha terminado el curso. Tres ideas para llevarse. Una. La seguridad ocupacional empieza con ver. Ver el riesgo antes del accidente. Verlo en uno mismo. Verlo en los compañeros. Y reportarlo. Dos. La ergonomía y los riesgos psicosociales... no son problemas individuales. Son problemas de diseño del trabajo. Hay que ajustarlos antes... no después. Tres. Las emergencias se ganan en los primeros segundos. Y los primeros segundos se entrenan antes. La cultura de respuesta inmediata... se construye respondiendo siempre. Y un compromiso para esta semana. Identifique un riesgo en su puesto de trabajo. Uno solo. Y repórtelo... por el canal que tenga la empresa. Eso es todo. Una persona reportando una cosa... es lo que cambia las estadísticas.", "paragraphs": ["Ha terminado el curso. Tiene ahora un marco conceptual para identificar riesgos, prevenir accidentes, ajustar el puesto, reconocer riesgos psicosociales y actuar en emergencias. La salud ocupacional no es un manual: es una práctica diaria.", "<strong>El compromiso mínimo es uno:</strong> identificar un riesgo en su entorno esta semana y reportarlo. Uno solo. Si lo sostiene, su cultura personal cambia. Si su equipo lo sostiene, la cultura de la organización cambia."], "items": ["Guía: Cómo reportar un riesgo en 60 segundos (PDF con plantilla).", "Plantilla: Mapa de riesgos personal del puesto (PDF imprimible).", "Recurso: Brigadas de emergencia: cómo identificarlas en su organización (PDF).", "Guía rápida: Cinco ajustes ergonómicos en 10 minutos (PDF visual)."], "closing": "La salud ocupacional no se logra con un curso. Se logra con personas que aplican lo aprendido día a día. Este curso le dio el marco. Lo que sigue depende de usted: <strong>ver, nombrar, reportar.</strong> Una persona haciéndolo bien cambia el riesgo de su área. Todo un equipo haciéndolo bien cambia el riesgo de la organización."}]}]};
  </script>
  <script>
/**
 * Aacrom Course Player
 * Curso: P-A.1 · El arte de la guerra aplicado a los negocios
 */

(function () {
  'use strict';

  let course = null;
  let allScreens = [];
  let currentIndex = 0;
  let completedScreens = new Set();
  let quizFinalized = false;
  let quizState = {};
  let scenarioState = { exploredOptions: new Set(), convergentShown: false };

  // ==========================================================
  // INIT
  // ==========================================================
  async function init() {
    try {
      course = window.COURSE_DATA;
      buildScreenList();
      buildSidebar();
      loadProgress();
      renderScreen();
      bindNav();
    } catch (e) {
      document.getElementById('screen-container').innerHTML = '<p style="padding:40px;color:#B02A2A">Error cargando el curso: ' + e.message + '</p>';
    }
  }

  function buildScreenList() {
    allScreens = [];
    course.modules.forEach((mod, mi) => {
      mod.screens.forEach((scr, si) => {
        allScreens.push({ ...scr, moduleIndex: mi, screenIndex: si });
      });
    });
    document.getElementById('course-title').textContent = course.title;
  }

  function buildSidebar() {
    const nav = document.getElementById('module-nav');
    nav.innerHTML = '';
    course.modules.forEach((mod, idx) => {
      const item = document.createElement('div');
      item.className = 'module-item';
      item.dataset.moduleIndex = idx;
      item.innerHTML = `
        <div class="icon">≡</div>
        <div class="title">${mod.title}</div>
        <div class="check"></div>
      `;
      item.addEventListener('click', () => jumpToModule(idx));
      nav.appendChild(item);
    });
  }

  function jumpToModule(moduleIndex) {
    const first = allScreens.findIndex(s => s.moduleIndex === moduleIndex);
    if (first >= 0) { currentIndex = first; renderScreen(); }
    document.getElementById('sidebar').classList.remove('open');
  }

  function loadProgress() {
    var saved = null;
    try {
      if (window.AacromSCORM && window.AacromSCORM.isInitialized && window.AacromSCORM.isInitialized()) {
        saved = window.AacromSCORM.getSuspendData();
      }
    } catch (e) {}
    if (!saved) { try { saved = JSON.parse(sessionStorage.getItem('aacrom_progress_cce1') || '{}'); } catch (e) { saved = {}; } }
    try {
      if (saved && saved.completed) completedScreens = new Set(saved.completed);
      if (saved && typeof saved.current === 'number') currentIndex = Math.min(saved.current, allScreens.length - 1);
    } catch (e) {}
  }

  function saveProgress() {
    var data = { completed: Array.from(completedScreens), current: currentIndex };
    try { sessionStorage.setItem('aacrom_progress_cce1', JSON.stringify(data)); } catch (e) {}
    try {
      if (window.AacromSCORM && window.AacromSCORM.isInitialized && window.AacromSCORM.isInitialized()) {
        window.AacromSCORM.setSuspendData(data);
        window.AacromSCORM.commit();
      }
    } catch (e) {}
  }

  // ==========================================================
  // SIDEBAR UPDATE
  // ==========================================================
  function updateSidebar() {
    const items = document.querySelectorAll('.module-item');
    const currentModule = allScreens[currentIndex].moduleIndex;

    items.forEach((item, idx) => {
      item.classList.remove('active', 'current', 'completed');
      const modScreens = allScreens.filter(s => s.moduleIndex === idx);
      const modCompleted = modScreens.every(s => completedScreens.has(s.id));

      if (idx === currentModule) item.classList.add('active', 'current');
      if (modCompleted) item.classList.add('completed');
    });

    const totalScreens = allScreens.length;
    const completed = completedScreens.size;
    const pct = Math.round((completed / totalScreens) * 100);
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-text').textContent = pct + '% COMPLETADO';
  }

  // ==========================================================
  // RENDER SCREEN
  // ==========================================================
  function renderScreen() {
    const screen = allScreens[currentIndex];
    document.getElementById('screen-counter').textContent = (currentIndex + 1) + ' de ' + allScreens.length;

    const container = document.getElementById('screen-container');
    container.scrollTop = 0;

    let html = '';
    switch (screen.type) {
      case 'course_cover':       html = renderCourseCover(screen); break;
      case 'statement_list':     html = renderStatementList(screen); break;
      case 'module_intro':       html = renderModuleIntro(screen); break;
      case 'paragraph_audio':    html = renderParagraphAudio(screen); break;
      case 'hotspots':           html = renderHotspots(screen); break;
      case 'tabs':               html = renderTabs(screen); break;
      case 'case_study':         html = renderCaseStudy(screen); break;
      case 'module_outro':       html = renderModuleOutro(screen); break;
      case 'knowledge_check':    html = renderKnowledgeCheck(screen); break;
      case 'accordion':          html = renderAccordion(screen); break;
      case 'statement_paragraph':html = renderStatementParagraph(screen); break;
      case 'sorting':            html = renderSorting(screen); break;
      case 'decision_matrix':    html = renderDecisionMatrix(screen); break;
      case 'decision_scenario':  html = renderDecisionScenario(screen); break;
      case 'quiz':               html = renderQuiz(screen); break;
      case 'module_intro_full':  html = renderModuleIntroFull(screen); break;
      case 'paragraphs':         html = renderParagraphs(screen); break;
      case 'statement_paragraphs': html = renderStatementParagraphs(screen); break;
      case 'closing_resources':  html = renderClosingResources(screen); break;
      case 'course_cover_objective': html = renderCourseCoverObjective(screen); break;
      case 'hero_image':         html = renderHeroImage(screen); break;
      case 'stat_callout':       html = renderStatCallout(screen); break;
      case 'comparison_cards':   html = renderComparisonCards(screen); break;
      case 'flip_cards':         html = renderFlipCards(screen); break;
      case 'timeline':           html = renderTimeline(screen); break;
      case 'interactive_checklist': html = renderInteractiveChecklist(screen); break;
      case 'pull_quote':              html = renderPullQuote(screen); break;
      case 'process_steps':           html = renderProcessSteps(screen); break;
      case 'calculator_widget':       html = renderCalculatorWidget(screen); break;
      case 'myth_buster':             html = renderMythBuster(screen); break;
      case 'funnel_diagram':          html = renderFunnelDiagram(screen); break;
      case 'interactive_chart':       html = renderInteractiveChart(screen); break;
      case 'safety_signs_grid':       html = renderSafetySignsGrid(screen); break;
      case 'side_by_side_comparison': html = renderSideBySideComparison(screen); break;
      case 'emergency_protocol_card': html = renderEmergencyProtocolCard(screen); break;
      case 'risk_meter':              html = renderRiskMeter(screen); break;
      default:                   html = `<div style="padding:40px;">Tipo no implementado: ${screen.type}</div>`;
    }

    container.innerHTML = html;

    if (screen.type === 'hotspots')          attachHotspotEvents(screen);
    else if (screen.type === 'tabs')          attachTabEvents(screen);
    else if (screen.type === 'accordion')     attachAccordionEvents(screen);
    else if (screen.type === 'knowledge_check')attachKCEvents(screen);
    else if (screen.type === 'sorting')       attachSortingEvents(screen);
    else if (screen.type === 'decision_matrix')attachMatrixEvents(screen);
    else if (screen.type === 'decision_scenario')attachScenarioEvents(screen);
    else if (screen.type === 'quiz')          attachQuizEvents(screen);

    if (!isInteractiveScreen(screen)) completedScreens.add(screen.id);
    updateSidebar();
    updateFooterNav();
    saveProgress();
  }

  function isInteractiveScreen(screen) {
    return ['knowledge_check', 'sorting', 'quiz', 'decision_scenario'].includes(screen.type);
  }

  // Helper global para cálculos del calculator_widget
  window.__c7CalcCompute = function(type, v, calc) {
    if (type === 'budget_503020') {
      return (calc.outputs || []).map(function(o) { return Math.round(v * o.factor); });
    } else if (type === 'loan_cost') {
      var monthlyRate = (calc.annualRate || 0.5) / 12;
      var months = calc.termMonths || 12;
      var pow = Math.pow(1 + monthlyRate, months);
      var cuota = Math.round(v * monthlyRate * pow / (pow - 1));
      var total = cuota * months;
      var intereses = total - v;
      var sobrecosto_pct = Math.round((intereses / v) * 100);
      return [cuota, intereses, total, sobrecosto_pct];
    }
    return [v];
  };

  // Helper global para inicializar la calculadora después del render
  window.__c7CalcInit = function(calcId, calcType, calcData, unit) {
    var slider = document.getElementById(calcId + '_slider');
    var display = document.getElementById(calcId + '_display');
    if (!slider || !display) return;

    function fmt(n) { return parseInt(n).toLocaleString('es-ES'); }

    function update(v) {
      display.querySelector('.num').textContent = fmt(v);
      var outs = window.__c7CalcCompute(calcType, parseInt(v), calcData);
      var rows = slider.closest('.calc-container').querySelectorAll('.calc-output-value');
      outs.forEach(function(val, idx) {
        if (rows[idx]) {
          var isPct = calcType === 'loan_cost' && idx === 3;
          var row = rows[idx];
          if (isPct) {
            row.innerHTML = '<span class="num">' + fmt(val) + '</span><span class="unit" style="margin-left:4px;margin-right:0;">%</span>';
          } else {
            row.innerHTML = '<span class="unit">' + unit + '</span><span class="num">' + fmt(val) + '</span>';
          }
        }
      });
    }
    slider.addEventListener('input', function(e) { update(e.target.value); });
    update(slider.value);
  };
