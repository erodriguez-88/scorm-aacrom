<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Seguridad y salud ocupacional básica · Aacrom</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>

/* ============================================
   THEME — Aacrom Rise
   ============================================ */
:root {
  --aacrom-primary: #1F3864;
  --aacrom-primary-light: #2E5497;
  --aacrom-accent: #C9A227;
  --aacrom-accent-light: #E8C667;
  --aacrom-text: #2C2C2C;
  --aacrom-text-muted: #6B6B6B;
  --aacrom-bg: #FFFFFF;
  --aacrom-bg-soft: #F7F8FA;
  --aacrom-border: #E5E7EB;
  --aacrom-success: #1F7A42;
  --aacrom-danger: #B02A2A;
  --sidebar-width: 320px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  color: var(--aacrom-text);
  background: var(--aacrom-bg);
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

#app {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ============================================
   SIDEBAR
   ============================================ */
#sidebar {
  width: var(--sidebar-width);
  background: var(--aacrom-primary);
  color: white;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
  transition: transform 0.3s ease;
}

.sidebar-header {
  padding: 32px 28px 24px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

#course-title {
  font-size: 22px;
  font-weight: 700;
  line-height: 1.25;
  margin-bottom: 28px;
}

.progress-wrapper { margin-top: 8px; }

.progress-bar {
  width: 100%;
  height: 3px;
  background: rgba(255,255,255,0.18);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 10px;
}

#progress-fill {
  height: 100%;
  width: 0%;
  background: white;
  transition: width 0.4s ease;
}

#progress-text {
  font-size: 11px;
  letter-spacing: 1.5px;
  font-weight: 600;
  opacity: 0.85;
}

#module-nav {
  padding: 20px 0;
  flex: 1;
}

.module-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 28px;
  cursor: pointer;
  font-size: 14px;
  line-height: 1.4;
  color: rgba(255,255,255,0.9);
  border-left: 3px solid transparent;
  transition: background 0.15s, border-left-color 0.15s;
}

.module-item:hover { background: rgba(255,255,255,0.06); }

.module-item.active {
  background: rgba(255,255,255,0.12);
  border-left-color: var(--aacrom-accent);
  font-weight: 600;
}

.module-item .icon {
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  opacity: 0.8;
}

.module-item .check {
  margin-left: auto;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.45);
  flex-shrink: 0;
  transition: all 0.2s;
}

.module-item.current .check {
  border-color: var(--aacrom-accent);
  border-style: dashed;
  animation: spin 4s linear infinite;
}

.module-item.completed .check {
  background: var(--aacrom-accent);
  border-color: var(--aacrom-accent);
  position: relative;
}

.module-item.completed .check::after {
  content: '✓';
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: var(--aacrom-primary);
  font-weight: 900;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ============================================
   MAIN
   ============================================ */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--aacrom-bg);
}

#topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 48px;
  background: var(--aacrom-bg);
  border-bottom: 1px solid var(--aacrom-border);
  flex-shrink: 0;
  z-index: 2;
}

#menu-toggle {
  background: none;
  border: none;
  font-size: 22px;
  cursor: pointer;
  color: var(--aacrom-text);
  padding: 4px 8px;
  display: none;
}

#screen-counter {
  font-size: 13px;
  color: var(--aacrom-text-muted);
  font-weight: 600;
}

#screen-container {
  flex: 1;
  overflow-y: auto;
  padding: 0;
  position: relative;
}

/* ============================================
   SCREEN — Header con onda decorativa
   ============================================ */
.screen-header {
  position: relative;
  padding: 60px 64px 50px;
  background: var(--aacrom-bg-soft);
  overflow: hidden;
}

.screen-header::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  right: 0;
  height: 60px;
  background: var(--aacrom-bg);
  clip-path: polygon(0 100%, 0 40%, 50% 70%, 100% 30%, 100% 100%);
}

.screen-header h1 {
  font-size: 44px;
  font-weight: 700;
  color: var(--aacrom-text);
  line-height: 1.15;
  position: relative;
  z-index: 1;
  max-width: 80%;
}

.screen-header .header-line {
  width: 80px;
  height: 4px;
  background: var(--aacrom-text);
  margin-top: 18px;
  position: relative;
  z-index: 1;
}

.screen-header.with-image {
  background-size: cover;
  background-position: right center;
  background-blend-mode: lighten;
}

.screen-header.with-image::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, rgba(247,248,250,0.97) 0%, rgba(247,248,250,0.85) 50%, rgba(247,248,250,0.4) 100%);
}

.screen-header > * { position: relative; z-index: 1; }

/* ============================================
   SCREEN BODY
   ============================================ */
.screen-body {
  padding: 50px 64px 80px;
  max-width: 1100px;
  margin: 0 auto;
}

.subtitle-blue {
  font-size: 36px;
  font-weight: 700;
  color: var(--aacrom-primary);
  text-align: center;
  margin: 30px 0 24px;
}

/* Bloque de instrucciones dorado */
.instructions-box {
  display: flex;
  align-items: center;
  gap: 18px;
  margin: 30px auto;
  padding: 0;
  font-size: 22px;
  max-width: 900px;
}

.instructions-box .badge-icon {
  width: 56px;
  height: 56px;
  flex-shrink: 0;
  background: var(--aacrom-accent);
  border-radius: 50%;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.instructions-box .badge-icon::before {
  content: '!';
  font-size: 32px;
  font-weight: 900;
  color: white;
}

.instructions-box .badge-icon::after {
  content: '';
  position: absolute;
  inset: -4px;
  border: 2.5px dashed var(--aacrom-accent);
  border-radius: 50%;
  opacity: 0.5;
}

.instructions-box .text {
  font-size: 22px;
  line-height: 1.4;
  color: var(--aacrom-text);
}

.instructions-box .text strong {
  color: var(--aacrom-primary);
  font-weight: 700;
}

/* Reproductor de audio */
audio {
  display: block;
  width: 100%;
  max-width: 700px;
  margin: 30px auto;
  height: 44px;
}

audio::-webkit-media-controls-panel {
  background-color: #F0F2F5;
}

/* Texto cuerpo de la pantalla */
.screen-body p {
  font-size: 18px;
  line-height: 1.7;
  margin-bottom: 20px;
  text-align: center;
  max-width: 900px;
  margin-left: auto;
  margin-right: auto;
}

.screen-body p.left { text-align: left; }
.screen-body p.justify { text-align: justify; }

.screen-body p strong { color: var(--aacrom-primary); font-weight: 700; }

/* ============================================
   STATEMENT (cita destacada)
   ============================================ */
.statement {
  background: var(--aacrom-bg-soft);
  border-left: 5px solid var(--aacrom-accent);
  padding: 32px 40px;
  margin: 30px auto;
  font-size: 22px;
  font-weight: 600;
  line-height: 1.45;
  color: var(--aacrom-primary);
  max-width: 900px;
  font-style: italic;
}

.statement::before {
  content: '"';
  font-size: 60px;
  line-height: 0;
  color: var(--aacrom-accent);
  vertical-align: -20px;
  margin-right: 8px;
  font-family: Georgia, serif;
}

.statement-citation {
  display: block;
  margin-top: 14px;
  font-size: 14px;
  font-style: normal;
  color: var(--aacrom-text-muted);
  font-weight: 500;
}

/* ============================================
   LIST
   ============================================ */
.aacrom-list {
  list-style: none;
  margin: 30px auto;
  max-width: 900px;
  padding: 0;
}

.aacrom-list li {
  display: flex;
  gap: 18px;
  padding: 18px 24px;
  background: var(--aacrom-bg-soft);
  margin-bottom: 12px;
  border-radius: 8px;
  font-size: 17px;
  line-height: 1.5;
  border-left: 4px solid var(--aacrom-accent);
}

.aacrom-list li::before {
  content: '';
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--aacrom-accent);
  flex-shrink: 0;
  margin-top: 9px;
}

/* ============================================
   CASE CARD (cards con texto sobre imagen)
   ============================================ */
.case-card-wrapper {
  position: relative;
  margin: 30px auto;
  max-width: 1000px;
  min-height: 480px;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 10px 40px rgba(0,0,0,0.12);
}

.case-card-wrapper .bg-image {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
}

.case-card-wrapper .bg-image::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.5) 100%);
}

.case-card-wrapper .card-content {
  position: relative;
  z-index: 1;
  background: white;
  border-radius: 20px;
  padding: 36px 44px;
  margin: 130px auto 40px;
  max-width: 720px;
  font-size: 18px;
  line-height: 1.6;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  text-align: justify;
}

.case-card-wrapper .card-content strong {
  color: var(--aacrom-primary);
  font-weight: 700;
}

.case-card-wrapper .card-subtitle {
  text-align: center;
  font-size: 20px;
  font-weight: 600;
  color: var(--aacrom-accent);
  margin-bottom: 20px;
}

/* ============================================
   TABS
   ============================================ */
.tabs-container {
  margin: 30px auto;
  max-width: 900px;
}

.tabs-nav {
  display: flex;
  gap: 4px;
  border-bottom: 2px solid var(--aacrom-border);
  margin-bottom: 0;
}

.tab-btn {
  flex: 1;
  padding: 16px 20px;
  border: none;
  background: var(--aacrom-bg-soft);
  cursor: pointer;
  font-size: 15px;
  font-weight: 600;
  color: var(--aacrom-text-muted);
  border-radius: 8px 8px 0 0;
  transition: all 0.2s;
  font-family: inherit;
}

.tab-btn:hover { background: #EEF1F5; color: var(--aacrom-text); }

.tab-btn.active {
  background: var(--aacrom-primary);
  color: white;
}

.tab-panel {
  display: none;
  background: var(--aacrom-bg-soft);
  padding: 30px 36px;
  border-radius: 0 0 12px 12px;
  font-size: 16px;
  line-height: 1.65;
}

.tab-panel.active { display: block; animation: fadeIn 0.3s; }
.tab-panel ul { padding-left: 20px; }
.tab-panel li { margin-bottom: 10px; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ============================================
   ACCORDION
   ============================================ */
.accordion {
  margin: 30px auto;
  max-width: 900px;
}

.accordion-item {
  margin-bottom: 10px;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--aacrom-border);
}

.accordion-header {
  padding: 18px 24px;
  background: var(--aacrom-bg-soft);
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 600;
  font-size: 17px;
  color: var(--aacrom-primary);
  transition: background 0.2s;
}

.accordion-header:hover { background: #EEF1F5; }

.accordion-header .toggle {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--aacrom-primary);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 300;
  transition: transform 0.3s;
}

.accordion-item.open .toggle { transform: rotate(45deg); }

.accordion-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
  background: white;
}

.accordion-item.open .accordion-content {
  max-height: 500px;
}

.accordion-content-inner {
  padding: 20px 24px;
  font-size: 16px;
  line-height: 1.65;
}

/* ============================================
   HOTSPOTS
   ============================================ */
.hotspots-container {
  position: relative;
  margin: 30px auto;
  max-width: 900px;
}

.hotspots-image {
  width: 100%;
  border-radius: 12px;
  display: block;
}

.hotspots-list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-top: 24px;
}

.hotspot-btn {
  padding: 16px 20px;
  background: var(--aacrom-bg-soft);
  border: 2px solid var(--aacrom-border);
  border-radius: 10px;
  cursor: pointer;
  font-weight: 600;
  font-size: 15px;
  color: var(--aacrom-primary);
  transition: all 0.2s;
  font-family: inherit;
  position: relative;
}

.hotspot-btn::before {
  content: '+';
  display: block;
  font-size: 22px;
  font-weight: 300;
  color: var(--aacrom-accent);
  margin-bottom: 4px;
}

.hotspot-btn:hover {
  background: white;
  border-color: var(--aacrom-accent);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(31,56,100,0.12);
}

.hotspot-btn.viewed {
  background: var(--aacrom-primary);
  color: white;
  border-color: var(--aacrom-primary);
}

.hotspot-btn.viewed::before { color: var(--aacrom-accent-light); }

.hotspot-content {
  margin-top: 24px;
  padding: 24px 30px;
  background: var(--aacrom-bg-soft);
  border-left: 4px solid var(--aacrom-accent);
  border-radius: 8px;
  font-size: 16px;
  line-height: 1.65;
  display: none;
}

.hotspot-content.show { display: block; animation: fadeIn 0.3s; }

/* ============================================
   DECISION MATRIX (4 cuadrantes)
   ============================================ */
.matrix-container {
  position: relative;
  margin: 30px auto;
  max-width: 800px;
  padding: 40px 60px 30px;
}

.matrix-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 8px;
  aspect-ratio: 1.2;
  position: relative;
}

.matrix-quadrant {
  border-radius: 10px;
  padding: 24px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  color: white;
  font-weight: 700;
  font-size: 22px;
  letter-spacing: 0.5px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.12);
  position: relative;
  min-height: 180px;
}

.matrix-quadrant:hover { transform: scale(1.03); box-shadow: 0 8px 24px rgba(0,0,0,0.18); }

.matrix-quadrant.active { box-shadow: 0 0 0 3px var(--aacrom-accent); }

.matrix-label-x, .matrix-label-y {
  position: absolute;
  font-size: 13px;
  font-weight: 700;
  color: var(--aacrom-text-muted);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.matrix-label-x {
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
}

.matrix-label-y {
  left: -20px;
  top: 50%;
  transform: rotate(-90deg) translateX(50%);
  transform-origin: center;
}

.matrix-content {
  margin-top: 30px;
  padding: 24px 30px;
  background: var(--aacrom-bg-soft);
  border-left: 4px solid var(--aacrom-accent);
  border-radius: 8px;
  font-size: 16px;
  line-height: 1.65;
  display: none;
}

.matrix-content.show { display: block; animation: fadeIn 0.3s; }

/* ============================================
   DECISION SCENARIO
   ============================================ */
.scenario-container { margin: 20px auto; max-width: 1000px; }

.scenario-intro-card {
  background: var(--aacrom-bg-soft);
  padding: 30px 36px;
  border-radius: 12px;
  margin-bottom: 24px;
  font-size: 17px;
  line-height: 1.65;
  border-left: 4px solid var(--aacrom-primary);
}

.dialogue-container { margin: 30px 0; }

.dialogue-line {
  display: flex;
  gap: 14px;
  margin-bottom: 18px;
  align-items: flex-start;
  opacity: 0.4;
  transition: opacity 0.3s;
}

.dialogue-line.played, .dialogue-line.active { opacity: 1; }
.dialogue-line.active { background: rgba(201, 162, 39, 0.07); border-radius: 10px; padding: 10px 14px; margin: 8px -14px 8px -14px; }

.dialogue-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  color: white;
  font-size: 14px;
  flex-shrink: 0;
  background: var(--aacrom-primary);
}

.dialogue-avatar.andres { background: #4A5C77; }
.dialogue-avatar.narrator { background: var(--aacrom-text-muted); font-size: 18px; }

.dialogue-body { flex: 1; }

.dialogue-character {
  font-weight: 700;
  font-size: 13px;
  color: var(--aacrom-primary);
  margin-bottom: 4px;
  letter-spacing: 0.3px;
}

.dialogue-character .role {
  font-weight: 400;
  color: var(--aacrom-text-muted);
  font-size: 12px;
  margin-left: 8px;
}

.dialogue-text {
  font-size: 16px;
  line-height: 1.55;
  color: var(--aacrom-text);
}

.dialogue-line audio { margin: 8px 0 0; max-width: 100%; height: 36px; }

.scenario-question {
  margin-top: 30px;
  font-size: 24px;
  font-weight: 700;
  color: var(--aacrom-primary);
  text-align: center;
}

.scenario-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-top: 24px;
}

.scenario-option-btn {
  padding: 22px 24px;
  background: white;
  border: 2px solid var(--aacrom-border);
  border-radius: 12px;
  cursor: pointer;
  text-align: left;
  transition: all 0.2s;
  font-family: inherit;
}

.scenario-option-btn:hover {
  border-color: var(--aacrom-accent);
  transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(31,56,100,0.1);
}

.scenario-option-btn .option-id {
  display: inline-block;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--aacrom-primary);
  color: white;
  text-align: center;
  line-height: 28px;
  font-weight: 700;
  margin-right: 10px;
  font-size: 14px;
}

.scenario-option-btn .option-label {
  font-weight: 700;
  color: var(--aacrom-primary);
  font-size: 16px;
  margin-bottom: 6px;
  display: block;
}

.scenario-option-btn .option-sub {
  font-size: 14px;
  color: var(--aacrom-text-muted);
  line-height: 1.5;
}

.scenario-result {
  margin-top: 24px;
  padding: 30px 36px;
  border-radius: 12px;
  background: var(--aacrom-bg-soft);
  border-left: 5px solid var(--aacrom-accent);
}

.scenario-result.correct { border-left-color: var(--aacrom-success); }
.scenario-result.incorrect { border-left-color: var(--aacrom-danger); }

.scenario-result-badge {
  display: inline-block;
  padding: 5px 14px;
  border-radius: 20px;
  background: var(--aacrom-accent);
  color: white;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  margin-bottom: 14px;
}

.scenario-result.correct .scenario-result-badge { background: var(--aacrom-success); }
.scenario-result.incorrect .scenario-result-badge { background: var(--aacrom-danger); }

.scenario-result h4 {
  font-size: 22px;
  color: var(--aacrom-primary);
  margin-bottom: 12px;
}

.scenario-result p { font-size: 16px; line-height: 1.65; text-align: left; }

.scenario-actions { margin-top: 24px; display: flex; gap: 12px; justify-content: center; }

.scenario-convergent {
  margin-top: 30px;
  padding: 30px 36px;
  background: linear-gradient(135deg, var(--aacrom-primary) 0%, var(--aacrom-primary-light) 100%);
  color: white;
  border-radius: 16px;
  display: none;
}

.scenario-convergent.show { display: block; animation: fadeIn 0.4s; }
.scenario-convergent h4 {
  font-size: 24px;
  color: var(--aacrom-accent);
  margin-bottom: 16px;
}
.scenario-convergent p { color: white; font-size: 16px; line-height: 1.7; text-align: left; }

/* ============================================
   KNOWLEDGE CHECK / QUIZ
   ============================================ */
.question-card {
  background: var(--aacrom-bg-soft);
  padding: 32px 40px;
  border-radius: 14px;
  margin: 24px auto;
  max-width: 900px;
}

.question-counter {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: var(--aacrom-accent);
  margin-bottom: 10px;
}

.question-stem {
  font-size: 18px;
  line-height: 1.55;
  margin-bottom: 24px;
  font-weight: 600;
  color: var(--aacrom-primary);
}

.option-row {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 16px 20px;
  background: white;
  border: 2px solid var(--aacrom-border);
  border-radius: 10px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all 0.15s;
}

.option-row:hover { border-color: var(--aacrom-accent); }

.option-row.selected { border-color: var(--aacrom-primary); background: #EEF2F8; }

.option-row.correct { border-color: var(--aacrom-success); background: #E8F5EC; }
.option-row.incorrect { border-color: var(--aacrom-danger); background: #FBEAEA; }

.option-row input { width: 18px; height: 18px; margin-top: 2px; cursor: pointer; flex-shrink: 0; accent-color: var(--aacrom-primary); }
.option-row label { flex: 1; cursor: pointer; font-size: 16px; line-height: 1.5; }

.matching-grid {
  display: grid;
  gap: 12px;
  margin: 20px 0;
}

.matching-row {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 14px;
}

.matching-cell {
  padding: 16px 20px;
  background: white;
  border: 2px solid var(--aacrom-border);
  border-radius: 10px;
  font-size: 15px;
  line-height: 1.45;
}

.matching-cell.left { background: var(--aacrom-primary); color: white; border-color: var(--aacrom-primary); font-weight: 600; }

.matching-arrow { font-size: 24px; color: var(--aacrom-accent); }

.feedback-box {
  margin-top: 20px;
  padding: 20px 26px;
  border-radius: 10px;
  background: white;
  border-left: 4px solid var(--aacrom-accent);
  display: none;
}

.feedback-box.show { display: block; animation: fadeIn 0.3s; }
.feedback-box.correct { border-left-color: var(--aacrom-success); }
.feedback-box.incorrect { border-left-color: var(--aacrom-danger); }
.feedback-box .feedback-title {
  font-weight: 700;
  margin-bottom: 8px;
  color: var(--aacrom-primary);
  font-size: 16px;
}
.feedback-box.correct .feedback-title { color: var(--aacrom-success); }
.feedback-box.incorrect .feedback-title { color: var(--aacrom-danger); }
.feedback-box p { font-size: 15px; line-height: 1.6; text-align: left; }

.quiz-submit {
  margin: 30px auto 0;
  display: block;
  padding: 14px 38px;
  font-size: 16px;
  font-weight: 700;
  background: var(--aacrom-primary);
  color: white;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: 0.3px;
  transition: background 0.2s;
}

.quiz-submit:hover:not(:disabled) { background: var(--aacrom-primary-light); }
.quiz-submit:disabled { opacity: 0.5; cursor: not-allowed; }

.quiz-result-summary {
  text-align: center;
  padding: 40px 30px;
  background: var(--aacrom-bg-soft);
  border-radius: 14px;
  margin: 24px auto;
  max-width: 700px;
}

.quiz-result-summary .score {
  font-size: 64px;
  font-weight: 700;
  color: var(--aacrom-primary);
  line-height: 1;
}

.quiz-result-summary .score .total { color: var(--aacrom-text-muted); font-size: 32px; }

.quiz-result-summary .label {
  font-size: 14px;
  letter-spacing: 1.5px;
  color: var(--aacrom-text-muted);
  margin-top: 8px;
  font-weight: 600;
}

.quiz-result-summary .badge {
  display: inline-block;
  padding: 8px 24px;
  margin-top: 18px;
  border-radius: 30px;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 1px;
}
.quiz-result-summary .badge.passed { background: var(--aacrom-success); color: white; }
.quiz-result-summary .badge.failed { background: var(--aacrom-danger); color: white; }

.quiz-result-summary p { margin-top: 20px; font-size: 16px; line-height: 1.6; }

/* ============================================
   SORTING (drag & drop)
   ============================================ */
.sorting-container { margin: 30px auto; max-width: 1100px; }

.sorting-items-pool {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  padding: 20px;
  background: var(--aacrom-bg-soft);
  border-radius: 12px;
  min-height: 80px;
  margin-bottom: 20px;
}

.sortable-item {
  padding: 12px 18px;
  background: white;
  border: 2px solid var(--aacrom-border);
  border-radius: 8px;
  cursor: grab;
  font-size: 14px;
  line-height: 1.4;
  max-width: 320px;
  transition: all 0.2s;
}

.sortable-item:hover { border-color: var(--aacrom-accent); }
.sortable-item.dragging { opacity: 0.4; }
.sortable-item.correct-placed { border-color: var(--aacrom-success); background: #E8F5EC; }
.sortable-item.wrong-placed { border-color: var(--aacrom-danger); background: #FBEAEA; }

.sorting-categories {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
}

.sorting-category {
  background: white;
  border: 2px dashed var(--aacrom-border);
  border-radius: 12px;
  padding: 18px;
  min-height: 160px;
  display: flex;
  flex-direction: column;
}

.sorting-category.drag-over { border-color: var(--aacrom-accent); background: #FFF9E8; }

.sorting-category-title {
  font-weight: 700;
  color: var(--aacrom-primary);
  font-size: 14px;
  text-align: center;
  margin-bottom: 12px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--aacrom-border);
}

.sorting-drop-zone { flex: 1; display: flex; flex-direction: column; gap: 8px; }

/* ============================================
   FOOTER NAV
   ============================================ */
#footer-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 48px;
  border-top: 1px solid var(--aacrom-border);
  background: var(--aacrom-bg);
  flex-shrink: 0;
}

.nav-btn {
  padding: 12px 28px;
  font-size: 14px;
  font-weight: 600;
  background: transparent;
  color: var(--aacrom-primary);
  border: 2px solid var(--aacrom-primary);
  border-radius: 30px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}

.nav-btn:hover:not(:disabled) {
  background: var(--aacrom-primary);
  color: white;
}

.nav-btn.primary {
  background: var(--aacrom-primary);
  color: white;
}

.nav-btn.primary:hover:not(:disabled) {
  background: var(--aacrom-primary-light);
  border-color: var(--aacrom-primary-light);
}

.nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ============================================
   RESPONSIVE
   ============================================ */
@media (max-width: 900px) {
  :root { --sidebar-width: 280px; }
  #sidebar {
    position: fixed;
    top: 0; bottom: 0; left: 0;
    z-index: 10;
    transform: translateX(-100%);
  }
  #sidebar.open { transform: translateX(0); }
  #menu-toggle { display: block; }
  .screen-header { padding: 40px 24px 30px; }
  .screen-header h1 { font-size: 32px; max-width: 100%; }
  .screen-body { padding: 30px 20px 60px; }
  .screen-body p, .statement { font-size: 16px; }
  .subtitle-blue { font-size: 26px; }
  .instructions-box .text { font-size: 16px; }
  .matrix-grid { grid-template-columns: 1fr; grid-template-rows: repeat(4, auto); aspect-ratio: auto; }
  .scenario-options { grid-template-columns: 1fr; }
  .case-card-wrapper .card-content { margin: 60px 16px 30px; padding: 24px 20px; }
  .matching-row { grid-template-columns: 1fr; }
  .matching-arrow { display: none; }
  #footer-nav { padding: 12px 20px; }
  #topbar { padding: 14px 20px; }
}

/* ============================================
   2. COMPARISON_CARDS (Tarjetas comparativas)
   ============================================ */
.comparison-screen {
  padding: 50px 60px;
  min-height: 100%;
}
.comparison-intro {
  font-size: 17px;
  color: #4A5568;
  margin-bottom: 32px;
  max-width: 820px;
  line-height: 1.6;
}
.comparison-headers {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  margin-bottom: 20px;
}
.comparison-header {
  padding: 18px 24px;
  border-radius: 10px;
  text-align: center;
}
.comparison-header.left {
  background: #FEF3E2;
  border: 2px solid #F4A261;
}
.comparison-header.right {
  background: #E8F5E9;
  border: 2px solid #4CAF7F;
}
.comparison-header h3 {
  font-size: 20px;
  font-weight: 800;
  margin: 0 0 4px 0;
}
.comparison-header.left h3 { color: #C4661F; }
.comparison-header.right h3 { color: #1D6F4C; }
.comparison-header .sub {
  font-size: 13px;
  font-style: italic;
  font-weight: 500;
}
.comparison-header.left .sub { color: #8B4513; }
.comparison-header.right .sub { color: #2E5B40; }
.comparison-rows {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.comparison-row {
  display: grid;
  grid-template-columns: 1fr 60px 1fr;
  gap: 0;
  align-items: stretch;
  background: white;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.comparison-cell {
  padding: 22px 24px;
  font-size: 15px;
  line-height: 1.55;
  display: flex;
  align-items: center;
}
.comparison-cell.left {
  background: #FFF8F0;
  color: #6B4423;
  border-left: 4px solid #F4A261;
}
.comparison-cell.right {
  background: #F0F8F2;
  color: #1D4D33;
  border-right: 4px solid #4CAF7F;
}
.comparison-vs {
  background: #1F3864;
  color: #E8C667;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 13px;

}
.funnel-container {
  background: linear-gradient(180deg, #F8F9FA 0%, #FBF7EA 100%);
  border-radius: 14px;
  padding: 36px 28px;
  margin-bottom: 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.funnel-stage {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 32px;
  color: white;
  font-weight: 700;
  position: relative;
  transition: all 0.3s;
  cursor: default;
}
.funnel-stage:hover {
  transform: scale(1.02);
  z-index: 2;
  box-shadow: 0 4px 14px rgba(0,0,0,0.15);
}
.funnel-stage-name {
  font-size: 16px;
  letter-spacing: 0.5px;
}
.funnel-stage-value {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
}
.funnel-stage-detail {
  font-size: 11px;
  font-weight: 400;
  opacity: 0.9;
  font-style: italic;
  margin-top: 3px;
}
.funnel-connector {
  width: 2px;
  height: 8px;
  background: #C9A227;
  opacity: 0.4;
}
.funnel-explanation {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  margin-top: 8px;
}
.funnel-exp-card {
  background: white;
  border-left: 4px solid #1F3864;
  border-radius: 8px;
  padding: 16px 20px;
}
.funnel-exp-title {
  font-size: 13px;
  font-weight: 800;
  color: #1F3864;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.funnel-exp-text {
  font-size: 13px;
  line-height: 1.55;
  color: #2C2C2C;
}
body.dark-mode .funnel-container { background: linear-gradient(180deg, #2A2F3C 0%, #1F2230 100%); }
body.dark-mode .funnel-exp-card { background: #2A2F3C; color: #E8E9EB; }
body.dark-mode .funnel-exp-title { color: #E8C667; }
body.dark-mode .funnel-exp-text { color: #C8CAD0; }
@media (max-width: 720px) {
  .funnel-screen { padding: 30px 20px; }
  .funnel-container { padding: 24px 16px; }
  .funnel-stage { padding: 14px 18px; flex-direction: column; align-items: flex-start; gap: 6px; }
  .funnel-stage-value { font-size: 18px; }
  .funnel-explanation { grid-template-columns: 1fr; }
}

/* ============================================
   6. INTERACTIVE_CHART (Barras horizontales interactivas)
   ============================================ */
.chart-screen {
  padding: 50px 60px;
  min-height: 100%;
}
.chart-intro {
  font-size: 16px;
  color: #4A5568;
  margin-bottom: 28px;
  max-width: 860px;
  line-height: 1.6;
}
.chart-container {
  background: white;
  border: 2px solid #E0E4EA;
  border-radius: 14px;
  padding: 28px 32px;
  margin-bottom: 22px;
}
.chart-title {
  font-size: 16px;
  font-weight: 700;
  color: #1F3864;
  margin-bottom: 8px;
}
.chart-subtitle {
  font-size: 13px;
  color: #6B7280;
  margin-bottom: 24px;
}
.chart-bars {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.chart-row {
  display: grid;
  grid-template-columns: 130px 1fr 90px;
  align-items: center;
  gap: 14px;
  padding: 8px 0;
  cursor: pointer;
  transition: all 0.25s;
  border-radius: 6px;
}
.chart-row:hover {
  background: #FBF7EA;
  padding-left: 8px;
  padding-right: 8px;
}
.chart-label {
  font-size: 13px;
  font-weight: 700;
  color: #1F3864;
  line-height: 1.3;
  text-align: right;
  padding-right: 6px;
}
.chart-bar-wrap {
  background: #F2F2F2;
  border-radius: 6px;
  height: 32px;
  position: relative;
  overflow: hidden;
}
.chart-bar-fill {
  height: 100%;
  border-radius: 6px;
  background: linear-gradient(90deg, #1F3864 0%, #2A4A82 100%);
  width: 0;
  transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}
.chart-bar-fill::after {
  content: '';
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 4px;
  background: #C9A227;
  opacity: 0.9;
}
.chart-value {
  font-size: 20px;
  font-weight: 800;
  color: #1F3864;
  letter-spacing: -0.5px;
  text-align: left;
}
.chart-detail-panel {
  margin-top: 20px;
  background: linear-gradient(135deg, #FBF7EA 0%, #F4EDD4 100%);
  border-left: 4px solid #C9A227;
  border-radius: 8px;
  padding: 18px 22px;
  min-height: 70px;
  font-size: 14px;
  line-height: 1.55;
  color: #1F3864;
  transition: all 0.3s;
}
.chart-detail-panel .detail-label {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 1.5px;
  color: #C9A227;
  margin-bottom: 6px;
  text-transform: uppercase;
}
.chart-closing {
  background: #F8F9FA;
  border-left: 4px solid #1F3864;
  padding: 18px 22px;
  border-radius: 6px;
  font-size: 14px;
  line-height: 1.55;
  color: #2C2C2C;
}
body.dark-mode .chart-container { background: #2A2F3C; border-color: #3A3F4C; }
body.dark-mode .chart-title { color: #E8C667; }
body.dark-mode .chart-subtitle { color: #A0A5B0; }
body.dark-mode .chart-label { color: #E8C667; }
body.dark-mode .chart-value { color: white; }
body.dark-mode .chart-row:hover { background: #1F2230; }
body.dark-mode .chart-bar-wrap { background: #1F2230; }
body.dark-mode .chart-detail-panel { background: #1F2230; color: #E8E9EB; }
body.dark-mode .chart-closing { background: #2A2F3C; color: #C8CAD0; }
@media (max-width: 720px) {
  .chart-screen { padding: 30px 20px; }
  .chart-container { padding: 22px 18px; }
  .chart-row { grid-template-columns: 100px 1fr 72px; gap: 10px; }
  .chart-label { font-size: 12px; }
  .chart-value { font-size: 17px; }
}

@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500;1,600&family=Inter:wght@500;600;700;800&display=swap');

/* ============================================
   AACROM REFRESH v2 · VARIANTE 4
   Off-white cálido + acento sub-línea (granate) + tipografía editorial
   ============================================ */
:root {
  --aacrom-sub-accent: #8B2635 !important;
  --aacrom-sub-accent-soft: #F5E8E8 !important;
  --aacrom-bg-warm: #FBF9F4 !important;
  --aacrom-bg-card: #FFFFFF !important;
}

/* === Off-white cálido en TODO el fondo === */
body { background: var(--aacrom-bg-warm) !important; }
#screen-content,
.screen-container,
#main-content {
  background: var(--aacrom-bg-warm) !important;
}

/* === TÍTULO EDITORIAL · Fraunces itálica === */
.screen-header h1,
.screen-header h2,
.module-intro-container h1,
.closing-resources-container h1 {
  font-family: 'Fraunces', Georgia, serif !important;
  font-weight: 500 !important;
  font-style: italic !important;
  letter-spacing: -0.5px !important;
}

/* === ETIQUETAS en Inter (más geométrica) === */
.module-label,
.stat-callout-number,
.process-step-number,
.next-steps-heading,
.myth-card-header,
.pullquote-author {
  font-family: 'Inter', sans-serif !important;
}

/* === LABEL DE MÓDULO en granate === */
.module-label {
  color: var(--aacrom-sub-accent) !important;
  background: var(--aacrom-sub-accent-soft) !important;
  padding: 4px 12px !important;
  border-radius: 4px !important;
  display: inline-block !important;
}

/* === HEADER LINE bajo el título: granate === */
.header-line {
  background: var(--aacrom-sub-accent) !important;
}

/* === STATEMENT box · fondo y borde granate === */
.statement {
  background: var(--aacrom-sub-accent-soft) !important;
  border-left-color: var(--aacrom-sub-accent) !important;
}
.statement-citation {
  color: var(--aacrom-sub-accent) !important;
}

/* === LISTA "qué va a encontrar" · viñetas granate === */
.aacrom-list li::before {
  background-color: var(--aacrom-sub-accent) !important;
}

/* === Process steps · pequeños refinamientos === */
.process-step-title { color: var(--aacrom-sub-accent) !important; }

/* === Pull quote · autor y borde granate === */
.pullquote-author {
  color: var(--aacrom-sub-accent) !important;
  border-left-color: var(--aacrom-sub-accent) !important;
}

/* === Myth buster · header rojo cambia a granate === */
.myth-card-header {
  background: linear-gradient(135deg, #8B2635 0%, #6B1D2A 100%) !important;
}
.myth-card-header::before {
  color: #8B2635 !important;
}
.myth-card-myth {
  color: #1F3864 !important;
}

/* === Sidebar progress · mantiene dorado universal === */
/* === Sidebar checks en granate cuando completado === */
.sidebar-module.completed [class*="dot"],
.sidebar-item.completed .check,
.module-progress-icon.completed,
.module-item.completed::after {
  background: var(--aacrom-sub-accent) !important;
  border-color: var(--aacrom-sub-accent) !important;
}

/* === Cards principales · fondo blanco sobre off-white === */
.aacrom-paragraphs,
.process-step,
.myth-card,
.funnel-exp-card,
.matrix-content,
.calc-container,
.chart-container,
.stat-callout-card,
.comparison-card,
.tab-content,
.accordion-item {
  background-color: var(--aacrom-bg-card) !important;
}
/* La imagen hero NO debe perder su background-image, solo el color base */
.module-hero-image {
  background-color: var(--aacrom-bg-warm) !important;
}

/* === Quiz badges === */
.quiz-result-summary .badge.passed {
  background: #2E7D52 !important; color: white !important;
}
.quiz-result-summary .badge.failed {
  background: #8B2635 !important; color: white !important;
}

/* Aacrom-paragraphs · si están sin fondo blanco se ven raros */
.aacrom-paragraphs {
  background: var(--aacrom-bg-card) !important;
  padding: 24px 28px !important;
  border-radius: 10px !important;
  border-left: 3px solid var(--aacrom-sub-accent) !important;
}

/* === Dark mode adjustments === */
body.dark-mode {
  background: #1A1F2C !important;
}

  color: #E07A8A !important;
  background: #3A1F25 !important;
}
body.dark-mode .statement {
  background: #3A1F25 !important;

}
body.dark-mode .aacrom-paragraphs {
  background: #2A2F3C !important;

/* ============================================
   C-CE.1 v2 · TIPOS NUEVOS + PALETA EXTENDIDA
   ============================================ */

/* === PALETA EXTENDIDA === */
:root {
  --aacrom-beige: #F4ECDB;
  --aacrom-beige-soft: #FAF5E8;
  --aacrom-copper: #B8714D;
  --aacrom-gold-dark: #A8881C;
  --aacrom-sub-light: #D4A8AE;
  --aacrom-safe-green: #2E7D52;
  --aacrom-warn-amber: #C9A227;
  --aacrom-danger-deep: #8B2635;
}

/* ============================================
   1. SAFETY_SIGNS_GRID — Grilla de señales SST
   ============================================ */
.safety-grid-screen { padding: 50px 60px; min-height: 100%; }
.safety-grid-intro {
  font-size: 16px;
  color: #4A5568;
  margin-bottom: 28px;
  max-width: 860px;
  line-height: 1.6;
  background: var(--aacrom-beige) !important;
  border-left: 3px solid var(--aacrom-copper);
  padding: 16px 22px;
  border-radius: 0 8px 8px 0;
}
.safety-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.safety-sign {
  background: white;
  border: 2px solid #E0E4EA;
  border-radius: 14px;
  padding: 20px 18px;
  cursor: pointer;
  text-align: center;
  transition: all 0.25s;
  position: relative;
}
.safety-sign:hover {
  border-color: var(--aacrom-copper);
  box-shadow: 0 6px 20px rgba(184,113,77,0.18);
  transform: translateY(-2px);
}
.safety-sign-icon {
  width: 86px; height: 86px;
  margin: 0 auto 12px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 44px;
  font-weight: 800;
  color: white;
  position: relative;
}
.safety-sign-icon.t-safe   { background: var(--aacrom-safe-green); }
.safety-sign-icon.t-warn   { background: var(--aacrom-warn-amber); color: #1F3864; }
.safety-sign-icon.t-danger { background: var(--aacrom-danger-deep); }
.safety-sign-icon.t-info   { background: #1F3864; }
.safety-sign-icon.t-fire   { background: #C44545; }
.safety-sign-icon.t-mandatory { background: #2563EB; }
.safety-sign-label {
  font-size: 14px;
  font-weight: 800;
  color: #1F3864;
  margin-bottom: 4px;
  letter-spacing: 0.3px;
}
.safety-sign-category {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: #6B7280;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.safety-sign-meaning {
  font-size: 12px;
  color: #4A5568;
  line-height: 1.45;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease, margin 0.35s ease, padding 0.35s ease;
}
.safety-sign.expanded .safety-sign-meaning {
  max-height: 250px;
  margin-top: 8px;
  padding-top: 10px;
  border-top: 1px dashed #E0E4EA;
}
.safety-sign-action {
  font-size: 11px;
  font-weight: 700;
  color: var(--aacrom-copper);
  margin-top: 8px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  display: none;
}
.safety-sign.expanded .safety-sign-action { display: block; }
.safety-grid-footer {
  background: var(--aacrom-beige) !important;
  border-left: 4px solid var(--aacrom-gold-dark);
  border-radius: 0 8px 8px 0;
  padding: 18px 24px;
  font-size: 14px;
  line-height: 1.6;
  color: #1F3864;
}
body.dark-mode .safety-sign { background: #2A2F3C; border-color: #3A3F4C; }
body.dark-mode .safety-sign-label { color: #E8C667; }
body.dark-mode .safety-sign-meaning { color: #C8CAD0; }
body.dark-mode .safety-grid-intro { background: #1F2230 !important; color: #C8CAD0; }
body.dark-mode .safety-grid-footer { background: #1F2230 !important; color: #C8CAD0; }

/* ============================================
   2. SIDE_BY_SIDE_COMPARISON — Antes vs Después
   ============================================ */
.sbs-screen { padding: 50px 60px; min-height: 100%; }
.sbs-intro {
  font-size: 16px; color: #4A5568;
  margin-bottom: 28px; max-width: 860px; line-height: 1.6;
}
.sbs-row {
  background: white;
  border-radius: 14px;
  padding: 0;
  margin-bottom: 18px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.sbs-row-header {
  background: var(--aacrom-beige);
  padding: 12px 22px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid #E0E4EA;
}
.sbs-row-number {
  background: #1F3864;
  color: white;
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800;
  font-size: 13px;
}
.sbs-row-title {
  font-size: 15px;
  font-weight: 700;
  color: #1F3864;
  flex: 1;
}
.sbs-row-body {
  display: grid;
  grid-template-columns: 1fr 1fr;
}
.sbs-col {
  padding: 20px 24px;
  position: relative;
}
.sbs-col.bad {
  background: linear-gradient(135deg, #FBF2F2 0%, #F7E6E6 100%);
  border-right: 1px dashed #E0E4EA;
}
.sbs-col.good {
  background: linear-gradient(135deg, #ECF4EE 0%, #DCEEDF 100%);
}
.sbs-col-label {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 2px;
  margin-bottom: 8px;
  padding: 3px 10px;
  border-radius: 4px;
  display: inline-block;
}
.sbs-col.bad .sbs-col-label {
  background: var(--aacrom-danger-deep); color: white;
}
.sbs-col.good .sbs-col-label {
  background: var(--aacrom-safe-green); color: white;
}
.sbs-col-text {
  font-size: 13px;
  line-height: 1.55;
  color: #2C2C2C;
}
.sbs-col-text strong { color: #1F3864; }
.sbs-col.good .sbs-col-text strong { color: #1D6F4C; }
.sbs-col.bad .sbs-col-text strong { color: #8B2635; }
body.dark-mode .sbs-row { background: #2A2F3C; }
body.dark-mode .sbs-row-header { background: #1F2230; }
body.dark-mode .sbs-row-title { color: #E8C667; }
body.dark-mode .sbs-col.bad { background: linear-gradient(135deg, #2A1F22 0%, #3A1F25 100%); }
body.dark-mode .sbs-col.good { background: linear-gradient(135deg, #1A2A22 0%, #1E3A2A 100%); }
body.dark-mode .sbs-col-text { color: #C8CAD0; }
@media (max-width: 720px) {
  .sbs-row-body { grid-template-columns: 1fr; }
  .sbs-col.bad { border-right: none; border-bottom: 1px dashed #E0E4EA; }
}

/* ============================================
   3. EMERGENCY_PROTOCOL_CARD — Protocolo con código semáforo
   ============================================ */
.eprotocol-screen { padding: 50px 60px; min-height: 100%; }
.eprotocol-intro {
  font-size: 16px; color: #4A5568;
  margin-bottom: 24px; max-width: 860px; line-height: 1.6;
}
.eprotocol-banner {
  background: linear-gradient(135deg, #1F3864 0%, #2A4A82 100%);
  color: white;
  padding: 18px 26px;
  border-radius: 12px 12px 0 0;
  display: flex;
  align-items: center;
  gap: 16px;
}
.eprotocol-banner-icon {
  width: 50px; height: 50px;
  background: var(--aacrom-warn-amber);
  color: #1F3864;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  font-weight: 800;
  flex-shrink: 0;
}
.eprotocol-banner-title {
  font-size: 18px;
