            Object.defineProperty(xhr, 'status', {value:200, configurable:true});
            Object.defineProperty(xhr, 'responseText', {value: JSON.stringify(window.__COURSE_JSON_EMBEDDED__), configurable:true});
            Object.defineProperty(xhr, 'response', {value: JSON.stringify(window.__COURSE_JSON_EMBEDDED__), configurable:true});
          } catch(e){}
          if (xhr.onreadystatechange) xhr.onreadystatechange();
          if (xhr.onload) xhr.onload();
        }, 5);
        return;
      }
      return _send.apply(xhr, arguments);
    };
    return xhr;
  };
  // También interceptar fetch por si acaso
  var OrigFetch = window.fetch;
  if (OrigFetch){
    window.fetch = function(url, opts){
      if (typeof url === 'string' && url.indexOf('course.json') !== -1){
        return Promise.resolve(new Response(JSON.stringify(window.__COURSE_JSON_EMBEDDED__), {status:200, headers:{'Content-Type':'application/json'}}));
      }
      return OrigFetch.apply(this, arguments);
    };
  }
})();
</script>
